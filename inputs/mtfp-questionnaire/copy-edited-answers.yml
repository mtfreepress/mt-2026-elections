    - question: Identify two national priorities that are not addressed in this questionnaire that are important to your platform. Briefly explain your position on each and tell voters how you intend to address them. If there’s an existing bill you support to advance your position, please identify it.
      response: |+
        As Montana’s next United States Senator, the first national priority would be to continue the improving our national security from threats foreign and domestic.   We not only need to tighten our boarders, but we need to look at the domestic terrorists that are already within our country.   I would like to implement an entry fee to all non-U.S. citizens who come to our country.   These funds will help pay for our national security at there expense, not the American taxpayer.   This also includes the advanced efforts of operation genesis, so the United States not only can lead the world in technology advancements, but we can protect ourselves from foreign threats on the digital future. 
        The second national priority would be to improve not only our economy, but our relationships with the world.   I propose a ZERO tariff agenda on countries who are our allies and who also will agree to a zero tariff on American exports.   This plan will lower the cost of goods for consumers and businesses, increase efficiency, and  drive innovation through competition.

  mtfpTitle: TK here
  mtfpWrittenBio: |+
    TK MTFP-written bio

  questionnaireMaterial:
    - question: When a president deploys U.S. armed forces into combat for a month or longer without authorization, should the War Powers Resolution of 1973, which gives Congress the power to declare war, be enforced? If not, should the War Powers Resolution be revised, replaced, or discarded? Briefly explain your reasoning.
      response: |+
        Yes, the War Powers Resolution of 1973 should be enforced.   Under the resolution, the president has the authority to take immediate action with military force and must withdraw troop within 60 days if congress does not authorize further use of force.  I do feel this is a great balance of power, and necessary for the United States to have the ability to quickly make decisions and mobilize our troops for the protection of our country.

    - question: Many of Montana's rural hospitals and clinics are facing financial stress because of low patient volume and tight budget margins. What, if anything, should Congress be doing to support Montana’s health care providers?
      response: |+
        As a pharmacist for 18 years in Montana, I understand the issues we have with healthcare very well.   I have a plan, called Healthcare 2.0, that will overhaul our entire healthcare system to eliminate wasted money, eliminate the insurance corruption, and eliminate the government overreach.   Doing so will allow our healthcare to run effectively and efficiently.   American citizens and small businesses will see affordable healthcare plans with no annual deductibles and lower monthly premiums.   While providers will see better reimbursements and a future of prosperity.   This can all be done without adding any additional costs to the taxpayers.

    - question: Describe two issues unique to Montana that you intend to address. Explain how you’ll get the job done.
      response: |+
        The first issue I would like to address as Montana’s next United States Senator would be to eliminate government overreach and wasteful spending.    For example, the Montana Department of Labor and Industry currently receives $93 million dollars in federal funding and has also overtaxed small businesses in our state creating a trust fund of over $643 million dollars.    This is unacceptable!   I plan to cut the fat, deregulation businesses and lower taxes for everyone. 
        The second issue is to revitalize our agriculture community’s.   We need to 1. Overhaul and strengthen the United States Department of Agriculture. 2. Leave our farmers and ranches out of the trade wars.  3. Eliminate the corruption and fraud of the markets that leave our farmers and ranchers with the bottom dollar.  4. Redirect the wasteful spending into offering 0% financing through the USDA to our farmers and ranchers. 5. Assist and facilitate the construction of fertilizer production facilities so our farmers are no longer having to be dependent on importation.

    - question: Identify options or strategies available to federal officeholders to address home ownership and cost of living in Montana.
      response: |+
        As a United States Senator, I would focus my efforts to help lowering the cost of living in Montana and home ownership in a few ways.  1. I would work on lowering the interest rates.  2. I would reduce the construction barriers that have been driving up the costs of construction.  3. I would promote zero tariffs so we can get construction supplies at a more affordable price.  And 4. I would promote responsible logging and lumber mills to create jobs and resources right here in our great State of Montana.

    - question: Briefly describe any traits and actions that would distinguish your service from that of the elected official who currently occupies the office you’re running for.
      response: |+
        As a 4th generation Montanan, I am a very bold, highly education individual that does not back down from a fight.   I stand my ground and often find creative solutions to problems nobody else has a vision for.   My hard work and background as a farmer, pharmacist, and small business owner will not only impress the voters of Montana when I am in office, it will inspire my colleagues in Washington DC.

