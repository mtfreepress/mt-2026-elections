    - question: Your constituents ask you for help with the failure of a major infrastructure project, the cost of which is more than state and local governments can raise. You can direct federal money to the project through an earmark, or you can leave the funding decision up to a federal agency, in which case the decided outcome won't be yours. Which strategy are you most likely to pursue, and why?
      response: |+
        I would most likely direct federal money to the project through an earmark (now often called community project funding or congressionally directed spending).As a proud Montanan and an outsider fighting for our state against Washington elites and corporate interests, I believe in bringing real results home to Montana families—not leaving their future to unelected bureaucrats in some distant federal agency who don't understand our needs.Montana's infrastructure—like roads, bridges, rail, water systems, or rural broadband—is vital for our small farmers, ranchers, small businesses, veterans, and everyday working people. When state and local governments can't raise the funds alone, it's my job as your Senator to step up and secure the resources our communities deserve, rather than watching a critical project fail because of red tape or misplaced priorities in D.C.This isn't about "pork" or wasteful spending—it's targeted, accountable funding for proven Montana priorities, rooted in common-sense principles and constitutional governance. I've seen too many federal programs create dependency; this approach empowers our state directly while holding Washington accountable.Leaving it to an agency risks the project getting buried under endless reviews, competing national demands, or outright denial—something Montana can't afford. I'll fight to earmark the funds transparently, so voters know exactly where their tax dollars are going and why it's helping our people.That's the independent, America First, Montana-first way I’ll serve.

    - question: Describe your approach to management of federal lands when conflicts arise between conservation, energy development, recreation, and tribal sovereignty.
      response: |+
        My approach to managing federal lands in Montana is guided by common-sense balance, Montana-first priorities, and respect for the people who live closest to the land—our ranchers, farmers, small businesses, recreation users, conservationists, and tribal communities.Federal lands belong to all Americans, but Montana bears the burden—and the blessings—of managing vast portions of them. When conflicts arise between conservation, energy development, recreation, and tribal sovereignty, I start with these principles:

        Local input first 
        Multiple use done right
        Protect recreation and small ag
        Tribal sovereignty respected
        Cut red tape and fight overreach

    - question: Identify two national priorities that are not addressed in this questionnaire that are important to your platform. Briefly explain your position on each and tell voters how you intend to address them. If there’s an existing bill you support to advance your position, please identify it.
      response: |+
        Securing our southern border and ending illegal immigration

        Supporting our veterans with real, accountable benefits

        These issues reflect my commitment as an independent, outsider voice: restoring constitutional principles, fighting corporate and federal overreach, and putting Montana families, tribes, small farmers, ranchers, and veterans ahead of D.C. elites. I'll bring real Montana solutions to Washington—no more status quo.

