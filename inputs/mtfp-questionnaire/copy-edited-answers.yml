        Ultimately Congress can keep the United States from having to send our soldiers into harm's way for unjust Wars and for a president's Personal Agenda.

    - question: Many of Montana's rural hospitals and clinics are facing financial stress because of low patient volume and tight budget margins. What, if anything, should Congress be doing to support Montana’s health care providers?
      response: |+
        The nation's current Healthcare crisis is directly impacting Montana's rural Hospitals and Clinics and that is one thing that Congress needs to take head-on. As your next senator from Montana one of my priorities is to make sure that we get Medicare for All codified and implemented for all Montanans.  When Montana's don't have to worry about how they're going to pay their next doctor bill we will more likely make more frequent Healthcare visits to our healthcare providers.

    - question: Describe two issues unique to Montana that you intend to address. Explain how you’ll get the job done.
