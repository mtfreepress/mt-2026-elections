  mtfpWrittenBio: |+
    TK MTFP-written bio

  questionnaireMaterial:
    - question: When a president deploys U.S. armed forces into combat for a month or longer without authorization, should the War Powers Resolution of 1973, which gives Congress the power to declare war, be enforced? If not, should the War Powers Resolution be revised, replaced, or discarded? Briefly explain your reasoning.
      response: |+
        Yes. This isn’t just a constitutional or legal question, it’s a moral one. The decision to go to war carries an immense human and monetary cost, and it should be a last resort that national leaders do all they can to avoid. When our representatives are too corrupt or cowardly to vote on whether we go to war - let alone to stop it - they’re handing an immense amount of power over to the corporations that profit from endless wars while poor and working people pay the price.
        Congress should do their job as outlined in the War Powers Resolution and Article I of the U.S. Constitution, stop this stupid and costly war with Iran, and finally stop the endless wars that have us spilling blood and treasure abroad while working people at home struggle to afford the basics.

        I would vote to end this war with Iran and instead invest that money here at home. Let’s use those resources to start tackling our housing crisis, fixing our broken healthcare system, and getting every Montana family access to free childcare and pre-K so that we can afford to raise our families here at home.

    - question: Many of Montana's rural hospitals and clinics are facing financial stress because of low patient volume and tight budget margins. What, if anything, should Congress be doing to support Montana’s health care providers?
      response: |+
        Today, too many of us are stuck paying more every year for bad coverage while insurance companies profit at our expense. In Congress, I’ll fight to give every American the option of free or affordable healthcare. We do that by giving everyone the choice to buy into Medicare and expanding ACA subsidies to make it free for working people. 

        But affordable care only matters if folks can access it. Too many Montanans in rural communities are forced to drive for hours just to get a checkup or fill a prescription. In Congress I’ll support rural hospitals and clinics, not through one-time payouts like Republicans used in last year’s budget to mask the billions they cut from Medicaid, but by increasing reimbursement rates so rural providers can serve their patients while keeping their doors open.

        I’ll also work to rebuild our broken mental health system by expanding funding for community-based mental health services, lower prescription costs by allowing Medicare to negotiate prices for all prescription drugs directly, and expand funding for long-term care options, including community-based and in-home care.

    - question: Describe two issues unique to Montana that you intend to address. Explain how you’ll get the job done.
      response: |+
        In Western Montana, we’ve gone from having dozens of zens of operating lumber mills to just a few today. That’s thousands of good-paying jobs lost that used to support families and communities from the Bitterroot to the Flathead. It’s more critical than ever that we protect and sustainably manage our forests and public lands–but we can do that while still responsibly harvesting trees in a way that makes our forest healthier, enriches our communities, and contributes to solving the housing crisis folks in our state are living through.
        This district contains 16 counties and 2 sovereign Tribal Nations, and western Montana deserves a congressman who will be a partner and advocate for Native people. I’ll fight in Congress to make the federal government work for Montana’s Tribal communities. That means honoring trust and treaty obligations, respecting the government-to-government relationship with Tribal nations, and empowering constituents to enact change where the federal government has fallen short for too long. I’ll work to be a representative for every Montanan and a partner for the tribal nations in MT-01.

    - question: Identify options or strategies available to federal officeholders to address home ownership and cost of living in Montana.
      response: |+
        Like most Montanans, I’m used to seeing more and more of my paycheck go to housing every year. Most folks in DC don’t know what that’s like, and that’s a big part of why they haven’t done anything to fix it. My housing platform will: 

        - Deliver significant federal investment in housing that’s equal in scale to the crisis we’re facing. I’ll fight to deliver robust investments to build more homes in the places we need them, and I’ll push for incentives to build dense, infill housing with rent restrictions to ensure public investment results in housing Montanans can afford. 
        - Incentivize zoning and regulatory reform in places where outdated zoning laws prevent housing from being built where working people need it most.
        - End corporate home ownership by banning the purchase of residential property by hedge funds and private equity firms, and eliminating tax breaks for institutional investors and corporations.
        - Expand apprenticeships and trade school opportunities and dramatically increase the number of good, union jobs available in construction and the trades.
        - Bring back the first-time homebuyer tax credit to make it cheaper for young and working people to buy and own a home.

    - question: Briefly describe any traits and actions that would distinguish your service from that of the elected official who currently occupies the office you’re running for.
      response: |+
        My perspective as a working-class Montanan is the chief difference between myself and our current congressman. Unlike most members of Congress, I’m not a millionaire. I was raised largely by a single mom who picked up extra shifts as a nurse to pay the bills, and I’ve spent much of my life working two or three jobs at a time to do the same. I spent the last 8 years working as a wildland firefighter, the last two as a union leader, and the last decade organizing and fighting for public education and libraries, housing and healthcare, reforming our justice system, and defending our civil liberties to make life better for working Montanans like me, who have lived on the wrong end of our broken systems. That work taught me how to work with people in both parties on incredibly difficult policy issues, and how to connect with folks who have been forgotten by our current leaders.

- candidateName: Kurt Alme
  nameSlug: kurt-alme
  bioMaterial:
    - question: Please describe any professional and/or life experiences that will help voters assess your qualifications for the office you’re seeking.
      response: |+
        Growing up, I lived in Great Falls, Dillon, Victor, and Helena before graduating high school in Miles City. After high school, I earned a business degree from the University of Colorado and was a Truman Scholar. I earned my law degree from Harvard. 

        After law school, I came back to Helena to clerk for U.S. District Judge Charles Lovell, whom President Reagan appointed, before practicing law in Billings. Then, I transitioned back into public service as Director of the Department of Revenue for Governor Martz. 

        Later, I served as an Assistant U.S. Attorney before being nominated by President Trump and confirmed by the Senate twice to serve as U.S. Attorney for Montana. When the President’s first term ended, I served as Budget Director for Governor Gianforte in his first session.

        I also served as the Vice President and General Counsel, and later President, of the Yellowstone Boys and Girls Ranch Foundation. In this role, I worked closely with our ag community to support the Ranch’s work with emotionally troubled youth.

        I’ve also actively participated in the Billings Downtown Rotary and the Billings Area Chamber of Commerce, among other organizations.

    - question: Where do you live currently? Where (city and state) were you born? How long have you lived in Montana?
      response: |+
        I was born in Great Falls and live with my wife, Sandra, in Billings. I’m a native Montanan and have lived here most of my life.

    - question: Age as of Nov. 3, 2026, date of birth, and place of birth. We will not publish your birth date.
      response: |+
        60; 1966; Great Falls, Montana.

    - question: What other biographical information do you want voters to know about you?
      response: |+
        I was born in Great Falls, where my dad worked as a high school math teacher and my mom taught elementary school. As the son of educators, I learned early on that opportunity begins with a quality education and a strong work ethic.

        I spent decades volunteering on the boards of critical charitable organizations, including the Boys and Girls Club of Yellowstone County Endowment Foundation, St. John’s Lutheran Ministries, and St. Vincent’s Healthcare. As a pro bono attorney for the Yellowstone Guardianship Council, I helped protect Montana’s most vulnerable citizens. 

        I’ve always loved sports and investing in the next generation, which is why I served on the Board for Boulder/Arrowhead Little League and spent many hours coaching youth baseball and basketball.  

        Most importantly, family remains the cornerstone of my life. My wife Sandra and I have been married for 31 years and have raised two grown children.

    - question: Your constituents ask you for help with the failure of a major infrastructure project, the cost of which is more than state and local governments can raise. You can direct federal money to the project through an earmark, or you can leave the funding decision up to a federal agency, in which case the decided outcome won't be yours. Which strategy are you most likely to pursue, and why?
      response: |+
        As State Budget Director, I’ve worked directly with communities facing large infrastructure needs, funded critical projects for Montana communities, and upheld Montana’s fiscally conservative principles. I’ve stewarded Montana taxpayer dollars and invested in making Montana stronger while balancing the budget. And I’ve worked with federal and local leaders to get things done and deliver solutions for Montanans.

        That’s exactly what I’d do here: meet with Montanans, make their voices heard, and leverage my experience as a legal expert to put Montana first. When we work together – regardless of party or background – we can invest in Montanans and deliver the resources and services we need to thrive.

        We can also balance budgets and get on track to become debt-free while making necessary investments in our future. I’ve done it in Montana, and it’s time federal leaders do the same.

        Earmarks have played too large a role in putting us $39 trillion in debt and should be limited. We can’t afford to dig an even deeper hole. Montana deserves a conservative fighter who will do everything in his power to cut spending, balance the budget, and pay down our debt.

    - question: Describe your approach to management of federal lands when conflicts arise between conservation, energy development, recreation, and tribal sovereignty.
      response: |+
        Public lands are part of our Montana way of life. We must keep them in public hands and protect Montanans’ right to hike, hunt, fish, and recreate on our public lands. 

        We have a duty to manage federal lands to benefit Montanans and our tribal partners.
        Critically, the voices of local Montanans must be heard. Input from local Montanans and tribal governments must help drive decisions on how the lands they live on and live next to are managed.

        As U.S. Attorney, our office represented the Forest Service, other agencies, and their community partners to fight against obstructionist litigation. As Senator, I will fight back against federal overreach and out-of-state radical activist groups whose mission is to impede forest and land management, cripple businesses, and attack critical Montana industries. 

        I support the responsible development of our natural resources. That means active forest and land management to improve wildlife habitat, increase recreational opportunities, reduce wildfire risk, and create jobs, especially in western Montana. That also means supporting Montana’s mining and energy industries, which are economic drivers that create jobs, keep America secure, keep energy costs low, and fuel our economy. 

        Whether it is responsibly mining critical minerals, harvesting timber for housing, or supporting coal to keep the lights on, we need our resource economy. I’m ready to unleash it.

    - question: Identify two national priorities that are not addressed in this questionnaire that are important to your platform. Briefly explain your position on each and tell voters how you intend to address them. If there’s an existing bill you support to advance your position, please identify it.
      response: |+
        To make life more affordable for Montanans, we must end Washington’s deficit spending, which has fueled record inflation. We are $39 trillion in debt. It’s time to start balancing the budget. 

        As State Budget Director, I helped pass a balanced budget, cut wasteful spending, deliver substantial tax relief, and put Montana on track to become debt-free. After 16 years of Democrat budgets, we began to right the ship and restore fiscal responsibility in Helena. Years earlier, as Revenue Director, I helped cut our 11% income tax rate by more than 35% while ensuring a balanced budget.

        As Senator, I will lead the effort to pass the No Balanced Budget, No Paycheck Act, because if Congress can’t balance the budget, they shouldn’t get paid.

        Election integrity is also a priority. We must restore confidence in our election process with commonsense voter ID measures.

  mtfpTitle: TK here
  mtfpWrittenBio: |+
    TK MTFP-written bio

  questionnaireMaterial:
    - question: When a president deploys U.S. armed forces into combat for a month or longer without authorization, should the War Powers Resolution of 1973, which gives Congress the power to declare war, be enforced? If not, should the War Powers Resolution be revised, replaced, or discarded? Briefly explain your reasoning.
      response: |+
        The Constitution is very clear: Congress holds the power to formally declare war. We must take that solemn responsibility seriously.

        The War Powers Resolution of 1973 aimed to establish guardrails and provide a framework for accountability. Unfortunately, it’s been inconsistently enforced by both parties for decades. Congress must consistently enforce its constitutional role. 

        The most solemn duty of our government is to keep us safe. We must ensure our commanders-in-chief can take quick, decisive action to protect Americans and defend our freedoms. It’s dangerous to tie our commander-in-chief and troops’ hands behind their backs. Especially when Americans are being targeted by adversaries and threats, and the world’s largest state sponsor of terror is trying to get its hands on nuclear weapons. 

        Our military is a completely voluntary service. The brave men and women of our armed forces sign up to put their lives on the line in service to our great nation. We owe these Americans a debt of gratitude for their commitment and sacrifice. 

        Sending Americans into harm’s way is one of the most serious decisions our government makes. Montanans, and all Americans, deserve transparency, accountability, and a clear voice through their elected representatives. As Senator, I will work to ensure Montanans’ voices are heard loud and clear.

    - question: Many of Montana's rural hospitals and clinics are facing financial stress because of low patient volume and tight budget margins. What, if anything, should Congress be doing to support Montana’s health care providers?
      response: |+
        Rural hospitals and health care providers play a vital role in underpinning Montana communities. Providers and patients alike are facing challenges right now, and Montanans deserve solutions.

        To lower costs, increase access to quality care, and protect access in rural Montana, we should invest in rural communities and put both providers and patients first. 

        Rather than subsidizing health insurance companies with taxpayer dollars while their stock prices soar, we should invest in Montana providers. The Working Families Tax Cuts Act, which Senate Republicans passed and President Trump signed, invested $233 million this year alone to strengthen and modernize rural health care. This Rural Health Transformation Program (RHTP) is an innovative approach that we can build on to further support our hospitals and clinics. 

        Among other improvements, RHTP funds can be invested to help recruit, train, and retain doctors, nurses, and other health care professionals. 
         
        Also, a patient-centered care approach will increase choice, boost competition, and increase access to care. Continuing to expand telehealth services will ease the burden on hospitals and help Montanans access care quickly, no matter where they live. 

        More price transparency will also help. Health care is the only industry where you have no idea what the cost is until after you buy the product. The process has become mysterious, expensive, and daunting. That’s not good for patients, hospitals, or our communities.

        Price transparency allows Montanans to shop when considering medical treatment, with prices posted for consumers to see. Price transparency will create more competition, drive down prices, and make the experience of receiving health care simpler, easier, and more accessible.

        As a longtime supporter of Montana health care, I’m familiar with the challenges we face and eager to put patients and providers first in the U.S. Senate.

    - question: Describe two issues unique to Montana that you intend to address. Explain how you’ll get the job done.
      response: |+
        One of the top reasons I am running is to make Montana communities safer. 

        President Trump nominated me to be U.S. Attorney in his first term, and I was unanimously confirmed by the Senate.  He nominated me again during his second term because I aggressively worked to protect our communities. Under my leadership, this past year, criminal prosecutions reached a 20-year high as we went after violent criminals and drug traffickers to keep our communities safe.

        We need to keep the border secure, support law enforcement, prioritize prosecuting violent criminals, and investigate drug trafficking organizations all the way up to the cartels – so we can tear them out by their roots.

        As Senator, I will also bring a renewed focus to drug prevention and treatment because drug trafficking and related addiction have torn too many families and communities apart.

        As Governor Gianforte’s Budget Director, we introduced the HEART Fund from marijuana tax revenues to expand treatment and recovery services for individuals with mental health and substance use disorders. I’ve worked with many community organizations serving people with those disorders and will help forge public-private partnerships to support recovery and keep families healthy.

    - question: Identify options or strategies available to federal officeholders to address home ownership and cost of living in Montana.
      response: |+
        After President Biden’s policies unleashed extraordinary inflation, Montanans felt the squeeze of runaway prices and rising housing costs. 

        I want to make life more affordable for Montanans. The best way to lower the cost of living – permanently – is to rein in deficit spending and put more money back in Montanans’ pockets.

        Deficit spending creates higher prices. Balanced budgets do not. If we want to make life more affordable again, we must restore fiscal responsibility in Washington.

        I’m ready to bring my experience – balancing Montana’s budget, cutting wasteful spending, delivering substantial tax relief, and putting Montana on track to become debt-free – to our nation’s capital. This will help keep prices permanently low and make life more affordable again for hardworking Montana families.

        To increase homeownership, we need more housing. To increase housing supply, we must unleash small businesses, contractors, and communities by cutting red tape that ties up construction and prevents more homes from being built.

        Government spending and overregulation created these issues, and they certainly will not be the solution. To lower costs and get more families into homes of their own and achieve the American Dream, we must get government out of the way.

    - question: Briefly describe any traits and actions that would distinguish your service from that of the elected official who currently occupies the office you’re running for.
      response: |+
        I’ve never run for office before, and I’ve never been a politician. 

        President Trump endorsed me because he knows I’m a doer. Throughout my career, I’ve delivered results: as a prosecutor, Budget Director, Director of the Department of Revenue, President of the Yellowstone Boys & Girls Ranch Foundation, and a volunteer with various community organizations, including those that work with youth, seniors, the poor, mental health, and health care. 

        I am honored to be endorsed by President Donald Trump and look forward to ensuring the success for the rest of his second term. I’m also proud to be the only candidate who has been supported for a job three times by President Trump – twice for U.S. Attorney and now for the U.S. Senate.

        I am also humbled to have the support of other leaders in Montana – including Steve Daines, Tim Sheehy, and Greg Gianforte. But I have given no commitments for any endorsements. My views and my values come from years of living in communities across Montana and working with people in many walks of life – my duty is only to the people of our state, and I will fight for all Montanans.

- candidateName: Jonathan Windy Boy
  nameSlug: jonathan-windy-boy
  bioMaterial:
    - question: Please describe any professional and/or life experiences that will help voters assess your qualifications for the office you’re seeking.
      response: |+
        I served on the Chippewa Cree Tribal Business Committee from 1998 to 2010. I also served in the Montana Legislature 24 yrs from 2004 to present. My voting record and legislation if pragmatic and I have a record working across the aisle to get common sense legislation passed. Such as lowering property taxes to M9ntanans. I strongly support getting resources where it's needed to provide opportunities for Montanans, such as jobs growth. I support healthcare like Medicaid and Medicare and keeping rural hospitals doors open. I strongly support community colleges and providing for retention and recruitment for teachers, and keep them in state for quality education. Im my tribes historic preservation officer and I believe in preserving Montanas culture and heritage. I served on the House Appropriations and Senate Finance committees. I know budgets and strongly believe in balancing budgets. I brought resources back to my districts I serve and if elected I will work to provide the same opportunitieswfor Montanans. W2

    - question: Where do you live currently? Where (city and state) were you born? How long have you lived in Montana?
      response: |+
        I currently live in Rocky Biy Montana. South of Havre. I was born in Ft Belknap Montana. Raised in Rocky Boy. I'm a lifelong resident of Montana for 67 years.

    - question: Age as of Nov. 3, 2026, date of birth, and place of birth. We will not publish your birth date.
      response: |+
        I will be 68 years old on Nov 3, 2026

    - question: What other biographical information do you want voters to know about you?
      response: |+
        I have 7 grandchildren and 2 great granddaughters. Im in vested to make a bright future for them. I served on the Chippewa Cree Tribal Council for 12 years (1998-2010). Also the Montana State Legislature for 24 years, currently the Dean of the Montana Senate.  My political experience spans all 5 tribes in the district and I know all issues affecting tribal and non-tribal constituents, with a voting record that positively affecting all constituents. Such as lowering property taxes.

    - question: Your constituents ask you for help with the failure of a major infrastructure project, the cost of which is more than state and local governments can raise. You can direct federal money to the project through an earmark, or you can leave the funding decision up to a federal agency, in which case the decided outcome won't be yours. Which strategy are you most likely to pursue, and why?
      response: |+
        I would support earmarks for Montana, I served on both the house appropriations and senate finance committees, and I totally understand the budgeting process. Earmarks are usually frowned upon, but I would pursue earmarks and bring some home. I would rather bring home some earmarks back to Montana than voting for a $4.8 trillion tax cuts for the mega rich. The earmarks would help build jobs and opportunities for Montanans.

    - question: Describe your approach to management of federal lands when conflicts arise between conservation, energy development, recreation, and tribal sovereignty.
      response: |+
        As a former trubal leader I believe tribal sovereignty should be recognized practiced and preserved. The language in treaties are specific, the federal government has a trust responsibility to provide for the health, education and welfare of the original people's in this country, I will continue this fight and I will fight for this in thr halls of congress when I'm in DC. I will keep this as a priority issue not just a campaign slogan. I believe conservation, energy development and recreation. Conservation can be accomplished by preserving and protecting the environment as well as our national parks and recreation values. In the 2005 legislature, I secured and got $17.5 million dollars to clean up thebdef7nct Zortman/Landusky mine. Energy development can be accomplished by doing it responsibly with every Montanans input. All parties affected should be at thr table to decide the best route forward.

    - question: Identify two national priorities that are not addressed in this questionnaire that are important to your platform. Briefly explain your position on each and tell voters how you intend to address them. If there’s an existing bill you support to advance your position, please identify it.
      response: |+
        Pass a farm bill. In Montana, there are 2.8 million cattle and 1 million people. That's 2.8 cows to 1 person. The congress needs to prioritize food sovereignty, we should be able to provide grass and grain fed beef and keep the produce in our local markets, instead of shipping it overseas. In the 2025 legislature, I secured $200,000 dollars to MSU-northern to build a meat-cutting curriculum for students. This will provide jobs for Montanans. This approach would go in to investing in Montanans hone grown industry for farmers and ranchers. Yes, Education needs reform why remove system that should be fixed. There's ways of doing this by working on solutions and to do this, fix the issues that exist and implement fixes that can be fixed. At the same time preserve school lunches and provide a better approaches of fixing it.

  mtfpTitle: TK here
  mtfpWrittenBio: |+
    TK MTFP-written bio

  questionnaireMaterial:
    - question: When a president deploys U.S. armed forces into combat for a month or longer without authorization, should the War Powers Resolution of 1973, which gives Congress the power to declare war, be enforced? If not, should the War Powers Resolution be revised, replaced, or discarded? Briefly explain your reasoning.
      response: |+
        I don't support the war in Iraq we're in. I would vote against it, and yes the war powers resolution of 1973 should be enforced. The language is specific and should remain in effect and should not be changed or revised.

    - question: Many of Montana's rural hospitals and clinics are facing financial stress because of low patient volume and tight budget margins. What, if anything, should Congress be doing to support Montana’s health care providers?
      response: |+
        Montana rural hospitals are closing because it's not a priority for this congress. Not only will I will fight to keep the doors open for Montanans to access healthcare, I will also fight to keep healthcare for all Montanans (medicai). I will also fight to preserve Social Secirity and mediaid for seniors, they paid in to it and they should be entitled to it. This should be a priority for Montana.

    - question: Describe two issues unique to Montana that you intend to address. Explain how you’ll get the job done.
      response: |+
        My pragmatic approach on issues speaks for itself, my voting record proves it and can be fact-checked. The list goes beyond just two issues. I supported issues that positively impacted all Montanans. I worked with both parties in the Montana legislature to move Montana forward. Im a common sense individual who supports good common sense ideas that came before me. Issues that not all democrats supported. My approach has always been, if an idea that makes good common sense and will help Montanans moving forward. I'll support it. I will take this pragmatic pproach with me to DC. However, all issues that do come before me. I will listen to Montanans first and foremost with an open mind and decisions will be made accordingly. I will support good ideas from both sides of the aisle.

    - question: Identify options or strategies available to federal officeholders to address home ownership and cost of living in Montana.
      response: |+
        This is my first attempt at running for a federal office. I learned the art of learning the system(s). That said, my approach has served me well in my 24 years in the Montana legislature. Once I learn the system, working with bith sides of the aisle will help my approach. I will keep Montana first on every issue I vote on. Home ownership needs to happen by bringing all parties together, lowering the price of homes needs to be a priority. Listening to Montanans ideas on how to approach this with common sense. The every day costs of food needs to be addressed. How do we get there? Is a question we need to explore. One way is to provide growing local produce, keeping our cattle local as well also providing for all options, even the buffalo herds as an option. There are many ways to approach these issues. I may not have all the answers, but I'll always keep an open mind and I'll listen to everyone with ideas.

    - question: Briefly describe any traits and actions that would distinguish your service from that of the elected official who currently occupies the office you’re running for.
      response: |+
        I voted for balanced budgets in my career in the Montana legislature. I supported the balanced budgets during this time. This congress exploded the national debt by $4.8 trillion dollars. I dont support this out of control spending. I will continue supporting Medicaid, medicaid expansion as I supported. I will work for all Montanans in DC. I will listen to all Montanand and base my votes on what Montanans need and want.

- candidateName: Matt Rains
  nameSlug: matt-rains
  bioMaterial:
    - question: Please describe any professional and/or life experiences that will help voters assess your qualifications for the office you’re seeking.
      response: |+
        I first swore an oath to this country when I was 18 years old. I represented Montana at West Point and I’ve committed my life to service ever since. I flew Blackhawk helicopters and served in Iraq. I’ve seen the toll that war takes on our people and our country and I am going to go to Washington to fight like hell for Montana and our way of life. Right now, the affordability crisis threatens to sink our farmers and ranchers and make our state’s greatest export the next generation. As Chief of Staff to the Montana Farmer’s Union, I co-founded a rancher-owned, USDA-certified meat-packing co-op in Havre that allowed local producers to sell their product without groveling to the mega-corporations that are squeezing our ranchers. Those are the kind of innovative solutions I’ll fight for in Congress to put more power in the hands of the people.

    - question: Where do you live currently? Where (city and state) were you born? How long have you lived in Montana?
      response: |+
        I live in Simms Montana, where I was born and raised. With the exception of my time at West Point, my military service, and my MBA education at Washington University in St. Louis, I have lived in Montana my entire life. My family ranch has been here since the 1800s, before Montana was officially a state.

    - question: Age as of Nov. 3, 2026, date of birth, and place of birth. We will not publish your birth date.
      response: |+
        2/4/1980, born in Great Falls, MT

    - question: What other biographical information do you want voters to know about you?
      response: |+
        When I got back to the states after serving overseas, I put my West Point Engineering degree to use fixing power plants. I know how our grid works and I’ll fight for lower utility costs and more sustainable energy to protect Montanans.

    - question: Your constituents ask you for help with the failure of a major infrastructure project, the cost of which is more than state and local governments can raise. You can direct federal money to the project through an earmark, or you can leave the funding decision up to a federal agency, in which case the decided outcome won't be yours. Which strategy are you most likely to pursue, and why?
      response: |+
        Both. I will work tirelessly for the interests of my constituents and preserving Montana's economy and way of life. To do that, I will take advantage of as many avenues as possible to make sure I am bringing the federal resources and support the District needs. Montana has waited long enough for federal investment in our infrastructure. I'm not going to leave resources on the table over procedural preferences — I'll use every tool available and push through both channels simultaneously. I will not fight with one hand tied behind my back.

    - question: Describe your approach to management of federal lands when conflicts arise between conservation, energy development, recreation, and tribal sovereignty.
      response: |+
        Public lands are a vital part of our life in Montana, yet this administration has made clear they will sell our public lands to the highest bidder. I will not allow that to happen. Montana's outdoor recreation economy generates $3.4 billion and supports nearly 31,000 jobs — these are critical drivers of our local economy and our way of life, and they depend on keeping public lands in public hands.
        When conflicts arise between conservation, energy, and recreation, Montanans — not Washington politicians or corporate lobbyists — should be driving those decisions. Development cannot come at the expense of the ranching, hunting, and recreation economy our communities depend on that are supported by our public lands.
        Tribal sovereignty is not a negotiating chip. Treaty rights are the supreme law of the land. Any decisions affecting federal lands near or overlapping Tribal territory must be made in genuine government-to-government consultation — not handed down from Washington without Tribal input. I will fight to make sure that's honored.

    - question: Identify two national priorities that are not addressed in this questionnaire that are important to your platform. Briefly explain your position on each and tell voters how you intend to address them. If there’s an existing bill you support to advance your position, please identify it.
      response: |+
        Working Montanans are being crushed by rising costs. Groceries, housing, utilities, healthcare — prices are up while wages stand still. The biggest corporations and their Washington allies have rigged the rules in their favor and working families are paying the price. I'll fight to close the loopholes that let multinationals dodge taxes while middle-class families foot the bill, crack down on corporate price gouging, and restore workers' right to organize and bargain for fair wages.
        Montana's ag families are getting squeezed from both ends. Montana sends 46% of exports to Canada, and wheat and lentil exports alone represent a $1.2 billion piece of our economy. Retaliatory tariffs are slamming shut the markets our producers spent decades building. Montana is one of the states most dependent on imports from tariffed countries — over 94% of what we bring in comes from Canada, Mexico, and China, including the fertilizer our farmers depend on, which has already risen 25% in price. Blanket tariffs that punish the people who feed this country aren't trade policy, they're recklessness. I'll fight to end them and push for targeted enforcement that opens markets instead of closing them.

