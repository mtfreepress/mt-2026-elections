  questionnaireMaterial:
    - question: When a president deploys U.S. armed forces into combat for a month or longer without authorization, should the War Powers Resolution of 1973, which gives Congress the power to declare war, be enforced? If not, should the War Powers Resolution be revised, replaced, or discarded? Briefly explain your reasoning.
      response: |+
        Iran is the world’s leading state sponsor of terrorism and we must put an end to Iran’s nuclear enrichment capability, never allow them to develop a nuclear weapon, stop their sponsorship of terrorism and halt their ballistic missile development, but this war is not the answer.
        I served in Iraq, and have seen the consequences of an ill-thought out and misguided war. President Trump has not been honest with the American public about his war in Iran. He has failed to articulate his justification for putting American Service Members in harm’s way, and changes the objective nearly every day. He is ignoring military experts and has no plan.
        Now, we are all paying the cost. American service members are dying. The price of gasoline and fertilizer are skyrocketing, and we are spending over a billion dollars a day on this war, all while President Trump cuts Medicaid, forces rural hospitals to close and strips Montanans of their health care.

    - question: Many of Montana's rural hospitals and clinics are facing financial stress because of low patient volume and tight budget margins. What, if anything, should Congress be doing to support Montana’s health care providers?
      response: |+
        Our healthcare system is broken and this administration’s devastating Medicaid cuts to pay for tax breaks for the wealthiest mean that rural hospitals and health clinics have been put on the chopping block. I myself am 45 minutes from the nearest emergency room. The lack of services in rural areas is a crisis, and one that disproportionately impacts our Tribal communities. Congress needs to protect and fully fund Critical Access Hospitals operating on razor-thin margins and expand loan repayment programs to recruit and retain doctors, nurses, and providers in rural and Tribal communities that have gone without long enough.
        But rural hospitals can't survive if their patients can't afford to be patients. That's why I'll fight to make expanded ACA premium tax credits permanent, expand the number of prescription drugs Medicare can negotiate on, and extend Medicare to cover dental, vision, and hearing. I'll fight to stop Wall Street private equity from buying up rural hospitals, stripping them for profit, and leaving communities with nothing. Meanwhile, I'll fight to outlaw insurance companies from using AI to deny coverage decisions — because Montanans deserve a healthcare system that answers to patients, not profits.

    - question: Describe two issues unique to Montana that you intend to address. Explain how you’ll get the job done.
      response: |+
        As a fourth-generation Montana rancher and former Chief of Staff for the Montana Farmers Union, I know ag families are the backbone of our state. I helped create a USDA-certified meat-processing co-op so producers could keep more of their hard-earned money and put it back into their communities. In Congress, I'll fight to give small processors a fighting chance, require country of origin labeling so Montanans always know where their beef is from, and pass right-to-repair so when a tractor breaks at harvest, a farmer can fix their own equipment without waiting weeks for a corporate technician.
        Montana is losing its next generation. Young Montanans are being priced out by lack of opportunity and a false choice between expensive degrees and leaving the state. Apprenticeships and trade schools offer a better path. They let Montanans work from day one without crushing tuition debt and into jobs averaging more than $60,000 a year. I'll fight to expand federal investment in apprenticeships and career and technical education so every young Montanan has a real path to a good-paying job right here at home. But a good job only keeps people here if they can afford a place to live.

    - question: Identify options or strategies available to federal officeholders to address home ownership and cost of living in Montana.
      response: |+
        Montana home prices have risen more than 60% in the last five years. Hard-working families are being priced out of communities they've lived in for generations, and Wall Street is making it worse. Corporate investors are buying up single-family homes, driving up prices, and turning Montana neighborhoods into profit centers. I'll fight to pass the Stop Wall Street Landlords Act to end the tax breaks that subsidize this practice and put those homes back in the hands of Montana families — this is one issue where even this administration agrees.
        But stopping the bleeding isn't enough. We need to build more housing. I'll fight for federal incentives for affordable housing construction tailored to each community's needs, and expand first-time homebuyer tax credits so that when a young Montanan is ready to put down roots, they can actually afford to.

    - question: Briefly describe any traits and actions that would distinguish your service from that of the elected official who currently occupies the office you’re running for.
      response: |+
        I’m not a career politician and I’m not who either party in Washington has picked for this seat. That’s because I’m going to fight for our way of life no matter what and I’ll stand up to anyone who will continue to make life harder for our community.
        Montana is a unique and special place. My family ranch has been part of the landscape since the 1800s. My roots here run damn deep. And now our way of life is under attack. Families can’t afford homes. Every young Montanan who grew up here like me deserves to stay here. We’re losing the next generation of Montanans to an affordability crisis. All while this administration and our current federal delegation watch as their tariffs target our ranchers and farmers who are doing everything they can just to get by.
        I swore an oath to my country when I was 18 years old, I flew Blackhawk helicopters and served in Iraq and I’ve been serving ever since. Corporate interests, billionaires, millionaires, and corrupt out-of-touch politicians have decided that they get to make the rules. And I’m standing up to that. That’s what this campaign is about.

- candidateName: Reilly Neill
  nameSlug: reilly-neill
  bioMaterial:
    - question: Please describe any professional and/or life experiences that will help voters assess your qualifications for the office you’re seeking.
      response: |+
        Reilly Neill is a Montana businesswoman, former state legislator, and U.S. Senate candidate. Neill has spent decades working in Montana communities through journalism, public service, and local advocacy. Her campaign focuses on strengthening Montana's economy and defending democratic institutions that serve Montana communities.

    - question: Where do you live currently? Where (city and state) were you born? How long have you lived in Montana?
      response: |+
        Reilly was born in Dublin, Ireland to American citizens and raised in a Navy family. She grew up on the west coast of Ireland and in Millington, Tennessee. She moved to Montana in the late 1990s and lived in Potomac and Seeley Lake. She has lived in the Livingston area for over 25 years.

    - question: Age as of Nov. 3, 2026, date of birth, and place of birth. We will not publish your birth date.
      response: |+
        Reilly is 52 years old. She was born September 7, 1973 in Dublin, Ireland.

    - question: What other biographical information do you want voters to know about you?
      response: |+
        Reilly founded a weekly newspaper in Livingston, Montana in 2003 which she published for over a decade from a downtown office on Main and Lewis Streets. She and her husband Brad Snow, whose family goes back four generations in Montana, have raised their children in the public schools and athletic programs of the Livingston area.

    - question: Your constituents ask you for help with the failure of a major infrastructure project, the cost of which is more than state and local governments can raise. You can direct federal money to the project through an earmark, or you can leave the funding decision up to a federal agency, in which case the decided outcome won't be yours. Which strategy are you most likely to pursue, and why?
      response: |+
        Relying on earmarks or leaving communities at the mercy of slow federal agencies will not be an option. Instead, I'll work to build systems ahead of demand.

        My proposal for an Irrigation Infrastructure Act will build resiliency ahead of need. The Act creates a standing federal commitment to cover 25 percent of project costs for irrigation boards in drought-prone regions. Communities still decide priorities but federal support shows up as a predictable partner, not a political favor.

        If forced to choose, I would use the earmark as agency-only decisions can stall for years. Neither approach gives Montana the certainty needed to fix aging infrastructure systems. Rules-based programs to build resiliency ahead of need level the field. 

        Montana producers, towns, and tribes depend on infrastructure, especially our water infrastructure. A permanent, transparent funding structure keeps projects moving, protects local control, and ensures federal dollars reach the ground where they're needed most.

    - question: Describe your approach to management of federal lands when conflicts arise between conservation, energy development, recreation, and tribal sovereignty.
      response: |+
        Montana’s public lands are a trust. Management must reflect that responsibility.

        We need to protect public lands in line with what most Montanans want. People across this state tell us they support access, stewardship, and keeping public lands in public hands.

        Management starts with a baseline of public trust. Public lands are working lands. 

        Grazing, recreation, conservation, and responsible development all have a place, but none should override long-term land and water health. When conflicts arise, decisions must be transparent, science-based, and locally informed, with tribal sovereignty respected at every stage. Tribes are not stakeholders. Tribes are governments with standing.

        Energy development must meet the highest standard. Development should occur only where it does not compromise headwaters, critical habitat, or existing uses. Projects must carry full cost accountability so taxpayers are not left with cleanup or infrastructure burdens.

        I support protecting every square inch of wilderness as it stands today. I also multiple-use management with clear guardrails that does not include encroachment in existing wilderness. We must protect critical habitat and headwaters first, ensure access remains public and require full cost accountability for development so communities are not left paying the price.

    - question: Identify two national priorities that are not addressed in this questionnaire that are important to your platform. Briefly explain your position on each and tell voters how you intend to address them. If there’s an existing bill you support to advance your position, please identify it.
      response: |+
        Data Centers and Infrastructure Accountability
        Artificial intelligence and data centers are reshaping the economy and placing enormous demands on electricity and water. In Montana, these projects risk straining rural grids, raising rates, and competing with agriculture for resources. 

        I support a four-year moratorium new data center construction and federal standards requiring full transparency on energy and water use, local approval authority, and full cost responsibility for infrastructure. I will pursue legislation modeled on resource extraction frameworks so communities are not left subsidizing private industry. Development must benefit Montana, not burden it.

        Raising the Minimum Wage
        Working people should not fall behind while costs rise. I support increasing Montana minimum wage to the federal standard and raising the federal minimum wage to index it to inflation. In a state with one of the highest costs of living in the nation, wages need to keep pace over time. 

        Montana’s economy depends on workers who can afford housing, food, education, and healthcare. I support efforts like the Raise the Wage Act to lift incomes, strengthen local economies, and ensure work is valued across rural and urban communities alike.

  mtfpTitle: TK here
  mtfpWrittenBio: |+
    TK MTFP-written bio

  questionnaireMaterial:
    - question: When a president deploys U.S. armed forces into combat for a month or longer without authorization, should the War Powers Resolution of 1973, which gives Congress the power to declare war, be enforced? If not, should the War Powers Resolution be revised, replaced, or discarded? Briefly explain your reasoning.
      response: |+
        The War Powers Resolution should always be enforced. 

        When a president deploys U.S. forces into combat for a month or longer without congressional authorization, Congress must act. War is not a personal power vested in one office. Decisions of this magnitude demand public accountability and democratic consent and the Constitution clearly gives Congress the authority to declare war and potentially send Montana's sons and daughters into combat. 

        If loopholes or ambiguity weaken the Resolution, Congress should strengthen it, not discard it. Montana families send sons and daughters to serve. They deserve a government that treats war as a grave choice, not a unilateral impulse. 

        No president should get a blank check for prolonged conflict.

    - question: Many of Montana's rural hospitals and clinics are facing financial stress because of low patient volume and tight budget margins. What, if anything, should Congress be doing to support Montana’s health care providers?
      response: |+
        Montanans on the ground tell us they want universal healthcare. 

        Rural hospitals operate on thin margins, low patient volume, and unstable reimbursement. Veterans across Montana struggle to access care close to home, and Medicare Part B access remains limited in many rural areas due to provider shortages. 

        Congress should act to stabilize rural funding, expand provider incentives, and strengthen telehealth and infrastructure. Long term, we need a Universal Healthcare Act that guarantees baseline coverage and makes the federal government the payer of record. 

        The Universal Healthcare approach will bring predictable revenue into rural systems, keep doors open, and ensure care reaches every community.

    - question: Describe two issues unique to Montana that you intend to address. Explain how you’ll get the job done.
      response: |+
        Water Infrastructure and Drought Resilience
        Across Montana, aging irrigation systems and persistent drought threaten agriculture, drinking water, and local economies. Projects like the Milk River system exceed what local communities can fund alone. I'll advance a federal Irrigation Infrastructure Act to provide a 25 percent cost share for projects in drought-prone regions, giving irrigation districts the certainty to plan and build. 

        I'll work with tribes, local boards, and federal partners to prioritize shovel-ready projects and protect headwaters and water rights. Water is the foundation of Montana’s economy, and we need a system that delivers before crisis hits.

        Rural Healthcare Access
        Montanans on the ground tell us they want universal healthcare. Rural hospitals operate on thin margins, veterans struggle to access nearby care, and provider shortages limit Medicare access across large parts of the state.

        I'll push for a Universal Healthcare Act that guarantees baseline coverage and stabilizes rural systems with predictable funding. I will also expand workforce incentives, telehealth, and infrastructure so care reaches every community.

    - question: Identify options or strategies available to federal officeholders to address home ownership and cost of living in Montana.
      response: |+
        Home ownership and cost of living in Montana come down to supply, wages, and accountability.

        First, we need to increase housing supply that working people can afford. I support federal investment in workforce housing, incentives for local construction, and limits on speculative and corporate purchases that drive up prices without adding value to communities.

        Second, wages must keep pace. I support raising the minimum wage and indexing it to inflation so Montanans can afford to live where they work.

        Third, we must address the hidden drivers of cost. Healthcare, energy, and infrastructure all feed into housing affordability. A Universal Healthcare Act lowers household costs. Strong oversight of energy and data center development protects ratepayers.

        Finally, federal policy should prioritize rural communities, not overlook them. Montana families should not be priced out of their own towns.

    - question: Briefly describe any traits and actions that would distinguish your service from that of the elected official who currently occupies the office you’re running for.
      response: |+
        Montanans have an opportunity to elect a true representative of the people.

        I announced my run for U.S. Senate the day after the 2024 election and have been on the ground ever since, holding roundtables, visiting communities, and listening directly to Montanans across the state. Showing up is not a campaign tactic. It's how representative government works.

        Daines stepped away from this race at the last minute and has not shown up for town halls or open forums in years. I will not step away, and I will not give up on Montana.

        My service will be defined by presence, accountability, and independence. I will hold regular town halls, meet with constituents in every region, and make decisions based on what I hear on the ground, not party pressure or national talking points.

        I will work for all Montanans, for small government that works for working people and stays out of our business.

- candidateName: Nick Sheedy
  nameSlug: nick-sheedy
  bioMaterial:
    - question: Please describe any professional and/or life experiences that will help voters assess your qualifications for the office you’re seeking.
      response: |+
        I've had an interest in government from a young age.  I enjoyed participating in speech and debate and the YMCA Youth Legislature in high school, representing Montana at the Youth Governor's Conference in Washington, DC, in 1991, after attending Montana Boy's state that summer where our cohort was mentored by Marc Racicot -- then the Attorney General and running for Governor.  I majored in Political Science at Linfield College (graduated 1996), and have spent many years advocating for private property rights, tax reform, multiple use of public lands, and better forestry practices.  I've worn many hats over the years, did post-graduate work to be a high school history and civics teacher, was a commercial radio announcer, owned and operated a forestry contracting company, and was a caregiver for adults with autism.  For the past fourteen years I have pursued my passion as a professional genealogist and research historian, serving as the Associate and Lead Genealogist for the PBS television show Finding Your Roots for ten seasons.  My wife Chelsea is a clinical counselor who is passionate about helping survivors of domestic violence and children with developmental disabilities.

    - question: Where do you live currently? Where (city and state) were you born? How long have you lived in Montana?
      response: |+
        I live near Columbia Falls.  I was born in John Day, Oregon.  We moved to Montana in 1988, and I graduated from Bigfork High School in 1992.  After college, I moved around, but often found myself back in western Montana.  In 2020, my wife and I decided to raise our four young sons in the Flathead Valley.  I have deep roots in the Pacific Northwest going back to the fur trade, gold rush and pioneer railroading eras – for instance, my great-great-grandfather, Robert H. Sheedy, oversaw construction of the west end of the Hi-Line from Columbia Falls through what is now Whitefish and on to Libby in 1904, and served as Roadmaster for the Great Northern Railway until 1920.  While I feel that our roots can ground a person, we cannot sit on our laurels, and must learn from the past as we plan the future.

    - question: Age as of Nov. 3, 2026, date of birth, and place of birth. We will not publish your birth date.
      response: |+
        52.  DOB = 12 Feb 1974.

    - question: What other biographical information do you want voters to know about you?
      response: |+
        I am deeply committed to protecting individual liberty, reducing the role of government and coercive regulations in our daily lives, advocating for sensible management of our natural resources, encouraging our agricultural, energy, and other productive industries, turning our country away from endless undeclared wars and foreign entanglements, and advocating for policies that embrace peace and encourage prosperity.

    - question: Your constituents ask you for help with the failure of a major infrastructure project, the cost of which is more than state and local governments can raise. You can direct federal money to the project through an earmark, or you can leave the funding decision up to a federal agency, in which case the decided outcome won't be yours. Which strategy are you most likely to pursue, and why?
      response: |+
        I would consider the value of the infrastructure project, and the role that the federal government has under the US Constitution.  I would always prefer for Congress and our elected representatives to make decisions how to spend taxpayers' money, rather than delegate that authority and leave it to the discretion of federal agency employees.

    - question: Describe your approach to management of federal lands when conflicts arise between conservation, energy development, recreation, and tribal sovereignty.
      response: |+
        I am a firm believer in multiple use of our public lands and resources that are currently controlled by federal agencies.  We need more boots on the ground and to rebuild the infrastructure and workforce that is necessary to manage our vast and valuable public resources effectively.  Our public lands and renewable resources should be actively managed to improve production as well as conservation and recreational opportunities in the same areas.  Energy is a basic life-supporting human need, and public policy concerning energy development must recognize this fact. There should be more local and state involvement in the stewardship of public lands that the federal government currently controls.  The recent collaborative agreements that will have the Montana DNRC administer forestry projects on a few hundred thousand acres of national forest lands in western Montana under the Good Neighbor Authority Program are small steps in the right direction.  I am very concerned how so many projects are derailed by so-called stakeholders.  I believe that real stakeholders must have an actual stake in a project.  I believe that tribal sovereignty and all provisions of treaties should be respected.

    - question: Identify two national priorities that are not addressed in this questionnaire that are important to your platform. Briefly explain your position on each and tell voters how you intend to address them. If there’s an existing bill you support to advance your position, please identify it.
      response: |+
        One priority that is important to my platform is reining in the ever-increasing power of the federal bureaucracy.  The recent SCOTUS ruling reversing the Chevron Deference was long-overdue.  We need to go much further to change how the Administrative Procedures Act of 1946 has been abused by agencies who use it not only to form agency policies to implement statutory directives passed by Congress, but end up creating rules and regulations that have the force and effect of law.

        We need to address our ever-ballooning national debt and continual deficit spending.  I will advocate for a balanced budget amendment to the US Constitution and serious measures to reign in our national debt.  While so-called liberals and so-called conservatives blow hot air about entitlements and taxes, these camps end up in lock-step when it comes to continuing deficit spending year after year and mortgaging our children's and grandchildren’s futures.

  mtfpTitle: TK here
  mtfpWrittenBio: |+
    TK MTFP-written bio

  questionnaireMaterial:
    - question: When a president deploys U.S. armed forces into combat for a month or longer without authorization, should the War Powers Resolution of 1973, which gives Congress the power to declare war, be enforced? If not, should the War Powers Resolution be revised, replaced, or discarded? Briefly explain your reasoning.
      response: |+
        The War Powers Resolution of 1973 should be strengthened so that the President cannot engage in war without Congress declaring war, as prescribed by the US Constitution.  Moreover, I would advocate to reform the organization of the National Guard and ensure that our national guardsmen are not called into federal service or deployed for foreign wars except for the purposes clearly stated in the US Constitution -- to execute the laws of the union, suppress insurrections and repel Invasions.  The constitutional power to call forth the militia for federal service is vested in Congress -- not the President.

    - question: Many of Montana's rural hospitals and clinics are facing financial stress because of low patient volume and tight budget margins. What, if anything, should Congress be doing to support Montana’s health care providers?
      response: |+
        While federal laws and policies should not hinder healthcare services to rural areas, I am not sure the federal government has or should have a significant role to play when it comes to local hospitals and clinics – except for federally-operated resources like VA hospitals and clinics that serve our veterans.  I believe that the best way for Congress to improve access to healthcare generally would be to lower the regulatory burden, which artificially restricts the supply of healthcare providers.

    - question: Describe two issues unique to Montana that you intend to address. Explain how you’ll get the job done.
      response: |+
        I believe that the "Montana Plan" to limit corporate influence in elections and our voter registration system that does not have voters declare a party affiliation can be good models for improving our election system across the country.

        I would like to see federal legislation pass that nullifies the 2012 Supreme Court decision in American Tradition Partnership v. Bullock that struck down Montana’s century-old 1912 Corrupt Practices Act.  I would also like to see federal legislation pass that nullifies the Supreme Court's 2010 decision in Citizens United v. Federal Election Commission by limiting all financial contributions to political campaigns and committees to persons who are eligible to vote in the United States.  Corporations obviously cannot and should not enjoy all of the natural or constitutional rights, privileges and immunities that a natural person has -- for instance, corporations and unions do not have a right to life because they are not alive, and they cannot register to vote.  It is absurd that corporations and unions should be recognized as persons with First Amendment rights to free speech that allows them to make unlimited expenditures to influence elections.

    - question: Identify options or strategies available to federal officeholders to address home ownership and cost of living in Montana.
      response: |+
        The most important thing that federal officeholders can do to address home ownership and cost of living in Montana and across the country is monetary reform that does not allow the value of our currency to be eroded continually.  We should end the Federal Reserve and the federal banking cartel that has destroyed the value of the US Dollar with continual inflationary policies, money-supply controls and interest rate manipulation.  The US Constitution grants Congress the exclusive authority to coin money, regulate the value of money in the United States, and regulate the value of foreign money.  Congress cannot divest itself of a constitutional power or delegate this authority to any other branch of government, much less a quasi-public entity with very little accountability to Congress or the American people.

    - question: Briefly describe any traits and actions that would distinguish your service from that of the elected official who currently occupies the office you’re running for.
      response: |+
        As a Libertarian, I am not beholden to my party or my party leadership.  My only obligations would be to my constituents, my oath to uphold the US Constitution, and my own conscience.  I would have an advantage in a Congress that is primarily controlled by two dinosaur parties, which largely serve their own ambition for power and control.  This would place me in a favorable position to curry favor when votes on legislation may be tight, to influence legislation and other members of Congress, and to advocate for my constituents in Montana.

