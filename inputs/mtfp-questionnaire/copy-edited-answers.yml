    - question: What other biographical information do you want voters to know about you?
      response: |+
        I am married to Lyle who was one first people to deploy to Afghanistan after 9/11. He is a retired active duty supervisory special agent as well. We have a daughter, Olivia, who is a junior in high school.

    - question: Your constituents ask you for help with the failure of a major infrastructure project, the cost of which is more than state and local governments can raise. You can direct federal money to the project through an earmark, or you can leave the funding decision up to a federal agency, in which case the decided outcome won't be yours. Which strategy are you most likely to pursue, and why?
      response: |+
        I would prefer to advocate myself on behalf of Montana and direct that money through an ear mark. I've worked in the federal government since 2004. I understand how to most quickly obtain the funds, and I have the relationships to find the right people in every agency to push solutions through as quickly as possible.

    - question: Describe your approach to management of federal lands when conflicts arise between conservation, energy development, recreation, and tribal sovereignty.
      response: |+
        My professional success is largely due to my ability to create win-wins for all parties. When conflicts arise regarding federal lands, I would bring all parties to the table, and identify what a true win looks like for each. Often times, it takes some additional communication and time to understand the true needs and wants of every entity. But I've spent my career helping everyone win, and I will do the same on behalf of Montana.

    - question: Identify two national priorities that are not addressed in this questionnaire that are important to your platform. Briefly explain your position on each and tell voters how you intend to address them. If there’s an existing bill you support to advance your position, please identify it.
      response: |+
        1. Accountability. I am a "root cause" person. We are struggling as a country largely due to a lack of accountability at all levels. Had Wall Street been held accountable for poor management of subprime loans, we would not have had the 2008/2009 housing crisis that has contributed to the massive housing issues we have today. Epstein occurred, because there no accountability at any level of the sexual abuse of our most vulnerable. I have put government officials in jail, and I look forward to doing the same in DC. 2. Agriculture. I don't have to be in ag to respect and support those who put food on our tables. I would fight to support the health and wellbeing of Montana's farmers and ranchers both from a business and mental health perspective.

  mtfpTitle: TK here
  mtfpWrittenBio: |+
    TK MTFP-written bio

  questionnaireMaterial:
    - question: When a president deploys U.S. armed forces into combat for a month or longer without authorization, should the War Powers Resolution of 1973, which gives Congress the power to declare war, be enforced? If not, should the War Powers Resolution be revised, replaced, or discarded? Briefly explain your reasoning.
      response: |+
        Checks and balances are the reason why democracy has worked for 250 years. The President is required to notify Congress within 48 hours of deploying troops into hostilities and mandates their withdrawl within 60-90 days unless Congress declares war or authorizes force. The War Powers Resolution should absolutely be enforced. I stand by the original intent and will support its full enforcement

    - question: Many of Montana's rural hospitals and clinics are facing financial stress because of low patient volume and tight budget margins. What, if anything, should Congress be doing to support Montana’s health care providers?
      response: |+
        Healthcare -- as part of greater affordability issues which include housing and the cost of food and gas -- is one of my top priorities. We are the richest country in the world, and there is no reason why every Montanan should not have access to quality healthcare. My solution to rural funding is something I've spoken of often: take it from the defense budget. If we claw back the hundreds of billions in end-of-year use-lose military spending, it would easily fund rural healthcare with zero impact to national security. As a retired Air Force LtCol, I am aware of how the budget cycles work and believe we can be better stewards of tax payer dollars while protecting our country.

    - question: Describe two issues unique to Montana that you intend to address. Explain how you’ll get the job done.
      response: |+
        1. Public lands. I would never allow the exploitation or development of our public lands. I would build coalition to ensure both sides of the aisle support the protection of America's greatest treasure. 2. Education. Montana teachers are some of the most poorly paid in the country. Funding education gives our children the best onramp to success. And when graduates have felt supported by their education systems, they aspire to greater things and want to stay and give back to their communities more. I chose to specialize in child sex crimes, because I believe every child deserves to have hope and every available avenue to pursue any career. Whether college, trade school, starting a business, military, etc, I deployed and was shot at and mortared so every child could grow up free from trauma and live their own American dream. We will fund education, because it's the best avenue out of poverty.

    - question: Identify options or strategies available to federal officeholders to address home ownership and cost of living in Montana.
      response: |+
        1. Raise the capital gains limit from $250K to $500K. Many people are holding onto homes, because they don't want to pay capital gains taxes. The law is great but was done in the 90s. If we raise the limit, more people will sell homes which will create more inventory and drive home prices down. 2. Give tax breaks to construction companies whose portfolio has a minimum of 30% affordable houses. 3. Medicaid for All paid for by use-lose military funds.

    - question: Briefly describe any traits and actions that would distinguish your service from that of the elected official who currently occupies the office you’re running for.
      response: |+
        I actually talk to Montanans about what they're experiencing and host town halls. I would also actually show up and vote. I believe in government working for all Montanans; not just the 1%.

- candidateName: Seth Bodnar
  nameSlug: seth-bodnar
  bioMaterial:
    - question: Please describe any professional and/or life experiences that will help voters assess your qualifications for the office you’re seeking.
      response: |+
        I was raised by two public school teachers who inspired me to make service the foundation of my life. At age 18, I joined the military and graduated from West Point a few months before 9/11, became a Green Beret and served 10 years on active duty with multiple deployments to Iraq and other countries.

        After the military, I went into the private sector and worked my way up through GE, spending the bulk of my time in the railroad business, building locomotives and then software to make the rail industry safer. And finally, I was the President of the University of Montana. Our goal was simple: to make a world-class education affordable and accessible to every single Montanan. 

        Under my leadership, UM achieved record high graduation rates, doubled research funding, restored financial stability, and was named the #1 military-friendly university in the country. And that's the kind of leadership I will bring to the U.S Senate.

    - question: Where do you live currently? Where (city and state) were you born? How long have you lived in Montana?
      response: |+
        I moved to Montana in 2017 when I was named the president of the University of Montana. My wife Chelsea is a fifth-generation Montanan, and we are blessed to be raising our three children here. I was born and raised in western Pennsylvania before joining the military at age 18.

    - question: Age as of Nov. 3, 2026, date of birth, and place of birth. We will not publish your birth date.
      response: |+
        47 years old
        2/2/1979 
        Grove City, PA

    - question: What other biographical information do you want voters to know about you?
      response: |+
        Every chapter of my life has been about bringing people together to solve complex challenges and to shape a brighter future for our country and our state. In the military, I served alongside incredible soldiers from all backgrounds and walks of life, and we worked together - under very difficult circumstances - to protect the American people and the ideals of our great country. At UM, I worked closely with Montanans from every part of this state and from across the political spectrum to expand opportunity for every Montanan and to fuel the growth of our state’s economy. 
        I’m a mission-focused, commonsense leader who knows how to work with people to get things done.

    - question: Your constituents ask you for help with the failure of a major infrastructure project, the cost of which is more than state and local governments can raise. You can direct federal money to the project through an earmark, or you can leave the funding decision up to a federal agency, in which case the decided outcome won't be yours. Which strategy are you most likely to pursue, and why?
      response: |+
        When I get to Washington, I won’t be wearing a jersey with a “D” or an “R” on it. My bosses are the people of Montana. I commit that I will work locally with Montanans on all federal projects and bring their ideas to the U.S Senate, not work through a broken political party process that leads to gridlock and inaction. My mission is to get the job done for Montana, and that’s what I’ll do.

    - question: Describe your approach to management of federal lands when conflicts arise between conservation, energy development, recreation, and tribal sovereignty.
      response: |+
        When it comes to managing our federal public lands, Montanans need to lead the way. People in Washington need to take their orders from the folks that live, work, hunt, fish, and recreate on our public lands. I’ll work directly with communities to make sure we are making science-based, responsible management decisions.

    - question: Identify two national priorities that are not addressed in this questionnaire that are important to your platform. Briefly explain your position on each and tell voters how you intend to address them. If there’s an existing bill you support to advance your position, please identify it.
      response: |+
        First, I believe that all members of Congress should be banned from trading stocks. Politicians should not profit from insider information gained through public service.

        The national debt is a moral failure. It’s a massive bill that we are passing to Montana’s children and grandchildren. Politicians have spent decades making promises they couldn’t pay for while using the debt ceiling as a political weapon, and our kids are getting stuck with the bill.

  mtfpTitle: TK here
  mtfpWrittenBio: |+
    TK MTFP-written bio

  questionnaireMaterial:
    - question: When a president deploys U.S. armed forces into combat for a month or longer without authorization, should the War Powers Resolution of 1973, which gives Congress the power to declare war, be enforced? If not, should the War Powers Resolution be revised, replaced, or discarded? Briefly explain your reasoning.
      response: |+
        As someone who served this nation in combat, I know firsthand the gravity of sending America’s sons and daughters to war. It is the Constitutional responsibility of Congress to declare war, and Congress needs to do its job. Congress is a coequal branch of government to the Executive, but because of the partisan warfare infecting Washington, members of Congress are more interested in serving their party than they are in living up to their Constitutional responsibilities. As a result, members of Congress are ceding far too much power to the executive branch. 


        I’m running as an Independent because our political system has been broken by party elites who care more about trading power back and forth than doing what’s right for Montana or the American people.

    - question: Many of Montana's rural hospitals and clinics are facing financial stress because of low patient volume and tight budget margins. What, if anything, should Congress be doing to support Montana’s health care providers?
      response: |+
        Our rural hospitals are a lifeline to communities across Montana, but politicians in Washington, DC are making it harder for them to serve folks in rural America. The recent budget bill, which passed on a partisan, party-line vote, will kick more than 30,000 Montanans off their healthcare and cause our rural hospitals to lose more than $5 billion in critical resources, all to pay for tax cuts to the wealthiest Americans. That is Washington working for the wealthy and connected, while leaving families in our state out in the cold. That’s unacceptable.  


        As an Independent, I will work with Senators from all sides to build commonsense solutions that will give our rural hospitals the resources they need to serve communities across our state. I will also support telehealth expansion and rural healthcare workforce incentives to close the access gap in underserved communities and get more doctors and nurses into rural communities. I will oppose any attempt  to cut resources to our state’s critical access hospitals, and I will defend Medicaid Expansion and oppose reckless cuts that would strip coverage from working Montanans.

    - question: Describe two issues unique to Montana that you intend to address. Explain how you’ll get the job done.
      response: |+
        Montana farmers and ranchers feed the world, and we need to have their back. We need commonsense trade policy that protects critical industries and opens key markets, not a chaotic, ever-changing tariff policy that drives up costs, crushes export markets, and creates instability for our producers and small businesses. Tariffs should be used as tools, not toys. I will reassert Congress's authority and push back when the careless use of tariffs hurts hard-working Montanans. 

        The Sentinel missile program is a multibillion dollar program to modernize our nation's nuclear deterrent. I will fight to ensure the Sentinel project uses Union Montana workers - not out-of-state contractors- and that the surrounding communities benefit from the economic activity, with proper infrastructure support.

    - question: Identify options or strategies available to federal officeholders to address home ownership and cost of living in Montana.
      response: |+
        Housing affordability is a challenge facing Montanans at every stage of their lives. The average age of a first-time home buyer in Montana has gone up by nearly a decade, and many of our young people cannot afford to buy a home in the community where they grew up. And I recently heard from a retiree at one of our events in Helena that she will soon have to spend nearly 75% of our Social Security check (her only source of income) just to pay her rent. She’s likely to be forced to move. The current situation is unacceptable. If you’re willing to show up and put in a hard day’s work, you should be able to put a roof over your family’s head. 


        The answer is clear: we need to build more houses. We can start by cutting red tape, using incentives in the tax code, and fixing supply chain issues that make it harder to build new, affordable homes. And we need to put rules in place that prevent big private equity firms from buying up huge numbers of single-family homes. 


        Possible solutions are there, but we need to fix the partisan gridlock of our broken political system and actually get things done for Montana families. Congress needs to spend less time fighting with each other and actually get to work addressing this issue.

    - question: Briefly describe any traits and actions that would distinguish your service from that of the elected official who currently occupies the office you’re running for.
      response: |+
        I’ve spent my entire career leading institutions that are supposed to serve people – and I know the difference between an institution that’s fulfilling its mission and one that’s been captured by the people running it. As a Green Beret, you learn fast that rank and title mean little if you’re not actually serving the mission and the people beside you. That standard shouldn’t change in the Senate. 

        Montanans deserve an Independent Senator that is not beholden to political insiders in DC and who knows that the people of Montana are his boss, not party leaders. That's the main difference between me and my Republican opponent. He was handed the Republican nomination through an insider deal orchestrated by party elites, and that’s who he’ll work for if elected. When I’m elected, I’ll work each and every day to serve the people of this great state. 

        Washington doesn’t need more politicians who know how to game the system. It needs people who are focused on fixing it.

- candidateName: Russell Cleveland
  nameSlug: russell-cleveland
  bioMaterial:
    - question: Please describe any professional and/or life experiences that will help voters assess your qualifications for the office you’re seeking.
      response: |+
        I grew up on a farm in Stevensville, MT, before goin on to play football and study engineering at Montana Tech. I left to join the Navy, where I worked in avionics as a flight line inspector. After honorably discharging, I completed my Bachelors in Nutrition and received a Masters of Business Administration. I served small businesses and managed multi-million dollar budgets for ten years in high finance before starting a business of my own in childcare, growing it from a startup to serve 42 locations and 9,000 families as Colorado's leading childcare provider. My wife, Kate, and I lost our older daughter, Madison, to Leukemia at the age of 13 in 2020, and then nearly lost our youngest daughter, Melia, to a different rare lung disease called pulmonary capillaritis. We spent years fighting health insurance companies and corporate greed during both experiences, like being billed $300k after insurance for 1 month of leukemia treatment, or $10,000 a month for a drug that costs only hundreds to manufacture just to keep Melia alive. I now coach track and football while running a ranch in Saint Regis where Kate and I take care of our six children.

    - question: Where do you live currently? Where (city and state) were you born? How long have you lived in Montana?
      response: |+
        I currently live in Saint Regis. I was born in San Diego, California, where my parents (raised in Townsend, MT) lived while my father served in the U.S. Navy. After his enlistment ended, we moved home to Stevensville, where I was raised from Kindergarten on. I've lived in Montana for 21 years of my life.

    - question: Age as of Nov. 3, 2026, date of birth, and place of birth. We will not publish your birth date.
      response: |+
        41 years old, 4/20/85, Naval Station San Diego, CA.

    - question: What other biographical information do you want voters to know about you?
      response: |+
        I am a distant relative of President Grover Cleveland, sharing a common Grandfather, Moses Cleveland.

    - question: Your constituents ask you for help with the failure of a major infrastructure project, the cost of which is more than state and local governments can raise. You can direct federal money to the project through an earmark, or you can leave the funding decision up to a federal agency, in which case the decided outcome won't be yours. Which strategy are you most likely to pursue, and why?
      response: |+
        I would support funding through a federal agency, and here's why. I support single-issue bills. No more tying billions in foreign weapons aid to basic healthcare funding. No more tax cuts for the ultra-wealthy tied to infrastructure projects. When we allow politicians to be pacified into voting for bad legislation because of earmarks to their district, we lose real representation. I will tirelessly and responsibly fight for Montanans' needs.

    - question: Describe your approach to management of federal lands when conflicts arise between conservation, energy development, recreation, and tribal sovereignty.
      response: |+
        We cannot sell off an inch of public lands, especially to wealthy corporations that plan to exploit our resources for profits we will never see. If there must be energy or mineral extraction done on public lands, it must be done with transparent environmental safeguards to protect these resources. Public land management should not in any way interfere with tribal sovereignty. Because the Federal Government has hardly fulfilled its treaty obligations to the Blackfeet and Confederated Salish-Kootenai reservations in Western Montana, I maintain a deep commitment to respecting tribal sovereignty and oppose any effort to weaken or trample over these rights.

    - question: Identify two national priorities that are not addressed in this questionnaire that are important to your platform. Briefly explain your position on each and tell voters how you intend to address them. If there’s an existing bill you support to advance your position, please identify it.
      response: |+
        1.) Money in politics. I proudly endorsed the Montana Plan, which aims to remove political spending in Montana, before any other candidate, Democrat or Republican, entered this race. I have built coalitions of over 300 other nationwide candidates on both sides to form our own day-one caucus and demand an end to stock trading in Congress, overturn Citizens United, institute term limits, a judicial code of ethics, and a moratorium on lobbyists becoming politicians, or politicians becoming lobbyists. Corruption is the root cause of every issue, which is why I am proud to run my campaign without AIPAC, Corporate PAC, Dark Money, or any other form of money that does not come from everyday people. When elected, I will be beholden to the people, not corporations. 

        2.) End Forever Wars. Weapons manufacturers like Lockheed Martin and Raytheon donate tens of millions of dollars to politicians on both sides of the isle. In turn, these politicians vote for war by cutting our healthcare. As a veteran, I've seen waste in the military. We were ordered to fly helicopters for weeks on end to burn the fuel and keep our budget. We cannot keep spending recklessly and starting wars across the globe.

  mtfpTitle: TK here
  mtfpWrittenBio: |+
    TK MTFP-written bio

  questionnaireMaterial:
    - question: When a president deploys U.S. armed forces into combat for a month or longer without authorization, should the War Powers Resolution of 1973, which gives Congress the power to declare war, be enforced? If not, should the War Powers Resolution be revised, replaced, or discarded? Briefly explain your reasoning.
      response: |+
        Yes. I think we should also look at other conditions to trigger mandatory Congressional approval. If a "conflict" includes ground troops or exceeds $1B in spending, it should be treated as a war and require Congressional approval. No more allowing one person to drag nations into endless wars.

    - question: Many of Montana's rural hospitals and clinics are facing financial stress because of low patient volume and tight budget margins. What, if anything, should Congress be doing to support Montana’s health care providers?
      response: |+
        Congress should pass a Medicare for All + system that covers not just healthcare, but eyes, ears, teeth, mental health, and rural transportation costs. Our rural hospitals rely on Medicare and Medicaid funding to stay above water. By expanding this system to every Montanan and American, we can deliver better healthcare at a lower price.

    - question: Describe two issues unique to Montana that you intend to address. Explain how you’ll get the job done.
      response: |+
        1.) Rural Access. While there are other rural states, Montana's size and small cities make the issue worse. Many rural Montanans are forced to drive two or more hours for access to specialists all while footing the bill for gas, food on the road, and many times, overnight stays. We cannot continue to drain the pockets of rural Montanans just for accessing healthcare. The federal government should reimburse the costs, and I would be glad to pass it.

        2.) Data Centers. Montana’s space, small population, and clean water has made it a target for data center development. I would oppose the creation of every data center unless transparent safeguards are met. First, data centers cannot increase utility rates, and must provide islanded power by generating their own electricity. We must also protect our water. Closed loop cooling systems must not contain PFAs or forever chemicals to protect our water when coolants are flushed. Montanans also do not want these centers to power mass surveillance companies like Palantir to spy on Americans. Lastly, if these centers meet these standards and can be developed responsibly, they must be built with union labor.

    - question: Identify options or strategies available to federal officeholders to address home ownership and cost of living in Montana.
      response: |+
        While part of the issue is supply, the larger issue is wages. On the topic of supply, the federal government can subsidize affordable housing across the country and provide conditional grants to municipalities and states with pro-affordable housing statutes and laws (like removing minimum lot size requirements for multi-unit housing). To address wages, I propose a 50:1 ratio on executive to frontline worker pay. This means, the highest paid employee cannot make more than 50x the lowest paid employee. If the business owners/shareholders want to make more money, everyone in the company must do better too. I ran my business this way. We became the first company in the country to open remote learning centers and the largest childcare provider in Colorado by taking care of families and our employees. We paid our workers 30% more than competitors and charged families 20% less all while maintaining the highest quality of care. By increasing pay for corporate workers, we can make local economies healthier, which support small businesses. Increased pay puts home ownership in far better reach than building our way out of the crisis.

    - question: Briefly describe any traits and actions that would distinguish your service from that of the elected official who currently occupies the office you’re running for.
      response: |+
        I would serve Montana for the people and by the people. Ryan Zinke served as a consultant for ConocoPhillips, who turned around and donated hundreds of thousands to him while in office. Likewise, Mr. Zinke's worth grew from around $1M to over $30M in his time in office. I promise to put people, not corporations, at the forefront of my leadership in a way that Mr. Zinke never did.

- candidateName: Sam Lux
  nameSlug: sam-lux
  bioMaterial:
    - question: Please describe any professional and/or life experiences that will help voters assess your qualifications for the office you’re seeking.
      response: |+
        I grew up as the son of a poor, single mother, and have spent my entire life in farming and ranching. I have worked as a ranch hand, cowboy, vet tech, and farrier. I am intimately familiar with the struggles that face the working class, especially our agricultural communities, and I will use that knowledge, as well as my experience as a small business owner, to ensure that the working class is represented by the working class in Congress.

    - question: Where do you live currently? Where (city and state) were you born? How long have you lived in Montana?
      response: |+
        I live in Great Falls. I was born in Ukiah CA. I moved to Great Falls 6 years ago.

    - question: Age as of Nov. 3, 2026, date of birth, and place of birth. We will not publish your birth date.
      response: |+
        30 years old, April 1st 1996, Ukiah CA

    - question: What other biographical information do you want voters to know about you?
      response: |+


    - question: Your constituents ask you for help with the failure of a major infrastructure project, the cost of which is more than state and local governments can raise. You can direct federal money to the project through an earmark, or you can leave the funding decision up to a federal agency, in which case the decided outcome won't be yours. Which strategy are you most likely to pursue, and why?
      response: |+
        Especially in the case of critical infrastructure, which Montana is in critical need of increased investment in, I will immediately move to direct federal funding through an earmark as a stopgap to give relief to local communities, while drafting a bill to identify by need and increase funding for the failing infrastructure, to ensure that communities are not left without critical systems.

    - question: Describe your approach to management of federal lands when conflicts arise between conservation, energy development, recreation, and tribal sovereignty.
      response: |+
        Where circumstances will vary depending on the particulars of a given conflict, I am a firm believer that we need to protect our public lands no matter what. Especially here in "The Last Best Place" of America, our public lands are a core part of who we are. In my opinion, conservation, ecologically conservative recreation, and tribal sovereignty will always be the priority.

    - question: Identify two national priorities that are not addressed in this questionnaire that are important to your platform. Briefly explain your position on each and tell voters how you intend to address them. If there’s an existing bill you support to advance your position, please identify it.
      response: |+
        One of my biggest priorities is to see the needs of our agricultural communities taken care of. I am an advocate of passing the Farm Bill as soon as possible, and given the delays that always accompany omnibus bills, I also seek to advance a number of single issue pieces of legislation to address some of the most pressing concerns of our farmers and ranchers on day one when elected, including a mCOOL bill I have already received the pledge of over 50 candidates nationwide to support and a Right To Repair bill.

        Secondarily, immigration. Especially in the current political landscape, we need a Congress that will act with a clear vision on how we will handle immigration and right the wrongs we have seen across the country, and even here at home. I absolutely believe a secure nation must respect not just its laws, but also its values.

        I support reforming the immigration process to quickly and efficiently welcome lawful asylum seekers, while ensuring border patrol resources aren't being misused against American citizens, and can focus on genuine threats at the border. The current totalitarian overreach by ICE is inexcusable and must be stopped.

  mtfpTitle: TK here
  mtfpWrittenBio: |+
    TK MTFP-written bio

  questionnaireMaterial:
    - question: When a president deploys U.S. armed forces into combat for a month or longer without authorization, should the War Powers Resolution of 1973, which gives Congress the power to declare war, be enforced? If not, should the War Powers Resolution be revised, replaced, or discarded? Briefly explain your reasoning.
      response: |+
        It should absolutely be enforced. As stated in Article I, Section 8 of the U.S. Constitution, the legislative branch has the sole power to declare war. No President, regardless of political affiliation, should be allowed to put the lives of our servicemen and servicewomen at risk, destabilize global relations, and damage our economy unilaterally. Not only is it unconstitutional, but such a consequential decision, which should never be taken lightly, should by necessity require the input of the peoples Representative's.

        The only revision I would support of the War Powers Act would be to increase Congresses ability to protect our troops more swiftly from unauthorized and illegal military actions.

    - question: Many of Montana's rural hospitals and clinics are facing financial stress because of low patient volume and tight budget margins. What, if anything, should Congress be doing to support Montana’s health care providers?
      response: |+
        I am a proponent of the extreme need we have in Montana to increase investment into rural infrastructure. One of the most pressing is to address the healthcare deserts in Eastern Montana and beyond.

        Congress can do two things right away to immediately address this issue. The first is to fund rural primary care facilities that can provide basic health services to a wider range of rural communities. I firmly believe that the cost of investing in these smaller facilities and staffing them will be a net positive for not only these communities, but the nation as a whole, as increased access to even basic care would decrease the number of severe and debilitating conditions that often go unchecked.

        The second thing, and a major component of my campaign, is to aggressively audit and relocate unnecessary subsidies paid to privatized health insurance and pharmaceutical companies towards a single payer healthcare system that can reduce the cost of providing care for all our communities.

    - question: Describe two issues unique to Montana that you intend to address. Explain how you’ll get the job done.
      response: |+
        The hot topic of today is data centers. We have seen what they have done in other states, driving up utility rates, draining local water supplies, and polluting the communities they go into. It will be a priority of mine to radically crack down on this largely unregulated industry and ensure the same does not happen here in Montana. I support a short term moratorium on new data center construction, while we pass legislation to ban open loop data center, require any new construction to invest in a minimum of 115% of their expected power consumption in renewable energy, and create a new tax bracket for these largely automated industries that will mandate that those funds go to local communities infrastructure, education, and workforce development

        Additionally, I think a lot of Montana's other unique challenges can all be solved by the introduction of a comprehensive Rural Infrastructure Bill, to help us address aging water systems like the Milk River, increase grants for public transit between smaller towns, and provide subsidies for critical infrastructure development in our agrarian communities to address the food and healthcare deserts that make life harder for Montanans.

    - question: Identify options or strategies available to federal officeholders to address home ownership and cost of living in Montana.
      response: |+
        I think we can all agree that housing is a major concern for almost every Montanan these days. Costs are going up, and we can't afford it. 

        I will aggressively pursue legislation to change how grant and subsidy programs for new housing are issued so that they prioritize building affordable homes and incentivize their sale to residents of the state over out of staters.

        We need to make sure that when homes are built using federal grant money, they are being built to meet the market demand of LOCAL communities.

    - question: Briefly describe any traits and actions that would distinguish your service from that of the elected official who currently occupies the office you’re running for.
      response: |+
        I won't speak to the actions of others, but I will promise that I will be here, in Montana, in the Eastern District, and accessible and accountable to each and every one of my neighbors from Helena to Sidney and everywhere in between.

        Most importantly, I won't tell communities what I think they need. I will listen to what the people I am supposed to represent tell me they need, and then I will work tirelessly to make it happen for them.

- candidateName: Michael Hummert
  nameSlug: michael-hummert
  bioMaterial:
    - question: Please describe any professional and/or life experiences that will help voters assess your qualifications for the office you’re seeking.
      response: |+
        I am not a career politician. I come from a background of service, work, and problem-solving. I served in the United States Navy, which taught me discipline, responsibility, and the importance of putting the country before self. After that, I spent years in the private sector building and running a business, solving real problems for real people, meeting payroll, managing costs, and being accountable for results.
        My life experience has taught me how to look at a problem, identify the root cause, and work toward a practical solution instead of just talking around it. I have spent my life fixing things, whether that meant working with my hands, running a business, or studying the deeper structural problems facing our government. I understand the pressures families, workers, and small business owners face because I have lived them.
        Voters should assess my qualifications not by how long I have been inside politics, but by whether I have the judgment, independence, and willingness to confront the problems that career politicians have allowed to grow worse. I am running because I believe government needs more honesty, more courage, and more people who know how to fix what is broken.

    - question: Where do you live currently? Where (city and state) were you born? How long have you lived in Montana?
      response: |+
        I live in Helena,  Montana. I was born in Belleville, Illinois, and was raised in a farming community in southern Illinois. After retiring from the United States Navy in 1996, my family and I came to Montana so I could attend the Highway Patrol Academy in Helena.
        We made the trip from Panama City, Florida, to Helena, Montana, the old-fashioned way — crossing the country with a Jeep Cherokee, a U-Haul, four kids, three large dogs, and camping along the way. It was quite an introduction to a new chapter in life. I have lived in Montana ever since.

    - question: Age as of Nov. 3, 2026, date of birth, and place of birth. We will not publish your birth date.
      response: |+
        I will be 67 years old by November 3, 2026, and I was born in Belleville, Illinois, in April 1959.
        More broadly, I believe age and term limits should be part of the discussion about restoring trust in Congress. Public service should be about serving the country, not holding power indefinitely. I support term limits of no more than 12 years in Congress and an age limit of 74 for serving in that body. The stakes are simply too high to ignore the risks that come with entrenched power, careerism, and leadership that stays too long.

        Our government works best when it is connected to the people, open to new energy, and accountable to the future. Fresh eyes, clear thinking, and regular turnover are healthy for representative government. That principle applies to everyone, including those who seek to serve.

    - question: What other biographical information do you want voters to know about you?
      response: |+
        I have lived a life of service, work, and problem-solving. I grew up in southern Illinois, worked on farms, in grocery stores, gas stations, and construction, and learned early the value of hard work. I served first in the Army and then in the United States Navy, where I became a diver, instructor, navigator, and salvage specialist. I served during Desert Storm, taught diving technology, and held technical and leadership roles.
        After retiring from the Navy, I came to Montana in 1996, attended the Highway Patrol Academy, and later built my own construction business, working directly with Montana families and earning their trust.
        I have also spent a lifetime studying politics, human nature, and geopolitics. What qualifies me to serve is not political ambition, but discipline, practical experience, and close attention to how government succeeds and fails.

    - question: Your constituents ask you for help with the failure of a major infrastructure project, the cost of which is more than state and local governments can raise. You can direct federal money to the project through an earmark, or you can leave the funding decision up to a federal agency, in which case the decided outcome won't be yours. Which strategy are you most likely to pursue, and why?
      response: |+
        I would first want to know why a major project moved forward without a realistic funding plan and who is accountable for that failure. Taxpayers should not be treated like an unlimited backstop for bad planning.
        That said, if the project is truly essential to public safety, economic stability, or critical infrastructure, I would be willing to pursue a directed federal appropriation rather than leave the decision entirely to an agency. Elected representatives should be willing to take responsibility for major funding decisions instead of hiding behind bureaucracy.
        My standard would be simple: the project must be necessary, the need must be clearly documented, local and state partners must have done their part, and there must be strict oversight to protect taxpayers. If federal dollars are used, the public deserves transparency, accountability, and a clear explanation of why the project matters.

    - question: Describe your approach to management of federal lands when conflicts arise between conservation, energy development, recreation, and tribal sovereignty.
      response: |+
        Federal lands should be managed with one principle in mind: protect them for future generations. Conservation, recreation, and responsible energy development can coexist, but stewardship must come first. Once public land is damaged or lost, it is not easily restored.
        That means using sound forestry practices, permitting timber harvest where it makes sense, and requiring any company that extracts minerals or develops energy resources to be fully bonded so taxpayers are never left paying for cleanup. It also means protecting access, safeguarding watersheds, and preserving wildlife habitat.
        My approach is simple: use the land responsibly, hold everyone accountable, and never sacrifice long-term public value for short-term profit.

    - question: Identify two national priorities that are not addressed in this questionnaire that are important to your platform. Briefly explain your position on each and tell voters how you intend to address them. If there’s an existing bill you support to advance your position, please identify it.
      response: |+
        Two national priorities missing from this questionnaire are a Balanced Budget Amendment and regulation of artificial intelligence and the corporations that control the algorithms shaping life online.
        First, I support a Balanced Budget Amendment because endless deficit spending is weakening the country and pushing debt onto future generations. Congress should be required to live within its means except in true emergencies. I would support measures such as H.J.Res. 139, a proposed constitutional amendment requiring a balanced federal budget.

        Second, I believe artificial intelligence and major internet platforms must be brought under real accountability. Too many Americans are being manipulated, harmed, or exploited by systems that are supposed to inform and help them. I would push for rules on algorithmic accountability, transparency, and corporate liability. A current example is S. 3193, the Algorithm Accountability Act, which would limit Section 230 protections for certain algorithm-driven platforms.

  mtfpTitle: TK here
  mtfpWrittenBio: |+
    TK MTFP-written bio

  questionnaireMaterial:
    - question: When a president deploys U.S. armed forces into combat for a month or longer without authorization, should the War Powers Resolution of 1973, which gives Congress the power to declare war, be enforced? If not, should the War Powers Resolution be revised, replaced, or discarded? Briefly explain your reasoning.
      response: |+
        Yes, the War Powers Resolution should be enforced. If a president deploys U.S. forces into combat for a month or longer without authorization, Congress cannot be treated as optional. The 1973 law requires the president to notify Congress within 48 hours and generally bars unauthorized hostilities from continuing beyond 60 days.
        But the larger problem is the 2001 Authorization for Use of Military Force signed after September 11. That law is still in effect and has been stretched far beyond its original purpose by successive presidents. I would repeal it and replace it, if necessary, with a narrowly written authorization tied to a specific enemy, place, and time limit.
        America should not drift into open-ended war through vague authorizations and executive habit. If force is used in our name, Congress must debate it, authorize it, and own the decision.

    - question: Many of Montana's rural hospitals and clinics are facing financial stress because of low patient volume and tight budget margins. What, if anything, should Congress be doing to support Montana’s health care providers?
      response: |+
        Rural hospitals and clinics are essential, and once they close, they are extremely difficult to bring back. Congress should start by reversing Medicaid changes that will push more patients off coverage and increase uncompensated care for rural providers. New Medicaid work requirements begin January 1, 2027, and major cuts in federal Medicaid spending are expected to increase the uninsured and add more pressure to rural hospitals.
        Beyond that, Washington should focus on keeping core services open, not dictating every local decision. Some communities may need consolidation, fewer layers of administration, or a more realistic mix of services to stay solvent. Montana’s own rural health plan notes that inpatient use in many rural hospitals is already below 50% of staffed capacity.
        My priority would be simple: keep rural providers open, protect Medicaid support, and give communities the flexibility to make practical changes before a temporary crisis becomes a permanent closure.

    - question: Describe two issues unique to Montana that you intend to address. Explain how you’ll get the job done.
      response: |+
        Three Montana issues I intend to address are forest management, illegal immigration, and drug prevention for children.
        First, Montana needs active forest management, not a policy of watching usable timber burn. We should increase responsible timber harvest, reduce fuel loads, and support sawmills and wood-product manufacturing. That would reduce wildfire risk, strengthen rural jobs, and make better use of our natural resources.
        Second, Montana is a border state, and illegal immigration is not just a southern border issue. A broken national system affects every state, including ours. I would support stronger immigration enforcement and serious reform so Montana is not left dealing with the consequences of federal failure.
        Third, we need a more honest approach to drug prevention. “Just say no” is not enough. Children need to be told the truth about what drugs do, how addiction develops over time, and how lives are slowly destroyed by it. Prevention starts with honesty, not slogans.
        How would I get it done? By respecting the proper federal role, working with Montana communities, and pushing practical solutions instead of empty talking points.

    - question: Identify options or strategies available to federal officeholders to address home ownership and cost of living in Montana.
      response: |+
        Home ownership and cost of living in Montana are affected by federal policy, but they are primarily state and local issues. The most important thing the federal government can do is restore fiscal discipline. A Balanced Budget Amendment would help reduce inflationary pressure, stabilize the economy, and ease the long-term forces that drive up interest rates, mortgage costs, and everyday prices. Mortgage rates remain elevated nationally, and the Federal Reserve continues to say inflation is still somewhat elevated.
        Beyond that, Washington should stop making the problem worse. The federal government should reduce unnecessary regulatory burdens, protect the value of the dollar, and avoid the kind of deficit spending that raises costs for everyone. Montana’s affordability problems are real, but the detailed solutions should come mostly from the state, local governments, and local communities, not one-size-fits-all mandates from Washington.

    - question: Briefly describe any traits and actions that would distinguish your service from that of the elected official who currently occupies the office you’re running for.
      response: |+
        What would distinguish my service is simple: integrity, honesty, and putting people before corporations and political theater. Too many elected officials spend their time feeding division and arguing over wedge issues while the country’s biggest problems are ignored.
        I believe both parties have drifted away from the everyday American. We should be rallying the country around serious goals like a Balanced Budget Amendment, term limits, election reform, and restoring trust in government. Instead, too much energy is spent on spectacle rather than solutions.
        I would serve differently by speaking plainly, leading with principle, and focusing on what actually moves the country forward. I am not interested in being another career politician. I am interested in helping fix a government that has lost its discipline, its honesty, and too often its sense of duty.

- candidateName: Ray Curtis
  nameSlug: ray-curtis
  bioMaterial:
    - question: Please describe any professional and/or life experiences that will help voters assess your qualifications for the office you’re seeking.
      response: |+
        As a Madison Fellow I have taught American Government for 40 years. I have a strong understanding of why the Framers designed the Constitution as they did. They had a warranted distrust of allotting too much power to one person. Hence, we have provisions such as limited government, rule of law, checks and balances, and the Bill of Rights. As a prospective member of Congress, the oath would require me to uphold those principles. This Congress has failed to do those things. They have broken their oath. Secondly, I have lived and experienced this district my entire life. I know Western Montana! I know a lot of folks in Western Montana. Along with the vast majority of true Montanans, I care deeply about this place I call home and its people. I will represent the people-rather than a party, a president, or corporate profits.

    - question: Where do you live currently? Where (city and state) were you born? How long have you lived in Montana?
      response: |+
        Near Turah, Montana

        Townsend, Montana

        64 of my 65 years

    - question: Age as of Nov. 3, 2026, date of birth, and place of birth. We will not publish your birth date.
      response: |+
        65

        June 30, 1960

        Townsend, Montana

    - question: What other biographical information do you want voters to know about you?
      response: |+
        I grew up on the Bozeman Pass, alongside the railroad. We raised pigs and supported our family with hunting and fishing. Playing sports for Park High I got a chance to see many other Montana communities and later became a basketball coach myself. In high school, my folks moved us to Missoula, where I continued my education, earning both my degrees at the University of Montana. As a teacher, I taught about Montana, U.S. government, and world history at MCPS, UM, MC and FVCC. During summer breaks, I guided students on the Lewis and Clark trail for Antioch University. I'm not unlike most people who call this place home. I'm not a millionaire. I stocked grocery store shelves at night and worked retail to get myself through college. I climbed telephone poles and dug holes for the railroad from Essex to Glendive, put up hay and installed irrigation pipe in the Flathead Valley, and even did a stint at the paper mill. I’ve counseled at Boy’s State in Dillon, a special needs camp, and Camp Fire Girls at Seeley Lake. After my wife Nancy died of cancer 10 years ago, with a lot of help, I started the Cancer Support Community in Missoula. Montana is home. Montana’s people are my neighbors.

    - question: Your constituents ask you for help with the failure of a major infrastructure project, the cost of which is more than state and local governments can raise. You can direct federal money to the project through an earmark, or you can leave the funding decision up to a federal agency, in which case the decided outcome won't be yours. Which strategy are you most likely to pursue, and why?
      response: |+
        As a current constituent, I can’t make the decision to help Libby with the nearly dozen bridges requiring work because of massive flood damage in December. Or the Milk River pipeline failure. Challenges of this magnitude require a congressperson to aggressively pursue both options or even seek a third, more timely tool: emergency declaration. Federal agencies were created to address such issues and used to be able to help, but they have become, like many programs this past year, politicized and mostly unreliable. Congressionally created agencies ought to be a legitimate option. As a congressperson, I would also ask my colleagues to help. Unfortunately, legislation requiring an earmark operates too slowly in times of need. Congress needs a reminder of what Washington pleaded with us to keep in mind in his Farewell Address, which I will summarize: more than our regional affiliations, or political ties, we are all Americans. 
        I believe one of the fundamental purposes of government is to help people who need help, plain and simple, without contemplating anything else about them except that they are humans who need help. Montanans are pretty good about that. We’ve all helped push another person’s car out of a snowy ditch a time or two. I’d like to bring this ethos of Montanans to congress and apply the mentality at a larger scale. “All men are created equal.” We ought to, and we can, make people’s lives better. Everyone’s. Life teaches us failures are inevitable, therefore elected officials need to plan and prioritize spending, without partisanship, for such occasions.

    - question: Describe your approach to management of federal lands when conflicts arise between conservation, energy development, recreation, and tribal sovereignty.
      response: |+
        The Western United States contains most of this nation’s federal lands, 27 million acres of which are in Montana, alone! That is almost 1/3 of the state! Given Montana's history, our residents are wary of public lands being developed and exploited. I, and every Montanan, know that we do not want decisions about our land made out East in DC, even as we argue about how these acres are best allocated amongst ourselves. These public lands are part of who we are here in Montana. As a congress person, it would be my responsibility to uphold the obvious fact that the people of Montana want these lands conserved for public recreation for this and, more importantly, future generations. If there is to be any development, Montana's constitutional promise of a clean and healthful environment must never be denied. Public lands, and the recreation opportunities they provide, make Montana special. They are ours. They are our children's, and our grandchildren's. We don't want them sold to the highest bidder. 
        Other lands that make up who we are in Montana belong to the tribes of Montana. It is the moral obligation of the United States to uphold tribal treaty rights, and there continues to be little conflict between the federal government lands and tribal sovereignty. The compact between the United States and tribes is one of government to government. Within reservation boundaries, it is up to tribal governments to manage and support their nation, as the Salish Kootenai and Blackfeet do here in Western Montana.

    - question: Identify two national priorities that are not addressed in this questionnaire that are important to your platform. Briefly explain your position on each and tell voters how you intend to address them. If there’s an existing bill you support to advance your position, please identify it.
      response: |+
        When Bobby Hauck, the former head football coach for the Montana Grizzlies, resigned, he stated no one would say college football is in a good place right now. I maintain the United States is not in a good place right now. Polls conclusively show that most Americans agree. This past year watching people, including children, taken from their cars and homes without cause or a warrant, detained, and even killed by ICE agents has shaken us. It did not need to happen. The immigration deal Republican Senator James Lankford of Oklahoma helped negotiate in 2016 was scrapped simply so the president could concoct a campaign platform issue. I agree with historian Gordon Wood that America’s diversity makes us great and unique amongst nations. In this country we do not have to have the same ethnicity, beliefs, nor lifestyle. I urge everyone to watch the last speech Ronald Reagan gave as president, as he awarded Montana’s own Senator Mike Mansfield the Presidential Medal of Freedom. “If we ever close the door to new Americans our leadership would soon be lost,” Reagan stated. Indeed, we are losing our leadership. I support reintroducing Langford’s bill to open the doors to the American dream. 
        Young Americans should also be able to dream as my generation could. As a young person I could pay for college by working a retail job on the side. Granted, my boss believed in paying his workers well. Additionally, public schools were well-supported. For me, homeownership was not out of reach. And the national debt was around $2 Trillion. Now the payment on our $39 Trillion national debt is the most expensive item in the US budget. Administration after administration adds to it. Income inequality is larger than ever, even greater than during the Gilded Age. There are only two possible solutions: reduce spending or raise taxes. Rather than yielding that power to an unelected group, such as DOGE, Congress needs to do their own work and seriously look at where the budget can be trimmed. The United States spends three times more than China on our national defense. Eisenhower warned us to avoid this kind of spending. He worried that overfunding the military would squeeze out spending for schools, healthcare, and infrastructure. He was right. The Simpson Bowles commission in 2010 took a hard look at these issues but they were ignored. It can't be ignored anymore. While some complained that the report called for raising taxes, even the so-called father of capitalism, Adam Smith, understood that taxes would be necessary for government services. He also suggested that the people to tax would be those who could afford it. We have people in our nation that can afford to pay taxes yet find ways to sidestep the obligation. If they paid their share, the tax burden would most likely be even less for everyone else, as it was during the Eisenhower administration. We owe it to our young people to clean up the mess we made. They deserve to dream.

  mtfpTitle: TK here
  mtfpWrittenBio: |+
    TK MTFP-written bio

  questionnaireMaterial:
    - question: When a president deploys U.S. armed forces into combat for a month or longer without authorization, should the War Powers Resolution of 1973, which gives Congress the power to declare war, be enforced? If not, should the War Powers Resolution be revised, replaced, or discarded? Briefly explain your reasoning.
      response: |+
        Written in 1787, Article 1, Section 8 of the US Constitution grants Congress the expressed power to declare war. The Framers did this so that one individual could not unilaterally take our nation to war, especially one which is not a national emergency. The Framers wanted to ensure our presidents did not have the power of kings. George Mason stated the Framers’ position clearly that one person should not have the power to take our nation to war when he wrote that the “executive was not to be trusted with it.” The War Powers Resolution of 1973 was only passed because past presidents tried to abuse their authority. The Resolution passed by over two-thirds vote from each house. Congress can, and should, use the “power of the purse” to pull funding and leverage their constitutional authority. The Resolution in question does not need to be discarded, but instead utilized, and quickly. Congress has ceded its exclusive constitutional powers too frequently in the past year. Our country desperately needs representatives who are devoted to their constitutional duties and the people they serve, rather than automatically falling in line with the president.

    - question: Many of Montana's rural hospitals and clinics are facing financial stress because of low patient volume and tight budget margins. What, if anything, should Congress be doing to support Montana’s health care providers?
      response: |+
        As a result of declining opportunity, Rural Montana is getting hit particularly hard, not just in health care, but teacher shortages as well. Still, that doesn't mean that in those large, sparsely populated rural areas healthcare (and education) is not as important as it is in urban areas. Everyone needs access to health care (and education). The only way to prevent closures is to pay rural hospitals adequately for the services they provide. Preventive services and prompt treatment in the long run lower healthcare spending. Of course, these services also need to be affordable. The United States has enough wealth to subsidize this care and take care of every community, no matter the size. After all, the increase in spending needed to prevent rural hospital closures is quite small in comparison to the total amount currently spent on healthcare. Moreover, the United States needs the people who live in rural areas. They provide goods and services we all use. If the trend continues of rural hospitals closing and towns disappearing there will be a ripple effect throughout the economy. Even in the more urban parts of Montana, I know of physicians who are leaving the country to practice-or leaving the profession altogether. Healthcare providers are feeling the pinch. It is beyond time to address the shortfalls of the ACA. If other developed nations can figure this out, so can the United States. Almost 80 years ago President Truman stated, “We are a rich nation and can afford many things. But ill-health, which can be prevented or cured, is one thing we cannot afford.”

    - question: Describe two issues unique to Montana that you intend to address. Explain how you’ll get the job done.
      response: |+
        The historian K. Ross Toole taught many students, including myself, that Montana is a large state with very few people. He argued in the early 80s, right before his death, that what made Montana unique was our clean and pristine environment, a privilege that people no longer had elsewhere. He predicted that people would come to our state seeking this. As it turns out, he was right. Toole said it was up to Montanans to decide if we were going to keep what was precious to us. We need to ensure Montana’s communities have the tools to develop in the way they want. 20 years ago, Missoula said “no” to an Aspen-type development in nearby Lolo. Just recently in my area, the county commission sided with the people who didn't want a truck stop in their backyard. On the other hand, in Lakeside, there will be another Yellowstone Club-esque development, despite strong vocal opposition from community members. I think representatives need to listen to the people who live here. On the federal level, members of Congress can leverage these decisions with federal support-by granting it or withholding it. Montana won't be Montana if it is no longer this pristine place Toole cherished.
        Also, because of its size and position Montana has one of the longest borders with Canada. Tariffs imposed by the president have disrupted our friendly relationship with our neighbors to the North, causing unnecessary uncertainty. Our farmers are especially getting squeezed. The constitution clearly states in Article 1, Section 8 that Congress has the power to “regulate commerce with foreign nations.” This Congress has allowed the president to usurp their authority without challenge. As a US representative in Congress, I would insist on taking back this constitutional power from the executive branch.  I would also seek to reestablish international cooperation and trust. It has been fritted away, but it is not too late. Positive relations with our allies are not only something that Montana needs to regain, but also the entirety of the United States.

    - question: Identify options or strategies available to federal officeholders to address home ownership and cost of living in Montana.
      response: |+
        I recall learning in my college economic classes that Montana would always be an expensive place to live because of our long distance from markets. It has become even more expensive here because Montana has been discovered as a desirable place to live by people from elsewhere. I understand completely why people want to move to Montana. It is a beautiful place with a quality of life that is no longer available in many other places. It has never been easy but is getting harder and harder for someone from here to stay here. Homeownership is out of reach for many Montanans. Recently I read the average age of a first-time homebuyer in the U.S. is now 40 years old, which is the oldest on record. Additionally, the median age of all homebuyers has risen to 59 years. One possible solution to bring down home prices and make ownership more feasible might be to manipulate supply through taxes. Taxes is an unpopular word but they are used to manipulate all kinds of behavior such as charitable giving, or sin-taxes on alcohol and tobacco. Other nations tax gasoline at a much higher rate to encourage the use of more fuel-efficient cars. Perhaps taxes could be used to limit the number of homes and properties a person can accumulate. Like a progressive income tax, there could be a progressive wealth tax. Stocks are not an unrestricted investment, perhaps property shouldn’t be either. Discouraging the purchase of home after home, so others can have an affordable place to live, seems like a desirable goal. Housing is a basic necessity.

    - question: Briefly describe any traits and actions that would distinguish your service from that of the elected official who currently occupies the office you’re running for.
      response: |+
        Frankly, I never imagined I would apply to be a member of the United States Congress. But, because of the events of this past year and the action, or rather inaction, of our current representative, I am applying for this job. Over the course of the first year of his second term, the Chief Executive encroached upon the powers of Congress. My representative and his party capitulated. I am adamant that the Framers in Federalist Paper #51 strongly stated that the purpose of the US Constitution was to control the governed, but also to govern itself. Political power was not to be abused. I did everything I could to get my congressperson’s attention-methods I had taught my students to use. I wrote letters, I made phone calls, I visited the office that he soon closed. I would have attended a town hall had there been one, but there was not, despite many calls for it. I even gave a speech on the 250th anniversary of the Battles at Lexington and Concord at the Missoula County Courthouse. I had been hired by Humanities Montana to give presentations across the state about the 250th anniversary of the Declaration of Independence, but funding for those celebratory events of our Nation’s provenance were cut by an unelected multibillionaire who hails from another country. 
        I will work as diligently as a congressman as I did to get our current congressman’s attention. I pledge to be an actual public servant. (Remember what those are?) I understand who my bosses are: the people who hired me with their votes. I believe that the best life is one lived for others, regardless of their ethnicity, religion, gender, nor age. Additionally, I cannot, in good conscience, take money from anyone to get elected. I have studied and taught about American elections throughout my career and observed that campaign money mostly seems to benefit billionaires and the candidates, rather than the voters. I promise to not personally benefit financially from becoming a member of Congress. I will support and introduce legislation repeatedly, without personal agenda. Additionally, I will adhere to my Oath of Office. I would act as the Framers intended and use the powers of Article 1 to represent the people, as well as provide the constitutionally-mandated check on the executive and judicial branches. I want to bring integrity back to this office and restore faith in our democratic form of government. As John Adams said, democracy is one of the worst forms of government-but it's better than anything that has yet been created.

- candidateName: Tom Jandron
  nameSlug: tom-jandron
  bioMaterial:
    - question: Please describe any professional and/or life experiences that will help voters assess your qualifications for the office you’re seeking.
      response: |+
        I am a husband, father of three children, aviation professional, former small business owner, and former Montana Army National Guardsman who served in Afghanistan 

        I grew up in Bozeman and graduated from Bozeman High in 1996. My wife and I have owned and operated two small businesses in Bozeman. I attended Gallatin College - MSU, where I studied Aviation Science. After joining the MTANG, I was hired into a full-time position at the Army Aviation Facility. Soon after, my wife and I moved our family to Clancy. More can be read on my website at jandron4ussenate.com

    - question: Where do you live currently? Where (city and state) were you born? How long have you lived in Montana?
      response: |+
        Our family has resided in Clancy for approximately 12 years. I was born in New Jersey, and in 1991, my parents relocated our family to Bozeman in pursuit of an improved lifestyle out west.

    - question: Age as of Nov. 3, 2026, date of birth, and place of birth. We will not publish your birth date.
      response: |+
        I turned 48 years old last month. I was born in New Jersey. My birthday is March 30, 1978.

    - question: What other biographical information do you want voters to know about you?
      response: |+
        I grew up in a middle-class family. My parents worked hard to make ends meet to raise my two sisters and me. My family has a history of military service; my father served in the Navy, and his father served in the Air Force. My mother’s father also served in the Navy. My middle sister and I both served. She is an officer in the Coast Guard and has about 23 years of service. I served in the Montana Army National Guard for 13 years and retired as a Sergeant First Class. My wife and I met 26 years ago and have been married for 22 years. We have three children, two boys and a girl (20, 16 & 11). I began my aviation career in 2007 at Gallatin College-MSU, studying Aviation Science and Summit Aviation. I continued my education at Utah Valley University, pursuing Aviation Business Management. While I was in the Army, I was a CH-47 mechanic, Flight Engineer, and Section Sergeant with the maintenance company, and I earned my Airframe & Power Plant certificate. I now work at a facility maintaining UH-1 Hueys and fixed-wing aircraft for wildfire protection. My family and I ski every chance we get, enjoy lake days and riding our dirt bikes, and in the fall, we love hunting.

    - question: Your constituents ask you for help with the failure of a major infrastructure project, the cost of which is more than state and local governments can raise. You can direct federal money to the project through an earmark, or you can leave the funding decision up to a federal agency, in which case the decided outcome won't be yours. Which strategy are you most likely to pursue, and why?
      response: |+
        Ideally, I would not pursue either. Earmarks give Congress more oversight but still transfer wealth nationwide. Turning it over to agencies shifts that power to bureaucrats further removed from Americans. The Constitution was not written to solve every local problem; it was written to provide for the general defense. The federal government should not pick winners and losers. 

        However, if federal funds are going to be spent regardless, directing them through earmarks provides more transparency and can help return some of the $14 billion taxed from Montanans, rather than leaving decisions to unelected agencies. 

        But we simply cannot afford this level of spending. We are $39 trillion in debt and do not collect enough revenue to cover it. Continued deficits require raising taxes, printing money, or borrowing from other countries—all of which create hardship and weaken national security. The answer is to cut waste.

        My job is not to bring back federal dollars, but to lower taxes, reduce spending, and restore local stewardship. Infrastructure should be funded locally, and we must encourage charity and ensure National Guard units are available at home for disaster relief, not foreign wars.

    - question: Describe your approach to management of federal lands when conflicts arise between conservation, energy development, recreation, and tribal sovereignty.
      response: |+
        The core problem is that too much is managed from Washington, D.C., by agencies far removed from Montanans. When decisions are centralized, conflicts between conservation, energy, recreation, and tribal interests become unnecessarily political.

        My approach is to decentralize decision-making and return more control to states and local communities. Montanans understand our land better than federal bureaucrats and are better positioned to balance use, management, and conservation, all while protecting private property.

        Clear property rights and local accountability lead to better outcomes than one-size-fits-all mandates across the country. We can respect valid tribal sovereignty and negotiated agreements while ensuring that Montanans' property rights are not violated. Proper land management and conservation should defend property rights and reflect the needs of the people who live and work on that land.

        The goal should be responsible stewardship. We need policies that protect natural resources while encouraging multiple use, reasonable care, decentralized management, economic opportunity,  property rights, and access for future generations. We can do all of the above better than DC.

    - question: Identify two national priorities that are not addressed in this questionnaire that are important to your platform. Briefly explain your position on each and tell voters how you intend to address them. If there’s an existing bill you support to advance your position, please identify it.
      response: |+
        First, I would reform or repeal Section 702 of the Foreign Intelligence Surveillance Act. While intended to target foreign threats, it has enabled the warrantless collection of Americans’ communications. I would require a warrant for accessing U.S. person data, prohibit bulk collection, limit data sharing, shorten sunset periods, and strengthen congressional oversight to protect civil liberties, or push to abolish it without those protections.

        I would also sponsor Department of Government Efficiency (DOGE) Acts to codify spending cuts and require annual independent audits of federal agencies with the goal of identifying and recommending cuts to unconstitutional, redundant, or low-value programs. Congress would be required to vote on those cuts, and the bills would implement sunset provisions for all federal programs. They would promote decentralization by shifting local responsibilities like education and transportation to states, impose caps on federal spending tied to inflation and population growth, require a supermajority to exceed those limits, and codify a “one-in, three-out” regulatory rollback rule.

  mtfpTitle: TK here
  mtfpWrittenBio: |+
    TK MTFP-written bio

  questionnaireMaterial:
    - question: When a president deploys U.S. armed forces into combat for a month or longer without authorization, should the War Powers Resolution of 1973, which gives Congress the power to declare war, be enforced? If not, should the War Powers Resolution be revised, replaced, or discarded? Briefly explain your reasoning.
      response: |+
        The Constitution is clear: Congress, not the president, decides when we go to war, and then the president prosecutes the war. The War Powers Act of 1973 was meant to restrain the executive branch after Vietnam, but in practice, it has often done the opposite. By allowing unilateral military action for weeks, it has functioned as a permission slip for presidents to begin conflicts before Congress can act.

        Congress is supposed to debate whether war is necessary, but they are too afraid to vote on the record, so they are happy to kick the ball to the president. Most recently, forces were committed to Iran before Congress could even debate a war powers resolution, and even the best Congressmen are afraid to defund the troops once they have already been committed.   

        We must restore the original constitutional standard. There must be no offensive military action without a formal declaration of war. We have not declared war since WWII, and every war since has been a disaster. Congress should also repeal the outdated 2001 AUMF, which has been stretched far beyond its original purpose to justify endless, undeclared wars. Any future AUMF must be limited in time and its targets.

    - question: Many of Montana's rural hospitals and clinics are facing financial stress because of low patient volume and tight budget margins. What, if anything, should Congress be doing to support Montana’s health care providers?
      response: |+
        Congress should not try to centrally manage or subsidize rural health care from Washington. The policies that created these shortages, like federal mandates, insurance manipulation, and overregulation, are the same ones making it harder for rural providers to survive.

        The best thing Congress can do is remove barriers. That means expanding price transparency, allowing real competition across state lines, reducing federal regulations that drive up costs, re-examining credentialing practices and scope of practice, and empowering patients to use tools like health savings accounts, direct primary care, telehealth, AI assistants, and other innovations.

        We should encourage states across the country to end policies that tie care to large hospital systems, as Montana has done by repealing certificate-of-need laws, and instead allow independent clinics to operate more freely and affordably. When providers can compete and patients control their own health care dollars, costs go down, and access improves.

        Montanans don’t need more bureaucrats involved in their lives. They need more freedom to innovate, serve their communities, and deliver care that actually works in rural areas.

    - question: Describe two issues unique to Montana that you intend to address. Explain how you’ll get the job done.
      response: |+
        First, I will champion the PRIME Act, introduced by Thomas Massie, which will allow farmers and ranchers to sell meat processed at custom slaughterhouses directly to consumers, restaurants, and retailers within their state without continuous federal inspection. In Montana, where USDA facilities are scarce, this would reduce bottlenecks, lower costs, and expand access to local processing. It will give Montana farmers and ranchers more control, help small operations compete, increase access to fresh, locally raised meat, and strengthen food security through decentralization and local inspection facilities.
         
        Second, in spirit of the Montana Constitution’s requirements of single-issue bills and term limits, I will oppose any omnibus bills in DC, refuse to support legislation loaded with unrelated provisions and riders, advocate for federal term limits, and will not serve in the US Senate beyond two terms in any 16-year period. I am running to defend the Constitution, reduce federal overreach, and restore accountability, not to build a career in the US Senate.

    - question: Identify options or strategies available to federal officeholders to address home ownership and cost of living in Montana.
      response: |+
        Congress can help expand housing supply and reduce costs by reducing market distortions.
         
        Many federal regulations hamper housing development. I support the REINS Act, which would prevent unelected agencies from driving up housing and construction costs through burdensome red tape and require Congress to approve any proposed major federal regulations.

        Although the ROAD Act includes unrelated riders, I support targeted reforms within it, such as streamlined environmental review for housing projects and the repeal of an outdated permanent chassis requirement.

        But we must be honest with Americans and acknowledge that these are all band-aids on the root problem: inflation driven by federal spending and monetary policy. Even with local zoning reform or reducing federal red tape, artificially low interest rates and excessive money creation will always distort markets, fuel malinvestment, and push housing prices beyond what families can afford, and only benefit some homeowners at the expense of younger generations.

        It all comes back to reckless spending. We must cut spending, balance the budget, and rein in the Federal Reserve’s inflation, or the “affordability crisis” will never be solved.

    - question: Briefly describe any traits and actions that would distinguish your service from that of the elected official who currently occupies the office you’re running for.
      response: |+
        I am not a politician. I am an everyday Montanan with a 9-to-5, working to provide for my wife and kids. As a former small business owner, I understand the pressure families feel when gas, grocery, and housing costs rise due to inflation and misguided foreign policy. 

        I served in the military in a leadership role and take seriously the oath every one of our service members swears to the Constitution. In Congress, I will honor their oath and sacrifice by making Congress fulfill its own oath and require a declaration of war before committing our blood and treasure overseas.

        I believe, as George Washington advised, that we should “steer clear of entangling alliances.” I will not accept any AIPAC money or any contributions tied to foreign interests, whether it’s Israel, India, Taiwan, Ukraine, or Timbuktu. I will post a “no solicitation” sign on my office door stating that I will make every decision based on conscience, principles, and debate, not campaign contributions and pressure.

        I will represent “the forgotten man” and help clean up the mess insiders made, because I can’t be bought, have no party bosses to answer to, and do not need to gather signatures to be on the ballot.

- candidateName: Troy Downing
  nameSlug: troy-downing
  bioMaterial:
    - question: Please describe any professional and/or life experiences that will help voters assess your qualifications for the office you’re seeking.
      response: |+
        I’ve served my country in uniform, built businesses that created jobs, and delivered results in public office. As an Air Force veteran, I understand duty and accountability. As a businessman, I know  what it takes to energize  our economy and meet a payroll.
        As Montana’s State Auditor and now in Congress, I’ve worked to reduce red tape, protect consumers, and advocate for Montana priorities. I have been a consistent voice for the realities of a rural state in terms of health care, education, agriculture, public land, and natural resources. 
        I’ve helped return millions of dollars to constituents and supported policies that strengthen our economy, unleash American Energy, and harden our national security.
        My approach is focused on results, accountability, and representing Montana values in Washington by always showing up and always doing the work.

    - question: Where do you live currently? Where (city and state) were you born? How long have you lived in Montana?
      response: |+
        I live in Helena, Montana

    - question: Age as of Nov. 3, 2026, date of birth, and place of birth. We will not publish your birth date.
      response: |+
        59 years old as of November 3, 2026

    - question: What other biographical information do you want voters to know about you?
      response: |+
        My wife, Heather, and I raised four children here in Montana because of our values of faith, family, and personal responsibility. 
        I’ve dedicated my life to service, before self. My public service career spans protecting this great Nation to protecting Montana’s way of life and ensuring future generations have the same opportunities we’ve had.
        I was born to a teenaged, unwed mother and was successful because of the opportunities offered by this great Nation. I will continue to fight for future kids of austere beginnings to have the same opportunities this country afforded me.

    - question: Your constituents ask you for help with the failure of a major infrastructure project, the cost of which is more than state and local governments can raise. You can direct federal money to the project through an earmark, or you can leave the funding decision up to a federal agency, in which case the decided outcome won't be yours. Which strategy are you most likely to pursue, and why?
      response: |+
        When critical infrastructure fails, timely action is essential. I support responsibly using the appropriations process, including targeted community project funding, to fund necessary projects that state and local governments cannot address alone.
        When done transparently and with clearly identified needs, this approach allows elected representatives to advocate directly for their communities rather than relying solely on federal agencies.  I’ve already  brought back millions in federal funding to Central and Eastern Montana and will continue to support investments that improve public safety, infrastructure, and long-term economic stability.
        I want to be able to look Montanans in the eye and tell them their tax dollars were invested to deliver real benefits here at home.

    - question: Describe your approach to management of federal lands when conflicts arise between conservation, energy development, recreation, and tribal sovereignty.
      response: |+
        As a member of the House Natural Resources Committee, a former Montana Land Commissioner, and a member of the Public Lands Caucus, this issue is important to me, as it is to most of us in Montana. 
        Montana’s public lands should be managed for multiple use and sustained yield, balancing conservation, recreation, and responsible resource development.
        I believe decisions should include input from local communities, state leaders, and tribal governments. A collaborative approach ensures policies reflect the needs of those most directly impacted, rather than being driven solely by Washington.
        With thoughtful, balanced management, we can protect our natural resources, maintain public access, and support economic growth and energy development across Montana.

    - question: Identify two national priorities that are not addressed in this questionnaire that are important to your platform. Briefly explain your position on each and tell voters how you intend to address them. If there’s an existing bill you support to advance your position, please identify it.
      response: |+
        Affordability & Cost of Living: I’m focused on lowering costs by cutting unnecessary spending, reducing regulatory burdens, permitting reform, and expanding domestic energy production to bring down prices across the board.
        I support efforts like the One Big Beautiful Bill Act, which restores fiscal discipline, reduces inflationary pressure, and puts American taxpayers first. Lower costs start with responsible government, and I will continue working to make Montana more affordable for working families.

        Energy Independence: Expanding domestic energy production supports economic growth, lowers costs, and strengthens national security. I support policies that encourage responsible development of American energy resources.

  mtfpTitle: TK here
  mtfpWrittenBio: |+
    TK MTFP-written bio

  questionnaireMaterial:
    - question: When a president deploys U.S. armed forces into combat for a month or longer without authorization, should the War Powers Resolution of 1973, which gives Congress the power to declare war, be enforced? If not, should the War Powers Resolution be revised, replaced, or discarded? Briefly explain your reasoning.
      response: |+
        Congress has a constitutional responsibility to declare war, and the War Powers Resolution of 1973 was intended to reinforce that role.
        The Constitution also designates the President as Commander in Chief, with the authority to act swiftly to protect Americans and our interests. In recent situations, the President notified congressional leadership and acted within the framework that allows limited military engagement while Congress reviews the situation.
        If operations extend into sustained combat, Congress must provide formal authorization or determine the appropriate course forward.
        This balance ensures the President can respond to immediate threats while preserving Congress’s constitutional duty to oversee and authorize extended acts of war.

    - question: Many of Montana's rural hospitals and clinics are facing financial stress because of low patient volume and tight budget margins. What, if anything, should Congress be doing to support Montana’s health care providers?
      response: |+
        Rural healthcare and critical access facilities are essential to Montana. I make it a priority to visit these communities and understand the realities facing this vital part of rural infrastructure.
        Workforce development is one of the most pressing challenges. Many facilities struggle to recruit and retain the providers and caregivers they need to serve their communities effectively.
        Facilities must also be right-sized to meet the needs of their regions, ensuring they have the capacity not only for emergency services, but also for routine care and, in many cases, long-term care.
        Funding remains critical. With aging populations across rural Montana, Medicare and Medicaid account for a significant portion of facility revenue. Reforms to Medicaid will help ensure more resources go directly to patient care while reducing waste and fraud. I also strongly supported the $50 billion in Rural Healthcare Transformation funding appropriated last year, with Montana receiving a significant share of these much-needed investments.
        Finally, we must improve CMS accountability. Delays in hospital reimbursements and Medicaid redeterminations are unreasonable and place unnecessary strain on providers, especially in rural areas with limited resources.

    - question: Describe two issues unique to Montana that you intend to address. Explain how you’ll get the job done.
      response: |+
        Energy and Resource Jobs: Montana plays a vital role in American energy production. I will continue to support policies that protect good-paying jobs and ensure a reliable, affordable energy supply. At the same time, I believe we must position the United States as a leader in innovation by advancing technologies that strengthen our energy future and drive economic growth.

        Public Land Access: Access to public lands is central to Montana’s way of life. I’m proud of the work I’ve done and will continue working with local stakeholders to maintain access while supporting responsible land management and natural resource development.
        As a member of the bipartisan Public Lands Caucus, I have consistently opposed proposals to sell off our public land. I believe these lands are a shared resource that must be preserved, protected, and responsibly managed for current and future generations of Montanans.

    - question: Identify options or strategies available to federal officeholders to address home ownership and cost of living in Montana.
      response: |+
        In Congress, Ive taken a practical, supply-focused approach to improving housing access and supporting homeownership. By introducing the Whole-Home Repairs Act to help families afford critical repairs, preserve existing housing stock, and keep Montanans in their homes.
        I've also supported policies that expand access to capital and reduce regulatory barriers that make it harder to build new housing. Increasing supply and encouraging responsible development are essential to improving affordability.
        I have also introduced a bipartisan bill to reauthorize the Native American Housing Assistance and Self Determination Act (NAHASDA) to make sure that Indian Country is not forgotten in our national discussions on housing.
        My focus is on real solutions, protecting existing homes, supporting new construction, and ensuring more Montanans have the opportunity to achieve the American Dream of homeownership.

    - question: Briefly describe any traits and actions that would distinguish your service from that of the elected official who currently occupies the office you’re running for.
      response: |+
        My approach is grounded in accessibility, accountability, and results. I’ve focused on constituent services, returning resources to communities, and maintaining a strong presence across the district. I have and will continue to prioritize listening to all Montanans, addressing concerns directly, and working to deliver practical outcomes no matter what side of the isle you are on.
        It is the honor of a lifetime to serve Montana in Congress and I don't take this responsibility lightly.

