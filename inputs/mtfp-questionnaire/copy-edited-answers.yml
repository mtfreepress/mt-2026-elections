    - question: When a president deploys U.S. armed forces into combat for a month or longer without authorization, should the War Powers Resolution of 1973, which gives Congress the power to declare war, be enforced? If not, should the War Powers Resolution be revised, replaced, or discarded? Briefly explain your reasoning.
      response: |+
        Yes, the War Powers Resolution of 1973 should be enforced when a president deploys U.S. armed forces into combat for a month or longer without congressional authorization.The Constitution is crystal clear: Article I, Section 8 gives Congress—not the president—the sole power to declare war. Our Founders designed it this way deliberately to prevent any one person from dragging America into endless, unnecessary conflicts that cost our sons and daughters their lives and drain our treasury. George Washington himself warned against foreign entanglements, and I look to his wisdom as a guiding principle.The War Powers Resolution was passed to reclaim that constitutional authority after presidents increasingly bypassed Congress in places like Vietnam. If a president sends troops into sustained combat without approval, Congress must enforce the law—demand withdrawal if unauthorized, or provide explicit authorization if the mission truly serves American interests.I would not support revising, replacing, or discarding the War Powers Resolution. It needs stronger enforcement, not weakening. Too many career politicians in Washington have let presidents—both parties—ignore it for decades, leading to disastrous, unconstitutional wars that never end and benefit foreign interests or defense contractors more than Montana families.As your Senator, I’ll fight to restore real congressional oversight: no more blank checks for endless wars, no more American blood spilled without the people's representatives voting yes. Montana's voice demands peace through strength, not endless intervention. America First means Congress reclaims its constitutional duty to protect our troops and our sovereignty.

    - question: Many of Montana's rural hospitals and clinics are facing financial stress because of low patient volume and tight budget margins. What, if anything, should Congress be doing to support Montana’s health care providers?
      response: |+
        Congress has a vital role in supporting Montana’s rural hospitals and clinics, which are lifelines for our small towns, ranchers, farmers, veterans, and Native communities—folks who often face long drives just to get basic care.Montana's rural providers are squeezed by low patient volumes, rising costs, workforce shortages, and unfair reimbursement rates from big federal programs like Medicare and Medicaid. As your Senator, I’d fight for targeted, common-sense federal action that empowers local solutions rather than creating more bureaucracy or dependency.

    - question: Describe two issues unique to Montana that you intend to address. Explain how you’ll get the job done.
      response: |+
        Responsible management of our federal public lands

        The financial crisis facing our rural hospitals and clinics

        These are Montana-specific fights that demand a Senator who knows our land, our people, and our values—not a career politician beholden to elites. I'll bring common-sense, America First solutions home: protecting families, tribes, small ag, and opportunity while restoring constitutional balance. Montana families first—always.

    - question: Identify options or strategies available to federal officeholders to address home ownership and cost of living in Montana.
      response: |+
        As your next U.S. Senator, I will fight to make homeownership achievable again for Montana families, veterans, young people, and working Montanans who are being priced out by skyrocketing costs, low supply, and out-of-state pressures.

        Slash federal red tape that drives up building costs

        Lower everyday energy and living costs

        Provide targeted tax relief and reduce demand pressure

        Bring home infrastructure funding with local control

    - question: Briefly describe any traits and actions that would distinguish your service from that of the elected official who currently occupies the office you’re running for.
      response: |+
        The current office holder is stepping down but these are the differences.

        I am not a career politician. I am an independent, outsider voice rooted in real Montana life—no decades in D.C., no lifetime of establishment deals, no corporate PAC millions funding my campaign.Key distinctions in how I would serve:

        Outsider independence vs. establishment ties

        Montana-first pragmatism vs. partisan gridlock

        Real-world experience vs. professional politics

        Direct accountability vs. insulated tenure

        The current officeholder represents Washington to Montana.
        I will represent Montana to Washington—fiercely, independently, and without apology.Montana families first. America First. Always.

- candidateName: Ryan Busse
  nameSlug: ryan-busse
  bioMaterial:
    - question: Please describe any professional and/or life experiences that will help voters assess your qualifications for the office you’re seeking.
      response: |+
        After being raised on a ranch and farm and attending a rural public school, I moved to the Flathead Valley, where I realized two dreams: becoming a Montanan and helping build one of America’s most respected gun companies. At Kimber, I built a worldwide sales team based in Kalispell.

        I was honored to be the 2024 Democratic nominee for governor, where I forged lasting bonds across our state. I have also been a recognized leader on conservation issues and have been chosen to lead important organizations, including serving as board chairman of Montana Conservation Voters and as North American board chairman of Backcountry Hunters and Anglers. I’ve also served as advisor to the U.S. Senate Sportsmen's Caucus and to the U.S. Departments of the Interior and Agriculture on hunting and fishing issues. 

        My wife Sara and I were married on the banks of the Flathead River 27 years ago and have raised two wonderful Montana boys, now 18 and 21. 

        I am proud that this state has made me a better person and given us a chance, and I feel a deep sense of responsibility to fight for a future Montana where that’s possible for everyone.

    - question: Where do you live currently? Where (city and state) were you born? How long have you lived in Montana?
      response: |+
        Kalispell
        Born: Omaha, NE (born there but spent only a few days there - I was raised on family ranch and farm in NW Kansas)
        Have lived in the Flathead Valley for 31 years.

    - question: Age as of Nov. 3, 2026, date of birth, and place of birth. We will not publish your birth date.
      response: |+
        2/23/70
        56 
        Omaha, NE

    - question: What other biographical information do you want voters to know about you?
      response: |+
        I'm a Montana dad, proud of my boys, our incredible Constitution, and their work to defend our rights in that visionary governing document. 

        Once I became a Montanan, I never left. This place changed me for the better, and that's the magic of this state. That's why I became active in conservation leadership and then in politics. I owe it to Montana to fight for what makes this the last best place. 

        I helped build a successful business and a team. I know what it's like to make payroll, deal with childcare shortages, negotiate healthcare coverage, and help find homes. 

        I am a ranch kid who was taught that everything is my job. There is no pulling rank or walking away from something that needs to be done.

    - question: Your constituents ask you for help with the failure of a major infrastructure project, the cost of which is more than state and local governments can raise. You can direct federal money to the project through an earmark, or you can leave the funding decision up to a federal agency, in which case the decided outcome won't be yours. Which strategy are you most likely to pursue, and why?
      response: |+
        I intend not just to represent, but to proudly fight for the people of Western Montana; I would use every tool at my disposal to do this, including earmarks. 

        The people in this district deserve someone who represents us. It’s not wrong to fight for rural healthcare, housing assistance, public schools, and road projects. Those who say otherwise are likely aligned with corporate power brokers or wealthy lobbyists, and they already have far too much influence over our government. Those powerful forces have made things hard for the rest of us. They have successfully rigged the economic system for themselves and their wealthy friends. 

        Those people have fought for tax write-offs for private jets and tax loopholes that let them pay almost nothing while we struggle. It’s way past time for the rest of us to have influence and demand a rebalancing of national resources that gives all of us a chance, and I promise to do it.

    - question: Describe your approach to management of federal lands when conflicts arise between conservation, energy development, recreation, and tribal sovereignty.
      response: |+
        All Americans own our public lands, but right now corporate interests have too much influence over how we manage them. Generations of citizens, often led by Montanans like Lee Metcalf and Pat Williams, have worked to establish critical regulatory safeguards that help ensure the immense power of large corporations is balanced with the interests of millions of American citizens, including all Native Americans, and I am dedicated to helping reestablish those safeguards.

        I am fully supportive of these bedrock environmental laws and am very troubled by the overt and dangerous attacks on them by this administration and Congress. Here again, the wealthiest and most powerful have too much influence, and I will represent those Montanans who desire a more balanced approach. This means bedrock laws like the Clean Water Act and the Roadless Rule should be strengthened.
        “Fast Track” proposals currently being pushed by Republicans in places that aim to ignore our laws, such as the Sheep Creek mine in the Bitterroot, are dangerously wrong, and I am devoted to fighting to ensure that industry is held to the standards set forth in our laws.

    - question: Identify two national priorities that are not addressed in this questionnaire that are important to your platform. Briefly explain your position on each and tell voters how you intend to address them. If there’s an existing bill you support to advance your position, please identify it.
      response: |+
        Universal Healthcare:  Our nation is far behind all other industrialized nations, and we are now in critical need of a healthcare overhaul. Far too much influence has been ceded to wealthy insurance companies, and truth be told, far too many Democrats have been complacent in what has proven to be a very ineffective system. 

        I am a proponent of fixing this by aggressively pushing to institute a universal, single-payer healthcare system that provides high-quality service for all Americans who rightfully feel the economic stress of a system that currently prioritizes profits over people. 

        Clean energy: Americans are facing two realities: a worsening climate crisis and skyrocketing energy costs. At the same time, the Trump administration has done everything possible to block wind and solar, which are the cheapest new power sources. By continuing subsidies for fossil fuels while blocking renewable incentives, Republicans are worsening the climate and making power more expensive for all Montanans. I am dedicated to fighting for renewables not against them.

  mtfpTitle: TK here
  mtfpWrittenBio: |+
    TK MTFP-written bio

  questionnaireMaterial:
    - question: When a president deploys U.S. armed forces into combat for a month or longer without authorization, should the War Powers Resolution of 1973, which gives Congress the power to declare war, be enforced? If not, should the War Powers Resolution be revised, replaced, or discarded? Briefly explain your reasoning.
      response: |+
        The unchecked growth and deployment of executive power is dangerous for our country. Not only should the War Powers Resolution be enforced, but Congress must also step up and act on a myriad of other responsibilities. 

        The current sycophants in Congress have done far too little to push back on disastrous tariffs that are driving up costs and killing Western Montana businesses. The current majority in Congress refuses to hold hundreds of powerful men who trafficked and abused young girls criminally accountable. Congress also refuses to exercise oversight over, or limit funding for, poorly trained masked ICE agents who have killed American citizens. 

        This Congressional majority openly bows to the executive branch by cheering the war in Iran and hiding from its responsibility. This war is costing billions of dollars per day and driving up fuel prices, even as the same Congress says we don’t have money for healthcare and housing in this country. 

        It’s past time for Congress to grow a spine and do its job.

    - question: Many of Montana's rural hospitals and clinics are facing financial stress because of low patient volume and tight budget margins. What, if anything, should Congress be doing to support Montana’s health care providers?
      response: |+
        This Congress has purposely imperiled our rural hospitals by gutting Medicaid coverage and slashing ACA tax credits, both of which are dramatically reducing health coverage for rural Montanans and dangerously lowering funding for rural hospitals. And they’ve been clear about why: they needed to cut these services so that the wealthiest Americans, like Elon Musk, could receive a huge tax cut. 

        I am proudly fighting not just to reverse these disastrous policies but to institute universal health care for all Americans.

        It’s time to stop letting wealthy insurance corporations rig the system and instead insist on basic decency and security for the people who make this country work. The people with lobbyists and attorneys and piles of money don’t have to worry about healthcare, but all of the rest of us do.

        Doing this will require tenacity and courage, and it will require dealing with the truth, which is that far too many Democrats have stood in the way of this, too. I’m not afraid to elbow them out of the way either. 

        I’m committed to fighting for immediate conversion to universal healthcare, which would shore up our rural healthcare system and help all Montanans.

    - question: Describe two issues unique to Montana that you intend to address. Explain how you’ll get the job done.
      response: |+
        Data Centers:  Current proposals to rapidly develop data centers in Montana without a strong regulatory framework are dangerous. I am devoted to fighting to make certain that no favors are done for tech billionaires. I am devoted to ensuring that we do not risk a single gallon of water quality and that power rates for Montanans are not raised a single penny, so that AI companies can profit from our state. Here again, I will be a forceful advocate for the people of this state over the powerful corporate interests seeking to exploit this state.

        Roadless Rule and Wilderness Study Areas:  Our Senior senator is in favor of removing protections for millions of acres of the most important public land in this state, and I intend to represent Montanans who are standing up to oppose these hard-won conservation protections. I’m a hunter and a fisherman, and I know that some of the best habitat in the state is protected in these places, and I am devoted to fighting for them.

    - question: Identify options or strategies available to federal officeholders to address home ownership and cost of living in Montana.
      response: |+
        Instead of spending hundreds of billions of dollars on foreign wars and an out-of-control ICE budget, we should be expanding federal programs that help Montanans purchase homes. These programs should include expanded down payment assistance for first-time home buyers. We should also institute a federally guaranteed low-interest program for homebuyers. 

        I am also in favor of exploring other federal programs that expand the use of modular homes and equity-sharing programs. 

        I realize this question asked for only two suggestions, but we should be pushing a multitude of buttons and developing new ones with the urgency this situation demands.

    - question: Briefly describe any traits and actions that would distinguish your service from that of the elected official who currently occupies the office you’re running for.
      response: |+
        1) I value and enjoy meeting with people and answering questions. Ryan Zinke and the entire Republican delegation refuse to hold open meetings or town halls. That’s a disservice to the people of this state, and I am dedicated to holding regular public meetings. 

        2) Ryan Zinke and his chosen heir, Aaron Flint, refuse to criticize their party even over policies that are obviously horrible for Montanans, like tariffs or a foreign war that drives up costs for all of us. I am not afraid to take on my own party and fight for Montanans. No one should be able to trade stocks and become wealthy as a representative, and this goes for people in both parties.

        Furthermore, there are too many Democrats who have been influenced by the big lobbying money that seems to prohibit them from making good decisions on policies like universal healthcare. Frankly, I think I owe it to Montanans to hold people in my own party to a higher standard, and I am not afraid to do it.

- candidateName: Lee Calhoun
  nameSlug: lee-calhoun
  bioMaterial:
    - question: Please describe any professional and/or life experiences that will help voters assess your qualifications for the office you’re seeking.
      response: |+
        After graduating from the University of Pittsburgh with a degree in Mechanical Engineering I spent 30+ years as a product develop engineer and supervisor at Kodak before my early retirement. In addition to my full-time employment, I also ran a small nonprofit for several years.  
        In my retirement, I’ve done such things as providing financial analysis to my town's government, worked as a ski patrol volunteer, managed a family woodlot, was a Game of Logging national champion, designed the first cost effective residential solar in the northeast, started Northstone Solar LLC and designed and built a net zero home among other things.

    - question: Where do you live currently? Where (city and state) were you born? How long have you lived in Montana?
      response: |+
        I moved to Whitefish 10 years ago from the rural upstate NY town of Sodus.  I was born in Wellsville, NY.  Wellsville was the closest hospital to my home town of Shinglehouse, PA.  I grew up in the Oswayo Valley, on the spine of the Appalachians, in what was predominantly a dairy producing area in those days.  My early teenage years were spent working on the neighbor's dairy farms.

    - question: Age as of Nov. 3, 2026, date of birth, and place of birth. We will not publish your birth date.
      response: |+
        On 11/3/26 I will be 76 years old.

    - question: What other biographical information do you want voters to know about you?
      response: |+
        I am not a politician.  I am very pragmatic and I am very good at identifying cost effective solutions for "problems.

    - question: Your constituents ask you for help with the failure of a major infrastructure project, the cost of which is more than state and local governments can raise. You can direct federal money to the project through an earmark, or you can leave the funding decision up to a federal agency, in which case the decided outcome won't be yours. Which strategy are you most likely to pursue, and why?
      response: |+
        This is an interesting infrastructure hypothetical question.  The steps I would take to resolve the issue are:  1.  I would want to see the problem personally and hear the issues from the constituents to determine what the problem actually is and determine if something should be done at federal taxpayer expense.  2.  If the answer to #1 is something needs to be done at federal expense, then we need to determine whether a federal agency or an earmark is the best approach to solve the problem based on a number of things like cost, timeline and probability of action.  Generally speaking, I'm not a fan of "pork barrel" (earmark) spending but it probably has benefit for some problems.

    - question: Describe your approach to management of federal lands when conflicts arise between conservation, energy development, recreation, and tribal sovereignty.
      response: |+
        I think the best way to resolve conflicts over federal land management is to have all the relative stakeholders work together producing a plan that everyone can live with, not just what works for the Epstein class.  Some guidelines for management should involve the following in my opinion.  1. The government should not be providing corporate welfare through use of public lands.  2.  Public lands are owned equally by all Americans.   3.  Public lands should not be sold off as a subsidy to special interests.

    - question: Identify two national priorities that are not addressed in this questionnaire that are important to your platform. Briefly explain your position on each and tell voters how you intend to address them. If there’s an existing bill you support to advance your position, please identify it.
      response: |+
        The cost of living in the US is too high!  The middle class has been shrinking over the last 45 years because of the tax cuts for billionaires that started during the 1980s.  It is time to roll back the corporate welfare that has ballooned the national debt.  We need to gut the corporate welfare from the last three "tax reform" bills.  Let the Epstein class pay their fair share.

  mtfpTitle: TK here
  mtfpWrittenBio: |+
    TK MTFP-written bio

  questionnaireMaterial:
    - question: When a president deploys U.S. armed forces into combat for a month or longer without authorization, should the War Powers Resolution of 1973, which gives Congress the power to declare war, be enforced? If not, should the War Powers Resolution be revised, replaced, or discarded? Briefly explain your reasoning.
      response: |+
        The 1973 War Powers Resolution is currently law and there for should be enforced unless or until it is rescinded by congress.  The law was enacted precisely to control overreach by the executive branch relative to wasting the lives and resources of our military in an unnecessary war.

    - question: Many of Montana's rural hospitals and clinics are facing financial stress because of low patient volume and tight budget margins. What, if anything, should Congress be doing to support Montana’s health care providers?
      response: |+
        Nearly a dozen of Montana's rural hospitals are in danger of closing due to lack of funding caused by our broken medical system in America.  Americans pay 50% more for health care than the next most expensive system in the industrialized world even though we have the worst measurable outcomes of all other industrialized countries. Let that sink in.  .... We pay way more and get less.
        The solution to this problem is actually simple, America needs a universal health care system.  There are for profit and not for profit examples that work very well but no one has had the political will to buck the entrenched special interests in the US that prevent our citizens from getting what they need and deserve in a health care system.  The financial benefits to both small and large businesses of a universal health care system would be huge.  Large businesses could better compete globally and small businesses would not be strapped by health insurance costs.

    - question: Describe two issues unique to Montana that you intend to address. Explain how you’ll get the job done.
      response: |+
        Homeowner’s insurance, fire insurance and medical costs have all gone through the roof because of direct climate change impacts on those costs for insurance companies.  The extra costs can be calculated by the insurance companies.  I would introduce a bill to get those extra climate change costs transferred from the companies causing the problem to the insurers and credited directly to customers bills.
          
        Rising utility costs are killing Montana families. The clean energy subsidies were eliminated by the OBBB passed last July.  The next step is to remove the direct and indirect federal fossil fuel subsidies totaling close to a Trillion (with a T) dollars each year.  I would introduce a bill to do that.  When there is a level playing field for all energy sources the issues around Colestrip and the Snake river dams can easily be resolved by the PSC, legislature and BPA.

        I would also introduce bills for federal term limits and mandatory retirement ages for all three branches of government.

    - question: Identify options or strategies available to federal officeholders to address home ownership and cost of living in Montana.
      response: |+
        I would get the National Laboratory of the Rockies (formerly NREL) to initiate a "low cost" home competition similar to the old Solar Home competition.  Builders, contractors and the legislature would be able use the best ideas to help drive down home ownership costs here in Montana.

    - question: Briefly describe any traits and actions that would distinguish your service from that of the elected official who currently occupies the office you’re running for.
      response: |+
        The differences between myself and Mr. Daines or any other current US Senate candidates are as follows.
        1.  I will be a one term Senator so I will not be fundraising from the Epstein Class for a next election nor would I be "owned" by them.  I would be working for all Montanans instead of just the modern day “Copper Kings”.
        2.  I'm not funded or "owned" by any dark money, pacts or other special interests.
        3.  I will hold regular town halls if I'm elected.
        4.  The reasons for my votes will be transparent and readily available.
        5.  I will donate my first year’s salary (minus expenses) to a Montana non-profit(s) of my choice.

- candidateName: Kimberly A. Persico
  nameSlug: kimberly-a-persico
  bioMaterial:
    - question: Please describe any professional and/or life experiences that will help voters assess your qualifications for the office you’re seeking.
      response: |+
        I have a Bachelor of Science degree in Chemistry.  I worked for 10 years as an analytical chemist in an environmental chemistry lab and was teaching math at a community college in Wisconsin when we decided to move to Montana in 2000.  I have worked in a variety of positions, including a restaurant, veterinary hospital, stock yards, and on a ranch. In 2011, we moved to Hot Springs and I started an environmental consulting business.  I worked with the mining industry in Lincoln county for over seven years. During this time I also worked as a para-professional at the Hot Springs school. We purchased a couple of empty lots in Hot Springs and built a home over the course of five years, doing as much of the work ourselves as possible.  I dug the foundation trenches myself, by hand.  I am used to working hard to achieve my goals and will apply that same ethic to being your representative.

    - question: Where do you live currently? Where (city and state) were you born? How long have you lived in Montana?
      response: |+
        I currently live in Hot Springs and have been here for 15 years now.  I was born in Willmar, MN and my family moved to Wisconsin when I was an infant. I grew up in Hudson, WI. I have lived in Montana since 2000.

    - question: Age as of Nov. 3, 2026, date of birth, and place of birth. We will not publish your birth date.
      response: |+
        My birthday is October 1, 1968.  That will make me 58 years old on election day. I was born in Willmar, MN.

    - question: What other biographical information do you want voters to know about you?
      response: |+
        My family has a deep history of military and public service.  My dad was in the Navy and my father-in-law was in the Air Force. My mother-in-law served on her local city council for many years. My brother retired from the Navy. My brother-in-law was in the Army, and my son was an EOD specialist in the Air Force.  He is a decorated combat veteran for his service defusing bombs in Afghanistan.  My granddaughter's fiance is currently deployed in Africa. My late husband is the true inspiration for my political campaign.  He was a veteran of the Air Force and dedicated his life to public service after that.

    - question: Your constituents ask you for help with the failure of a major infrastructure project, the cost of which is more than state and local governments can raise. You can direct federal money to the project through an earmark, or you can leave the funding decision up to a federal agency, in which case the decided outcome won't be yours. Which strategy are you most likely to pursue, and why?
      response: |+
        I would leave funding up to a federal agency and personally make sure it was addressed in an expedited manner.  I believe we need to have a balanced budget.  One step toward achieving this goal is to eliminate earmarks.  The practice of slipping earmarks into must-pass budget bills is an easy one to exploit and an easy one to eliminate.  There were 16 billion dollars in earmarks passed in the last batch of budget bills.  Congress needs to fund general grant programs that let federal and state governments select the projects they need funded.  These competitive grants are need-based, and major infrastructure failure would put it at the top of the list.  Aggressive follow-up by elected officials is crucial to getting these grants approved in a timely manner.  Standing up and saying NO to earmarks is not an easy position to take in the current atmosphere of seemingly endless funds.  We, as a nation, cannot continue to spend as we have been doing.  Presently, our debt is 39 trillion dollars and continuing to explode. We have to rein in our spending.  When looking through the lens of our debt, eliminating earmarks is an easy place to start the difficult process of balancing the budget.

    - question: Describe your approach to management of federal lands when conflicts arise between conservation, energy development, recreation, and tribal sovereignty.
      response: |+
        I fully support the multi-use aspect of our public lands.  My approach to managing federal lands will be to bring together leaders of all concerned parties to form a plan to meet a stated goal.  The process for implementing the Roadless Rule is a good example of how to manage our federal lands.  It involved everyone, and their concerns were taken into consideration.  This led to a huge level of public support.  While every issue will not garner that level of public support, by taking into account everyone's ideas and concerns a plan can be crafted that reaches the stated goal while minimizing potential damage.  A time frame needs to be established and adhered to so that any action is not "talked to death" by opponents.  Sovereignty of Tribal lands must be respected.  When a plan is finally hammered out and implemented it should be evaluated on a regular basis to ensure that it is meeting its stated goals.  It can be updated at this point to account for best practices and shifting priorities by a supermajority vote so a simple shift in party majority won't be constantly changing regulations.  Constantly shifting rules cause confusion and make long term planning difficult for the industries that make use of our public lands.

    - question: Identify two national priorities that are not addressed in this questionnaire that are important to your platform. Briefly explain your position on each and tell voters how you intend to address them. If there’s an existing bill you support to advance your position, please identify it.
      response: |+
        Two of my biggest priorities for our nation are Term Limits and ending Citizens United.  I believe in term limits for Congress that are long enough to foster the stability of our government while eliminating the "ownership" of long term politicians.  I also support HR 1074 that imposes 18-year term limits on our Supreme Court justices.  I also support ending Citizens United.  I have been educating everyone I talk to about the Transparent Election Initiative and the Montana Plan.  This is a ballot initiative that would change the corporate code in Montana to not allow any corporate contributions to our elections or ballot initiatives.  Now that this initiative is ready, I will be gathering signatures to get it on the ballot while collecting the signatures that I need to get on the ballot.  We here in Montana are in the unique position of leading our country out of the nightmare that Citizens United has inflicted on our elections.  I will be working hard to accomplish this goal.

  mtfpTitle: TK here
  mtfpWrittenBio: |+
    TK MTFP-written bio

  questionnaireMaterial:
    - question: When a president deploys U.S. armed forces into combat for a month or longer without authorization, should the War Powers Resolution of 1973, which gives Congress the power to declare war, be enforced? If not, should the War Powers Resolution be revised, replaced, or discarded? Briefly explain your reasoning.
      response: |+
        Yes, the War Powers Resolution of 1973 should be enforced.  If Congress does not declare war, or authorize the action taken by the president, then our forces must be withdrawn after 60 days (with a possible 30-day extension).  Committing our armed forces to extended conflict should not be left to the judgement of one person.  The collective judgement of both the President and Congress has to apply in order to ensure that our initial and continuing involvement in hostilities is clearly indicated by circumstances, has a clearly defined scope and duration, and well defined authority under which hostilities are undertaken. I have experienced first hand the terror of sending your child off to war. My son was an EOD specialist in the USAF and did a tour in Afghanistan defusing roadside bombs.  I know what the families of our military are going through right now.  It is the duty of Congress to make sure we are not engaging in forever wars with no tangible outcome.  The safety of our troops and the nurturing of our international relationships should never be left to the judgement of one person.

    - question: Many of Montana's rural hospitals and clinics are facing financial stress because of low patient volume and tight budget margins. What, if anything, should Congress be doing to support Montana’s health care providers?
      response: |+
        Congress needs to pass a universal healthcare plan.  I support the Medicare For All plan.  When people have good healthcare coverage they are more likely to go to the doctor, which would address the low patient volumes in rural settings.  I do not support mandates to buy into this plan.  However, I think a large majority will because we do not support health insurance companies making 70 billion in profit every year off of sick people.  Health insurance companies are constantly raising premiums while cutting benefits to maintain those profits.  This is wrong, and if people have a reasonable choice like Medicare For All presented to them, I believe it would be wildly popular.  The federal government can help rural hospitals and clinics with their tight budget margins by funding scholarships and loan repayments to healthcare professionals in exchange for working in Critical Shortage Facilities.  They can fund AI and telehealth to improve systems and support licensure compacts to allow clinicians to work across state lines.

    - question: Describe two issues unique to Montana that you intend to address. Explain how you’ll get the job done.
      response: |+
        There are numerous issues relating to agriculture that I would address.  The first is "Country Of Origin Labels."  I support COOL both as a consumer and as a representative for our ranchers.  I, personally, would not choose to purchase beef grown outside of the United States, if I had the option.  I support expanding the H-2A Visa program to clarify that livestock auction markets and rancher/farmer feedlots qualify as agricultural employers so they can hire foreign workers.  I support defining bison as livestock.  This will eliminate the current uncertainty faced by bison producers trying to secure federal grazing permits.

    - question: Identify options or strategies available to federal officeholders to address home ownership and cost of living in Montana.
      response: |+
        There are many ways the federal government can help bring down the cost of home ownership.  It can offer tax credits for entry-level home construction and the conversion of unused office and retail space into housing.  Investing in infrastructure like roads, water and sewer systems for new and existing affordable housing communities will bring down costs.  Encouraging local governments to relax zoning rules and housing codes and forbidding corporations from buying single family homes will help increase availability.  Supporting research into new construction methods like 3D-printed houses will also help bring down costs.  Printing houses that are energy efficient and able to withstand severe weather conditions, economically, is a reality that is coming.  We need to support the research required to make it happen.

    - question: Briefly describe any traits and actions that would distinguish your service from that of the elected official who currently occupies the office you’re running for.
      response: |+
        One of the major complaints that I hear frequently about our current set of representatives is the lack of accessibility. I have encountered that myself as a constituent.  They do not do in-person town halls.  They only reply to written inquiries with party-line drivel weeks after the initial inquiry was made, if at all.  As your representative I will be personally available to my constituents on a regular basis.  I will hold town hall listening sessions regularly across the district.  I will also respond to inquiries with actual information on what is going on, and how I can or cannot help in a timely manner.  I will not be beholden to the big money interests that have purchased both major parties.  I will absolutely support a ban on members of Congress trading stocks.  I will work hard on behalf of all my constituents and listen to what they have to say.

- candidateName: Brian J. Miller
  nameSlug: brian-j-miller
  bioMaterial:
    - question: Please describe any professional and/or life experiences that will help voters assess your qualifications for the office you’re seeking.
      response: |+
        As a father of two young adults, I look at the world through their eyes and wonder "What the hell are we doing? What will the future of the next generation look like in America?"  This motivates me today and will motivate me if elected.  From the professional side of things, I'm a civil litigator who has tried cases in front of juries of regular Montanans all over the State, including a lot of places that look like District 2. In other words, I think I know how to communicate with real Montanans with a minimal amount of BS.  In my work, I’ve always tried to make things better for people, going against corporate interests, insurance companies, liars, people who abuse power, and so forth.  And I’ve represented all kinds of people in all kinds of crazy situations—a skill set which might come in handy these days, who knows?  I’ve also worked with subject matter experts in variety of different fields, which, again is something a Congressional representative needs to do to make good decisions.  I guess you could say I'm nerd who spends too much time reading books and gathering information. Maybe we need more nerds in Congress.

    - question: Where do you live currently? Where (city and state) were you born? How long have you lived in Montana?
      response: |+
        I live in Helena, Montana- but I hope no one in the eastern hinterlands of District 2 will hold that against me!  I was born in Cleveland, OH (a.k.a. the “armpit of the Northeast”), but grew up in the Deep South.  I first came to Montana on a road trip with a buddy in my 20’s and then made my way back for a job in 1998 driving a jammer bus up in Glacier Park.  That was a weird year for grizzlies in the Park. From there, my love of Montana spiraled out of control.  I moved to Helena in 2007 after I finished U of M Law School, to take a job for Justice Patricia Cotter at the Montana Supreme Court.  Aside from a brief period where my ex-wife had to go back east to finish college, I’ve lived in Montana for nearly half my life (approximately 25 years).  Back in the 1990’s, people were a lot more chill and “live and let live” here.  This MAGA nonsense has kind of ruined the vibes.  I hope we can return to the laid-back style of 1990’s Montana where people chilled out and focused on enjoying life more.

    - question: Age as of Nov. 3, 2026, date of birth, and place of birth. We will not publish your birth date.
      response: |+
        Born 2/15/72 (hardcore Aquarius).  Place of Birth: Cleveland, OH

    - question: What other biographical information do you want voters to know about you?
      response: |+
        I’m one of those people that is curious about the world and likes to try to understand things.  I got my undergraduate degree in Philosophy from Emory University in 1995, where I also studied Ancient Greek, the Classics, and philosophy of science.  I’ve always admired people who are more of the outsider or rebellious class, people like Vincent Van Gogh, Jim Morrison, Franz Kafka, Carl Jung, Dmitiri Mendeleev (the father of modern chemistry), and Kurt Vonnegut-whom I actually got to see before he died.  That dude was a legend! Those kinds of people influenced how I think about and view the world.  In terms of political “heroes”, my favorites are: Alexander Hamilton, Abraham Lincoln, Teddy Roosevelt, and FDR.   In fact, one of the first things I did when I was thinking about running was go back and re-read the Federalist Papers (all 85 of them), and the writings of Lincoln. I also think that President H.W. Bush has been vastly underrated.  I consider myself first and foremost an Independent-minded Montana, and secondarily a Democrat.  I’m a team player, but I can’t stand groupthink and the “herd mentality”.  I place a premium on independent thinking.

    - question: Your constituents ask you for help with the failure of a major infrastructure project, the cost of which is more than state and local governments can raise. You can direct federal money to the project through an earmark, or you can leave the funding decision up to a federal agency, in which case the decided outcome won't be yours. Which strategy are you most likely to pursue, and why?
      response: |+
        Well, assuming that this is something that is necessary, and not just some junky pork project, I’m going to do whatever needs to be done to get the money there.  So, in your hypothetical it sounds like the earmark is the best way to get that done, so that’s what I would do.  But in general, we need to make sure we are not wasting money on things that don’t lead to increases in the productivity of our national economy, because that should be the purpose of any sort of government spending.  I want to see us spending more money on constructive projects, like public works, healthcare, building agriculture infrastructure, and less money on war.  War is such a waste of money, but it seems like in D.C. politicians always find money for war, but never money for peaceful things that actually make life better. In his last address to the Nation before he died, FDR said that if you want to have security, then you need to make sure that the needs of the people are being met; without that, you will have more conflict, strife, and war.  I agree with that 100.

    - question: Describe your approach to management of federal lands when conflicts arise between conservation, energy development, recreation, and tribal sovereignty.
      response: |+
        There are many different interest that come together around land: resource extraction, energy development, agriculture, the rights of the tribes, and the spiritual and recreational aspects of wilderness and land.   All of these are important.  It is therefore critical to get all the stakeholders together and discuss such matters before decisions are made.  If I was elected to Congress, I would view it as my responsibility to try to facilitate those discussions when possible.  Land use issues are a political lightning rod in Montana; always have been, always will be.  We can’t forget that we live in a technological society and need things like rare earth minerals and other resources we can convert into electricity;  at the same time, wilderness and open space are also critical to our economic, moral, and spiritual well-being. Given such diverse interests and objectives, sometimes you just can’t make everyone happy. But you can find common ground as witnessed by many successful collaborations in Montana.  What I think is important here is having a transparent process, listening to people, and exploring options.  You run into problems when you fail to account for different viewpoints and exclude groups from the decision-making process.

    - question: Identify two national priorities that are not addressed in this questionnaire that are important to your platform. Briefly explain your position on each and tell voters how you intend to address them. If there’s an existing bill you support to advance your position, please identify it.
      response: |+
        No one wants to talk about the National Debt, so I’m just going to focus on that because it could end up being deadly if not dealt with soon.  Our National Debt stands at around 39 trillion dollars and is at approximately 125% of our GDP.  The One Big Beautiful Bill (OBBB) is about to make it much worse, threatening a wide-scale default in the American economy.  The way we get this under control is to start looking at annual deficit spending.  Smart economists who have studied this say that we cannot exceed annual deficit spending of 3%; the OBBB had an annual deficit of around 6.5%.  From the mid 1950’s to the late 1970’s, we reduced our debt to GDP ratio by about 30% and during that timeframe, annual deficit spending maintained at less than 3% (for the most part). We also need to score all federal budgets on 2-year cycles, so we understand the real money involved.  The OBBB was scored on a 10-year cycle which is economic nonsense and recklessness.  To get this done, one thing we must do is increase corporate tax receipts, which currently only constitute 10% of federal revenue.  This is dumb.

  mtfpTitle: TK here
  mtfpWrittenBio: |+
    TK MTFP-written bio

  questionnaireMaterial:
    - question: When a president deploys U.S. armed forces into combat for a month or longer without authorization, should the War Powers Resolution of 1973, which gives Congress the power to declare war, be enforced? If not, should the War Powers Resolution be revised, replaced, or discarded? Briefly explain your reasoning.
      response: |+
        The Constitution is self-evident here; only Congress has the power to declare war.  Madison was very clear about his fear of standing armies in Federalist No. 41 and 47, and this stricture is embedded deep in the Constitution.  As the branch closest to the People, the war power is lodged with the Congress.  This is not accidental or trivial because the social, economic, and moral costs of war are always borne by the People.   But we have gotten way out of that mode since Vietnam.  The “military industrial complex” (and now the State of Israel) has hijacked our national government on matters of war.  The late Ozzy Osborne had a name for these people; he called them “warpigs”.  If I’m elected to Congress, I will make sure that we put Congress back in charge of any use of military force against any foreign nation, no matter how slight.  We need to “Trump-proof” our government on the use of military force, so that this never happens again.  In fact, I will not vote for one penny for the “Department of War” until all of our military stuff is out of the Middle East.

    - question: Many of Montana's rural hospitals and clinics are facing financial stress because of low patient volume and tight budget margins. What, if anything, should Congress be doing to support Montana’s health care providers?
      response: |+
        First, we need to repeal and replace the One Big Beautiful Bill, which cut $ 1 trillion from Medicaid in order to give $ 1Trillion dollars in tax cuts to the Top 1%.  We need to reverse that equation. We also need to spend money on restoring ACA subsidies, instead of spending hundreds of billions of dollars fighting a war in the Middle East that we have already lost.  But these are just emergency measures to help stabilize things.  Beyond that, we need to do comprehensive healthcare reform.  There are two things stopping us from having a decent healthcare system: greed and stupidity.  Part of the reasons why rural hospital and clinics don’t have money is because the CEOs and shareholders of private insurance companies are making insane profits; we need to reverse that trend.  We also need to modernize our healthcare systems, using the best technologies and approaches to reduce costs.   We need to be smarter about how we deliver healthcare. We can save money and improve outcomes in rural healthcare by using a mix of telehealth and in-home monitoring devices and technologies to serve patients better because of the distances and lack of facilities available in rural areas.

    - question: Describe two issues unique to Montana that you intend to address. Explain how you’ll get the job done.
      response: |+
        One is the crisis of Missing and Murdered Indigenous Women within the reservations in our state.  This is a serious moral crisis in our state, and as Montanans we should all be concerned about it.  There are moves being done in the right direction, with more federal resources being directed to this issue, but we really need to speed it up.  As a Congressman, I would like to work on getting everyone around the same table at the same time and figuring this thing out.  Related to this, is sex and labor trafficking, which is not just limited to the tribal lands.  We need to devote more resources to this issue.  I would like to see the creation of elite task forces that are dedicating to destroying sex and labor trafficking rings in this state.  I want sex and human traffickers to fear coming into Montana.  This has to be a joint effort between federal, state, tribal, and local authorities, and it is something worth spending money on.   Let’s quit wasting money on bombs in the Middle East, and start taking care of each other here in Montana.

    - question: Identify options or strategies available to federal officeholders to address home ownership and cost of living in Montana.
      response: |+
        I’ve looked at Ezra Klein’s work on this issue in his book “Abundance” and can speak to some of the issues he raises.  First off, the regulatory environment in America has gotten out of hand, and it takes too long and is too expensive to build houses when compared to other countries.  We need to streamline that process if we want to get serious about this issue.   Second, we are going to have to understand that if we increase the housing stock, it is going to lower equity for homeowners, so we need to make sure that people are okay with that.  On affordability, we need deep structural change in our economic system.  The top 10% hold 66% of the National Net Worth; the bottom 50% only hold 4%.  We need to change that dynamic.  I am in favor of exploring options like wage subsidies and universal basic income in order to change this dynamic.  We should also look at things like sovereign wealth funds which countries like Saudi Arabia and Norway have to ensure that the People benefit from economic productivity gains.  We must put an end to excessive financial speculation and insane income inequality in America.

    - question: Briefly describe any traits and actions that would distinguish your service from that of the elected official who currently occupies the office you’re running for.
      response: |+
        Here are big things I would do right off the bat for Montana if elected: (1) repeal the Canadian tariffs: (2) Mandatory country of origin labelling: (3) Right to repair, and (4) Restore Medicaid funding and the ACA subsidies. Beyond that, if I am elected, it would be my intention to be a very accessible Congressional representative. I would do in-person townhalls at every Congressional recess, and I would do as many zoom townhalls with different groups as I could when in D.C.  I wouldn’t censor people and would make myself available to people who want to criticize and yell at me, just as much as those who might like what I’m doing. I would try to do weekly press gaggles as well, where outlets like Montana Free Press could beat up on me in public and make me look stupid.  I am also interested in exploring the use of digital technologies (such as the creation of an app), which would allow verified, registered voters to track what I’m doing, what I’m working on, and do things like create polls on certain issues, so that I could gauge public sentiment in real time.

- candidateName: Aaron Flint
  nameSlug: aaron-flint
  bioMaterial:
    - question: Please describe any professional and/or life experiences that will help voters assess your qualifications for the office you’re seeking.
      response: |+
        I’ve spent my life serving Montana and this country. I grew up in Montana, deployed overseas to Iraq, Afghanistan and Africa, and later worked in Washington, D.C., for Montana Senator Conrad Burns. After college I followed in my grandparents footsteps and got into the local news business and since 2009, I’ve hosted statewide radio, talking with Montanans every day about the issues that matter most to them. That experience has given me a front-row seat to the challenges families are facing and what needs to be done to fix them.

    - question: Where do you live currently? Where (city and state) were you born? How long have you lived in Montana?
      response: |+
        Jessica and I are raising our kids in Kalispell. My parents are from the Flathead and Glasgow. I was born in Tarzana, CA where my dad was working to become an actor after touring Montana for the 1776 musical celebrating our nation’s bicentennial. My parents divorced when I was young, so I moved a lot and have lived in Montana non-consecutively since I was a little kid, growing up mainly in Glasgow and the Flathead. Jessica and I have made our home in Missoula, Bozeman, Billings and Kalispell. Our kids were all born in Missoula.

    - question: Age as of Nov. 3, 2026, date of birth, and place of birth. We will not publish your birth date.
      response: |+
        Born February 22, 1980. Tarzana, CA.

    - question: What other biographical information do you want voters to know about you?
      response: |+
        Both of my parents were hard-working single parents. I know what it means to work hard, live within your means, and fight for every opportunity. The G.I. Bill helped Jessica and me buy our first home. Like a lot of families, we are renting right now because the housing market is so difficult. We’ve raised our children here in Montana and want to make sure the same opportunities exist for the next generation.

    - question: Your constituents ask you for help with the failure of a major infrastructure project, the cost of which is more than state and local governments can raise. You can direct federal money to the project through an earmark, or you can leave the funding decision up to a federal agency, in which case the decided outcome won't be yours. Which strategy are you most likely to pursue, and why?
      response: |+
        Congressman Zinke has proven that congressionally directed federal spending can benefit Montana in a fiscally responsible way. He has proven that at the Noxon Bridge, the Seeley Lake water treatment plant, and countless other infrastructure projects. I would use the power the Constitution gives Congress to control the purse and make sure funding is directed to real problems that need to be solved. I would work with county commissioners to identify shovel-ready projects that make a difference in the community. I would fight to make sure those dollars are used where they actually matter: on projects that support our communities and our economy.

    - question: Describe your approach to management of federal lands when conflicts arise between conservation, energy development, recreation, and tribal sovereignty.
      response: |+
        Public lands are exactly that, “public”. meaning they are for everyone to use and benefit from, and I will always fight to keep them that way. Just as important, they need to remain accessible. When land is locked up for large-scale solar projects, private checkerboard, or excessive regulation, it shuts out hunters, anglers, hikers, workers, and families who rely on that access. The same goes for policies that eliminate responsible uses like logging. Public lands were never meant to be off-limits, they were meant to support multiple uses. Right now, radical environmental policies are pushing toward making them usable by no one. We can do better. We can protect our lands and keep them healthy while still allowing responsible development and supporting communities like Libby that depend on them. That balance is what I will fight for.

    - question: Identify two national priorities that are not addressed in this questionnaire that are important to your platform. Briefly explain your position on each and tell voters how you intend to address them. If there’s an existing bill you support to advance your position, please identify it.
      response: |+
        My number one priority is making life in America affordable again. I am the son of a bartender and a waitress, and I know what it takes to make ends meet. Right now, working families are getting crushed by years of bad policies out of Washington. I will fight to cut taxes, keep no tax on tips and on Social Security in place, and make sure healthcare dollars go to patients, not giant insurance companies. We need to cut regulations so we can build, log, and bring back good-paying jobs to our communities. We also need to invest in apprenticeship programs and trade training to rebuild a skilled workforce. Montanans are willing to work hard; they just want a fair shot and a government that gets out of the way.

        The second priority is defending our Montana way of life. This race is about the future of our state and our country. Do we want radical woke agendas pushed into our schools and communities, or do we stand up for the values that built this country? I will fight to protect our public lands, our industries, and our freedoms, and make sure Montana stays Montana for the next generation.

  mtfpTitle: TK here
  mtfpWrittenBio: |+
    TK MTFP-written bio

  questionnaireMaterial:
    - question: When a president deploys U.S. armed forces into combat for a month or longer without authorization, should the War Powers Resolution of 1973, which gives Congress the power to declare war, be enforced? If not, should the War Powers Resolution be revised, replaced, or discarded? Briefly explain your reasoning.
      response: |+
        Everyone is sick of forever wars in the Middle East. I fought in Iraq and Afghanistan and I know what it means to be stuck in a nation-building quagmire with no clear end in sight. We owe it to the men and women who serve to be clear about our mission and not drag them into endless conflicts that cost lives and waste your tax dollars. That being said, the Department of War and the President must have the ability to defend Americans and stop threats before they reach our shores. We live in a dangerous world, and hesitation can cost lives. Regarding the war in Iran, President Trump did not start this war. He is ending it. Iran has attacked and killed U.S. forces for decades with no consequences. Trump ended that and I am happy to see an end to the conflict in sight. Regarding the War Powers Act, I would not support anything that ties the hands of our military or prevents the President from acting quickly when American lives are at risk.

    - question: Many of Montana's rural hospitals and clinics are facing financial stress because of low patient volume and tight budget margins. What, if anything, should Congress be doing to support Montana’s health care providers?
      response: |+
        Let’s start with what Republicans have already done to help rural hospitals. In the One Big Beautiful Bill, $50 billion was set aside specifically for rural healthcare. Montana received $233 million, the fourth highest allocation in the country. That is real money that will go directly to helping our hospitals stay open, expand services, and ease the financial strain they are under. That is the kind of targeted support I will focus on. One-size-fits-all policies pushed by the left do not work for Montana. Too often those dollars end up flowing to large urban systems in places like New York and Los Angeles while our rural providers struggle to keep the lights on. We need to make sure funding actually reaches the communities that need it most and stop funneling money to big insurance companies and massive hospital networks over rural America.

    - question: Describe two issues unique to Montana that you intend to address. Explain how you’ll get the job done.
      response: |+
        First is access to our public lands. Montanans depend on these lands for recreation, jobs, and our way of life. More and more, we are seeing pressure from federal agencies and outside groups trying to lock up land or restrict access without listening to the people who actually live here. That is not how it should work. I will fight to keep these lands in public hands, keep them accessible, and make sure Montanans have a seat at the table when decisions are made.

        Second is the decline of the timber industry. Communities across northwest Montana have been hit hard by mill closures and overregulation. Those jobs supported families and entire towns, and we have watched them disappear. I will work to cut unnecessary red tape, increase responsible timber harvests, and push back on policies that are killing good-paying jobs. Montana should be producing its own resources, supporting its own workers, and keeping those communities alive instead of letting them fade away.

    - question: Identify options or strategies available to federal officeholders to address home ownership and cost of living in Montana.
      response: |+
        The increased population is one reason for higher home prices, and I understand why so many people are moving their families from high-tax and ultra-regulation states in favor of Montana values. But we need to make sure the Montana dream is affordable. Step one: stop Wall Street investing firms from buying Montana family homes. Next, cut the red tape around building homes. Regulations add cost and time to projects. $100,000 of a house’s price is in permitting before a hole is dug. We can bring these costs down. A renewed focus must also be put on producing building materials here at home. A strong domestic logging industry lowers costs and keeps money in our local economy. Finally, we need more skilled workers. Investing in apprenticeships and trade training will help build more homes and create good-paying jobs at the same time. That combination will help bring costs down and give Montanans more opportunities to own a home.

    - question: Briefly describe any traits and actions that would distinguish your service from that of the elected official who currently occupies the office you’re running for.
      response: |+
        First off, I would like to thank Congressman Zinke for his 35 years of public service to Montana. I would carry the torch on issues like keeping public lands in public hands and delivering infrastructure funding for Montana. That said, Montana is ready for a new generation of leadership.

        I represent that generation. The average age of a first-time home buyer has jumped from late 20s to early 40s due to a number of factors, like lingering Biden inflation and high interest rates. The ability for younger people to build prosperity and financial resilience is growing more difficult. Jessica and I face the same challenges buying a home and are actually locked into renting while raising three kids. That is the reality for many Montanans right now.

        I started hosting a statewide radio show 17 years ago, talking with Montanans every day. I have heard firsthand their frustrations with government and what they believe needs to change. That has given me a different perspective than most candidates. I am not guessing what people want; I have been listening to them for nearly two decades. I am ready to take that experience to Washington and fight for the people of this state.

- candidateName: Patrick McCracken
  nameSlug: patrick-mccracken
  bioMaterial:
    - question: Please describe any professional and/or life experiences that will help voters assess your qualifications for the office you’re seeking.
      response: |+
        Montana has given me everything that matters — my wife, my children, the land I love. It's given me the flash of a trout about to take my fly, the smell of the first cold day in fall, the howl of coyotes while dragging out a deer by moonlight with my dad. It's given me the same mountains my great-grandparents looked upon when they homesteaded land with no water. The same wind and sky when they lived in a sod house on the prairie.

        That land never quite got them enough to make it. They moved to town. So did most of us. It's only the love of the place that keeps you here — and it does.

        Montana takes, too. Lower than average wages. Sky-high cost of living. A myth of the western man and woman that sometimes leads to quiet suffering. We love it anyway. We seek to protect it and pass it on.

        That's why I'm running. Not for a career. For my kids, and for the place we love.

    - question: Where do you live currently? Where (city and state) were you born? How long have you lived in Montana?
      response: |+
        I was born on Ellsworth Air Force Base in South Dakota and raised on military bases around the world. Montana has been home all my life - even during the years I had to leave it to find good work. I live outside Columbia Falls with my wife of 18 years and our two boys, eleven and thirteen - the fifth generation of our family in Montana.

    - question: Age as of Nov. 3, 2026, date of birth, and place of birth. We will not publish your birth date.
      response: |+
        48

    - question: What other biographical information do you want voters to know about you?
      response: |+
        I went to Billings West and studied earth sciences at Montana State. After college I spent ten years as a financial advisor. I left in 2017 - not because the market was bad, but because the money printing made it so easy that discernment no longer mattered. That bothered me more than the bull market rewarded me. I've banged nails and run chair lifts at the Yellowstone Club. I've worked union jobs and under-the-table jobs. I know what the service entrance looks like. I've never confused it with the owner's entrance. I didn't enlist. After an entire childhood on the military's schedule, the last thing I wanted at 18 was more. I'm grateful every day for those who did - starting with my father. I work from home for a major gold company - good people. We believe in sound money. I'm running because I have two boys and the America we are leaving them isn't even close to good enough.

    - question: Your constituents ask you for help with the failure of a major infrastructure project, the cost of which is more than state and local governments can raise. You can direct federal money to the project through an earmark, or you can leave the funding decision up to a federal agency, in which case the decided outcome won't be yours. Which strategy are you most likely to pursue, and why?
      response: |+
        I'd love to bring home the bacon in one-off projects. That's how you buy goodwill and win reelection. I'm not running for reelection. I'm running for my children and the America they'll live in.

        Every earmark, every dollar of federal spending, is adding to a debt north of thirty-nine trillion and counting. We now spend more servicing the interest on that debt than we spend on our entire military. That is not a talking point. That is a crisis.

        Four decades of bring home the bacon politics produced this. The spending has not built the middle class. It has not improved outcomes for a majority of Americans. It has enriched Washington and the Ruling Class and indebted everyone else.

        I am running to cut spending and cut the red tape that justifies it. The era of business as usual is what got us here.

    - question: Describe your approach to management of federal lands when conflicts arise between conservation, energy development, recreation, and tribal sovereignty.
      response: |+
        The Federal Government owns 30% of Montana. But the people own the government. This is not the King's Forest - it is the American people's inheritance.

        Our state constitution declares a right to a clean and healthful environment and the pursuit of life's basic necessities. It also demands we accept the responsibilities that come with those rights. That balance is the job.

        I am for responsible extraction - oil, gas, mining, timber, grazing. And I am for the land that makes Montana what it is - the hunting, the fishing, the open country we hand to our children. These are not competing interests. They are competing only when we manage them badly.

        The public must receive market rates for the use of its land. Recreation and the environment we depend on cannot be degraded. Both are non-negotiable.

        We were also endowed with obligations. The founding of this nation included treaties with native peoples. We honor them the same way we honor our children's inheritance of this place.

    - question: Identify two national priorities that are not addressed in this questionnaire that are important to your platform. Briefly explain your position on each and tell voters how you intend to address them. If there’s an existing bill you support to advance your position, please identify it.
      response: |+
        Two things will define what we leave our children: whether we enforce the rule of law against the powerful, and whether we face what we've borrowed in their name.

        We know the victims. We know the crimes. We have names and documents - and there are more.

        We face this now - eliminate the shadows, hold every person accountable - or we leave our children a country governed not by free citizens but by child traffickers and their protectors.

        That inheritance is not the only one we're leaving.

        While we lived our lives, our government borrowed thirty-nine trillion dollars in our names and our children's. Not to build the middle class - the middle class has been hollowed out. They moved it through wars we didn't choose, programs that made them rich, and causes that weren't ours until it was well and truly gone.

        The debt is a claim on our children's labor, and on their children's labor - payable through low wages, low mobility, high cost of living, and fighting politicians' wars.

        Epstein's group enslaved children for leverage over the powerful. We - through passivity, through comfort - let them take everything else. We invited them to do it.

        The fault is with us.

  mtfpTitle: TK here
  mtfpWrittenBio: |+
    TK MTFP-written bio

  questionnaireMaterial:
    - question: When a president deploys U.S. armed forces into combat for a month or longer without authorization, should the War Powers Resolution of 1973, which gives Congress the power to declare war, be enforced? If not, should the War Powers Resolution be revised, replaced, or discarded? Briefly explain your reasoning.
      response: |+
        Congress has always had the power to declare war and the power of the purse. They don't use either. War pays. Incentives matter.

        Presidents deploy forces in language carefully chosen to avoid triggering the constraints Congress wrote for itself - and Congress lets them, because enforcing those constraints would mean owning the consequences.

        We have to make war a personal decision, not a financial one. Right now, it is a calculation of convenience for people whose own children may not be at risk.

        I will bring a bill to the House that drafts the sons and daughters of the President, Cabinet members, Senators, and Congresspeople first.

        Call it the "Send Baron Act."

        Our country's leadership needs its incentives aligned with the citizens it purports to serve.

    - question: Many of Montana's rural hospitals and clinics are facing financial stress because of low patient volume and tight budget margins. What, if anything, should Congress be doing to support Montana’s health care providers?
      response: |+
        There is no free market anywhere near American healthcare. It is managed pricing, managed access, and managed scarcity — and the people managing it are not the patients or the doctors. That's not a solution. That's a hostage situation.

        We pay hospitals by the patient. When there aren't enough patients over a large area, it doesn't pencil. We pay fire departments to be on standby — not hospitals. Fee for service doesn't work when there aren't enough fees.

        52 of our 56 counties are medically underserved. Medicaid expansion is the single biggest thing keeping the lights on in rural Montana healthcare. Governor Gianforte signed HB 245 removing the sunset on the state's funding portion. Our delegation needs to protect the federal side — full stop.

        Fix what made us this dependent. Start with price transparency — the bills exist. The House passed the Lower Costs, More Transparency Act 320-71. The PRICE Transparency Act is in committee now. The votes are there. The will to finish is not. I intend to provide it. Price transparency is the first step on a long journey.

    - question: Describe two issues unique to Montana that you intend to address. Explain how you’ll get the job done.
      response: |+
        First: data centers. NorthWestern Energy has agreements to supply over 1,400 megawatts to data centers — nearly doubling Montana's electrical demand for minimal jobs. The PSC ruled the contracts don't have to be public. The White House got seven tech companies to sign a Ratepayer Protection Pledge, but it has no enforcement and no penalties. The White House asked Congress to codify it. No one has written the bill. I will. Montanans built this grid. Data centers pay full cost or they don't belong here.

        Second: country-of-origin labeling. Four meatpackers control 85% of beef processing. That's a monopoly. The rancher's share of the beef dollar has dropped from 80 cents to 37 cents while consumers pay record prices. The White House launched a voluntary "Product of USA" sticker. Voluntary. Meanwhile 80,000 metric tons of Argentine beef entered our market with no mandatory label. A sticker isn't enough. I'll co-sponsor the American Beef Labeling Act and push for mandatory COOL in the Farm Bill.

        These two issues have the same pattern. D.C. offers pledges and stickers. Montanans need good laws out of Washington, not more of the same broken promises.

    - question: Identify options or strategies available to federal officeholders to address home ownership and cost of living in Montana.
      response: |+
        Housing in Montana has become unaffordable for the people who live and work here. Wages haven't kept pace, and they won't — because Montanans aren't competing in a housing market anymore. They're competing in an asset market. When the Federal Reserve prints trillions, that money has to go somewhere. It flows into anything that can be financed — homes, rentals, land. Your house isn't a shelter anymore. It's an inflationary asset.

        This is what happens when you let a central bank run monetary policy for the benefit of the monied instead of the people who live and work here. Everything becomes a financial product. Everything goes up in price. That's not a housing crisis — it's a monetary crisis showing up in your mortgage payment.

        I'll support the 21st Century ROAD to Housing Act — the Senate passed it 89-10. Banning institutional investors from buying single-family homes is common sense. But it treats the symptom. The disease is cheap money and a Federal Reserve that answers to no one. Fix the money and you fix the speculation. Until then, we're putting band-aids on a bullet wound.

    - question: Briefly describe any traits and actions that would distinguish your service from that of the elected official who currently occupies the office you’re running for.
      response: |+
        Troy Downing sits on the House Financial Services Committee — the committee that handles banking law. Montana's cannabis industry did $327 million in sales last year and paid $60 million in state taxes. Our businesses still can't bank normally. The SAFE Banking Act has passed the House seven times. Senator Daines championed it from the Senate — and he's leaving. Sheehy hasn't said a word. Montana has no cannabis banking champion left in its federal delegation. Downing could be that champion tomorrow. He won't.

        He hasn't co-sponsored a single COOL bill. R-CALF called him out by name. He sent a letter asking for "clarity" on Argentine beef. Clarity. 27,000 ranches needed a vote, not a letter.

        He lives at the Yellowstone Club. I've worked lifts and banged nails there. He's comfortable in an R+15 district. I'm not comfortable with what that comfort has cost Montana.

        I will write the bill to codify the Ratepayer Protection Pledge. I will co-sponsor the American Beef Labeling Act. I will champion SAFE Banking from the committee Downing is sitting in. These aren't hard issues. They require someone willing to do the work for Montana.

- candidateName: Michael D. Eisenhauer
  nameSlug: michael-d-eisenhauer
  bioMaterial:
    - question: Please describe any professional and/or life experiences that will help voters assess your qualifications for the office you’re seeking.
      response: |+
        I believe in public service and citizenship. In over 24 years of active-duty uniformed military service and a subsequent civilian career in both clinical and administrative medicine, I have lived by core values of Loyalty, Duty, Respect, Selfless Service, Honor, Integrity, and Personal Courage. My military and professional career reveals significant strategic and administrative leadership experience while under pressure, organizational management skills, and an understanding of large and highly complex institutions both inside and outside of our federal government. 
         
           I learned that it is not ok to simply complain or whine about something. To be taken seriously, you must be able to speak truth to power while maintaining mutual respect, and demonstrate a willingness to offer alternatives or contributions to a team process. Practical problem-solving that makes things better for everyone will contribute to our nation’s overall success and collective well-being. These simple principles seem to be missing in today’s politics.

    - question: Where do you live currently? Where (city and state) were you born? How long have you lived in Montana?
      response: |+
        My home is in Great Falls and Cascade County.  Following my military career, I initially relocated to Wyoming for a few years, and then moved to Montana in the winter of 2015.  During my 24+ years of uniformed service, I was stationed to multiple locations within the continental US and completed overseas tours in Korea as well as deployments to Iraq and the Middle East.  Most permanent station assignments were to larger military bases that were big enough to have a major military hospital – which simply do not exist in Montana or the surrounding states.  

           After retirement from active military service, I chose to relocate back to the mid-west and Montana because I believe in our community values and culture of self-reliance, appreciate our veteran-friendly environment, and enjoy our unparalleled access to nature and outdoor activities.

    - question: Age as of Nov. 3, 2026, date of birth, and place of birth. We will not publish your birth date.
      response: |+
        62 years.
        January 7, 1964
        York, Nebraska

    - question: What other biographical information do you want voters to know about you?
      response: |+
        Why am I running as an Independent candidate? The bottom line is this – an Independent Representative is better positioned to be a problem-solver, as opposed to being part of the problem. An Independent Representative can deliver on issues important to his or her constituency and contribute positively to solutions. And that’s good for Montana and for our nation.
           Family:  Before going to college and medical school, I was raised by a family who believes in public service.  All members of my immediate family have been teachers or public-school administrators for their entire careers; suffice to say that my beliefs in public education/teachers and public-school systems are an integral part of who I am.  Strong and well-funded public schools are the backbone of the American education system, and very often also represent the backbone of our local communities.  
            For much of my professional career I was a single-father and sole parent for my son, who is now a mechanical and structural engineer in Great Falls.  Together, we were very active in Scouting where I volunteered for many years as a Scoutmaster or District Executive, and took groups of boys on many high adventure trips.

    - question: Your constituents ask you for help with the failure of a major infrastructure project, the cost of which is more than state and local governments can raise. You can direct federal money to the project through an earmark, or you can leave the funding decision up to a federal agency, in which case the decided outcome won't be yours. Which strategy are you most likely to pursue, and why?
      response: |+
        As your Representative, one of my jobs is to protect and fight for federal funding that comes back to Montana for the benefit of its’ people. We don’t want all of our federal taxes to leave the state!  Respectfully, we can’t remain passive and just sit back to wait and see what happens. The only way to do this is to carefully, but also aggressively, play within the rules that exist at the time.

             Once per year, the House Appropriations Committee (HAC) accepts submissions for Community Project Funding (CPF), known commonly as an ‘earmark’.  This is the formal mechanism for Representatives from each district to request and allocate funds to a wide variety of eligible activities and one-time projects for state, local, tribal governments and eligible non-profits.  Each year, the HAC generates published priorities for funding, and it is the duty of each Representative to work in a collegial manner to prioritize funding requests.  Each member is allowed to submit up to 20 CPF projects, but for each must provide demonstrable evidence of the project’s intended benefit and widespread community support.

             So the short answer is no, I will not sit passively and wait for a federal agency to respond.

    - question: Describe your approach to management of federal lands when conflicts arise between conservation, energy development, recreation, and tribal sovereignty.
      response: |+
        I strongly believe in balanced decision-making and practical problem-solving; my approach to managing federal lands will focus on fairness, local input, and long-term stewardship rather than one-size-fits-all mandates.  When conflicts arise, a disciplined process will look something like this:
        •  Balance competing uses responsibly: no single use should automatically dominate. The goal is multiple-use management, ensuring that decisions weigh economic, environmental, and public access considerations together.
        •  Prioritize local and state input: decisions about federal lands should not be made solely in Washington.
        •  Respect tribal sovereignty and treaty obligations: Tribal governments should be treated as partners, not afterthoughts.
        •  Use clear, transparent processes: this helps build trust and reduce litigation or long-term disputes.
        •  Focus on long-term stewardship: short-term gains should not override long-term consequences.

           This balanced approach protects what must be preserved, allows responsible development where appropriate, includes local voices and tribal nations in decision-making, and keeps the focus on long-term sustainability rather than short-term political wins.

    - question: Identify two national priorities that are not addressed in this questionnaire that are important to your platform. Briefly explain your position on each and tell voters how you intend to address them. If there’s an existing bill you support to advance your position, please identify it.
      response: |+
        Fiscal Responsibility and the National Debt:  The growing debt crisis poses long-term risks to economic stability and national security. This requires a balanced approach to control unnecessary spending while maintaining essential services (like healthcare, defense and social security). We must implement more transparent budgeting practices, and do the bipartisan work.
        I will support efforts similar to the Fiscal Responsibility Act of 2023, which aimed to impose spending limits and improve fiscal discipline.

        Affordability:  An emphasis must be on addressing root causes, not just short-term fixes.  Rather than rely on a single policy, the strategy is to improve the overall economic environment so that individuals and families can better afford to live and work in their communities. 

        Government Accountability and Institutional Trust:  Public trust in government (and Congress) has eroded – restoring it requires clear accountability, reduced partisanship, and consistent application of the law. I will align with reforms such the For the People Act of 2021 (particularly its transparency, ethics, and campaign finance reform provisions), while advocating for more bipartisan refinements.

  mtfpTitle: TK here
  mtfpWrittenBio: |+
    TK MTFP-written bio

  questionnaireMaterial:
    - question: When a president deploys U.S. armed forces into combat for a month or longer without authorization, should the War Powers Resolution of 1973, which gives Congress the power to declare war, be enforced? If not, should the War Powers Resolution be revised, replaced, or discarded? Briefly explain your reasoning.
      response: |+
        I believe strongly in the principles of constitutional governance, accountability, and adherence to the rule of law. In that context, the War Powers Resolution of 1973 (WPA) should be enforced. The WPA is federal law designed to limit the President's authority to wage war without congressional authorization, requiring the president to notify Congress within 48 hours of deploying troops and limiting engagement to 60 days unless Congress authorizes longer action. By law, the President must also provide a full account of the “circumstances under which such hostilities were initiated, the estimated scope and duration of such hostilities, and the constitutional and legislative authority under which the introduction of hostilities took place.” I believe that that no branch of government should act unilaterally in matters as serious as war, and existing laws designed to preserve that balance should be upheld and improved rather than ignored.

             If there are concerns about ambiguity or lack of compliance, the priority would not be to discard the law but to strengthen or clarify it so that its requirements are more explicit and enforceable.

    - question: Many of Montana's rural hospitals and clinics are facing financial stress because of low patient volume and tight budget margins. What, if anything, should Congress be doing to support Montana’s health care providers?
      response: |+
        Montana’s critical-access and rural healthcare system must be maintained. As a Cardiologist, I know that delays of even an hour in the care for emergencies such as a heart attack or stroke can mean the difference between life and death.

             That said, 20% of our economy is now spent on healthcare, which is unsustainable. Millions of Americans are now seeing their health insurance costs increasing disproportionately because of the One Big Beautiful Bill (OBBB), which also canceled Medicaid support and eliminated subsidies. About 2/3 of Montana Medicaid recipients reside in rural areas. There is no question that the OBBB directly threatens the ability for Montana’s 47 rural health facilities to remain financially viable (or maintain current service levels).

             An Independent Representative can think out of the box in ways that differ from others who are constrained by party dogma. Any successful effort must first protect the ability to see the doctor of your choice, and must retain coverage for preexisting conditions. I do not think a single-payer system will work. Above all else, I will fight hard to protect rural healthcare in Montana, because I believe in it and know what it does.

    - question: Describe two issues unique to Montana that you intend to address. Explain how you’ll get the job done.
      response: |+
        The Montana Plan:  I strongly support the Transparent Election Initiative (TEI) that aims to ban corporations from “dark money” spending money on elections or ballot issues, and is intended to counter the effects of Citizens United.  The broader TEI also increases transparency, and improves confidence in the electoral system by returning more control back to citizen voters.
        •  If elected, I will champion the Montana Plan in Congress!

           Family Farms and Ranches underpin Montana’s economy, our national security, and our way of life.  Due to blunders in trade policy and consolidation at every level of the industry, we face a perfect storm; our federal government too often underwrites multi-national corporations at the expense of family farmers.  
        •  Conventional short-term bailouts do not help; we need long-term solutions.
        •  The sale of agricultural lands or assets to foreign and large multi-national corporate entities must be curtailed.
        •  We must address the lack of competition for input suppliers (equipment, seed and fertilizer, etc.); this will very likely require significant anti-trust legislation and legal enforcement.
        •  Congress must take back control over tariffs and trade policy.

    - question: Identify options or strategies available to federal officeholders to address home ownership and cost of living in Montana.
      response: "When comparing average income to Montana’s average home price, we have the single least affordable market in the nation.  Fixing this housing crisis will require an “all of the above solution”:\n\n•\tEnact new laws that will allow all mortgages to be transferable with minimal penalty, thereby freeing up home equity\n•\tTax incentives to municipalities (and builders) to open larger tracts of land for development and remove barriers to multi-family housing in residential areas.\n•\tEnforce antitrust laws against real estate entities that are “price-fixing” rents\n•\tSignificant down-payment assistance to 1st-time homebuyers\n•\tProperty tax relief to qualified homeowners, and to 1st-time homebuyers for the first 3 years\n•\tTargeted reductions in capital gains taxes for older homeowners who want to downsize\n•\tImprove financing terms (rate adjustments or subsidies) for qualified purchase/rehab/repair loans\n•\tPrioritize offers from buyers at foreclosure auctions who plan to live in the home \n•\tIncrease property tax rates for corporate or large-volume private-equity landlords (this will require these increases are not passed through to individual renters)\n•\tReduce tariffs on lumber and building supplies\n\n"
    - question: Briefly describe any traits and actions that would distinguish your service from that of the elected official who currently occupies the office you’re running for.
      response: |+
        I am not a typical politician; my thinking is framed as moving away from a traditional political or ideological approach, to a less partisan one grounded in professional expertise, public service, and practical problem-solving – along with a strong emphasis on accountability, constitutional principles, and real-world outcomes. 

           My career as a physician and longtime senior military officer has given me significant experience in making high-stakes decisions under pressure, using an evidence- or merit-based approach to decision making while maintaining a focus on patient (constituent) well-being.

           Leading with anger or combativeness is not effective – there is far too much vitriol in today’s politics. I am offering a less partisan and more pragmatic approach to representation as an ‘adult in the room’ so-to-speak, while working to reduce political polarization by collaborating with others from both sides of the aisle who can put the needs of the people above party.

           As an Independent Representative, I will align my votes with Montanans’ needs or desires, and will not be beholden to either party bosses or political elites. I won’t wait for others to tell me what to do or how to vote.

- candidateName: Christopher Kehoe
  nameSlug: christopher-kehoe
  bioMaterial:
    - question: Please describe any professional and/or life experiences that will help voters assess your qualifications for the office you’re seeking.
      response: |+
        Arts Administrator and Teaching Artist; my entire career has been in the nonprofit and/or creative sector, employing numerous creative problem-solving strategies and ways to find consensus between wildly different stakeholders. I've served on nonprofit boards, piloted community engagement programs, and directed many community theatre productions.

    - question: Where do you live currently? Where (city and state) were you born? How long have you lived in Montana?
      response: |+
        I currently live in Missoula, as a graduate student at the University of Montana. I moved here in 2024, but I've driven across Montana many times gigging between Minneapolis and Seattle. I was born in St. Paul, Minnesota.

    - question: Age as of Nov. 3, 2026, date of birth, and place of birth. We will not publish your birth date.
      response: |+
        40 years old, 11/12/1985, St. Paul, Minnesota

    - question: What other biographical information do you want voters to know about you?
      response: |+
        I lived and worked in Minneapolis up until 2012. I was always a concerned citizen and proud Democrat who listened to too many political podcasts, but ICE occupying my hometown and murdering two American citizens in broad daylight lit a fire under me to actually do something about it. Montana is my inspiration; Minnesota is my rage.

    - question: Your constituents ask you for help with the failure of a major infrastructure project, the cost of which is more than state and local governments can raise. You can direct federal money to the project through an earmark, or you can leave the funding decision up to a federal agency, in which case the decided outcome won't be yours. Which strategy are you most likely to pursue, and why?
      response: |+
        I'm staunchly against earmarks. That's a kind of favoritism that has no place in a democracy with fair and equal systems. And if the federal system is unfair, then it's a Senator's job to fix the system to work fairly for all 50 states in our nation—not to further exploit an unfair system for Montana's gain (or California's, or Florida's, etc.). That's how we get coastal favoritism and elitism (the coasts have more weight to throw around), while the middle of the nation is branded as "fly-over country." The Legislative Branch is a check on the Executive Branch, so let the Executive's federal agency work as it intends to, and I'll be there as a Legislative check to demand transparent auditing and robust accountability.

    - question: Describe your approach to management of federal lands when conflicts arise between conservation, energy development, recreation, and tribal sovereignty.
      response: |+
        When these priorities come into conflict with one another, I believe that tribal sovereignty must always take precedence. Always. Full stop. The second priority I lead with is conservation, and leaning on the wisdom of conservation experts and thinkers to guide the way. Third and fourth are energy development and recreation, respectively, and those two items I'm much more skeptical of. I would always prefer to find energy development opportunities in privately-owned land or in dialogue with a land trust (if the land is stewarded in that way). Any recreation efforts, I believe, must be tasteful with minimal impact on nature's inherent dignity.

    - question: Identify two national priorities that are not addressed in this questionnaire that are important to your platform. Briefly explain your position on each and tell voters how you intend to address them. If there’s an existing bill you support to advance your position, please identify it.
      response: |+
        I'm a full-throated advocate for reforming Section 230 and dismantling Citizens United.

        Section 230 shields social media companies from any responsibility for the content on their platforms. I argue once social media uses a predictive algorithm to shape a user's experience (and when that experience is buoyed financially by an advertising platform), the company is a publisher and must be held as liable for defamation as any other form of published media. If a social media platform was required to be more responsible for the content on its site, we would see drastic cuts to misinformation and hate speech, and drastic improvements to mental health and emotional wellness.

        Citizens United is why you can't escape the fire hose of negative-partisan political advertising every two-to-four years. It sees corporations as "people" and money as "speech," so massive firms with bottomless wallets can barrage us with ads without ever setting foot in Montana. If we revise our campaign finance laws and limit where Super PAC money can go, local politics would become a much more positive, constructive, and deliberative exercise (and we'd have shot at getting politicians we can actually stomach).

  mtfpTitle: TK here
  mtfpWrittenBio: |+
    TK MTFP-written bio

  questionnaireMaterial:
    - question: When a president deploys U.S. armed forces into combat for a month or longer without authorization, should the War Powers Resolution of 1973, which gives Congress the power to declare war, be enforced? If not, should the War Powers Resolution be revised, replaced, or discarded? Briefly explain your reasoning.
      response: |+
        War, the saying goes, has changed. In 2026, military action is much faster and much more technological than it was in 1973. I advocate for replacing the "30 days" timeframe of War Powers Resolution with "7 days," and interpreting "military action" as anything involving a bullet or a missile—a far lower threshold than boots on the ground. It is absolutely imperative that the deliberative body of Congress be the only national entity to declare war (implicitly or explicitly); the Commander-in-Chief is the one to manage and execute war, not lead us to it. Violation of the War Powers Resolution should be an immediate impeachable offense ... what puts American lives at risk more than beginning needless, ego-driven wars?

    - question: Many of Montana's rural hospitals and clinics are facing financial stress because of low patient volume and tight budget margins. What, if anything, should Congress be doing to support Montana’s health care providers?
      response: |+
        We can correct this problem from two angles.

        First: low patient volume can be directly tied to an intentionally opaque and exploitative health care insurance industry. People still get sick and break bones, but now they're terrified that a single wrong move on hospital grounds will force them to bankruptcy. A single-payer healthcare solution—even a modest one that covers a minimal amount of care—would force the health care insurance industry to become more transparent and humane, and do wonders for rural Montanans to seek medical care when they first need it. 

        Second: the vast majority of hospitals are nonprofit organizations, which means we can address tight budget margins through federal grants. Not only can we make grant funds available, we can target eligibility for hospitals operating in counties with specific population densities, and to scope those funds for specific operational costs. If we have money to go to war, we have money for a rural hospital.

    - question: Describe two issues unique to Montana that you intend to address. Explain how you’ll get the job done.
      response: |+
        Data center construction needs to be a thoughtful dialogue with the community steering the conversation. I'm not against data centers outright; I believe there needs to be clear "rules of the road;" that the community understands all the environmental hazards, costs, and long-term impacts before agreeing to a data center in their backyard. I support and want to amplify Ro Khanna's work to articulate both modern concerns and modern opportunities for domestic data centers, as well as Bernie Sanders' and AOC's bill for a short-term data center construction moratorium.

        Missing and Murdered Indigenous People (and women especially) is a chronic failure of Tribal Police, local law enforcement, and the FBI to coordinate efforts and close cases. While these agencies operate under unclear and contradictory parameters, actual human beings and their families are suffering and tribal lands effectively become dumping grounds for United States immorality. I would undertake a national review of relationships between Tribal Police agencies and local United States law enforcement to see where good practices already exist, and to develop new and clear protocols that every state could easily adopt.

    - question: Identify options or strategies available to federal officeholders to address home ownership and cost of living in Montana.
      response: |+
        I ultimately look to ease cost of ownership through a good ol' supply and demand curve. We need more housing, so Montana can look to ease zoning requirements and see where long-forgotten commercial property can become residential property. I believe Montana can get more athletic with property taxes for homes that are not a primary residence—if a Californian-owned home used for 3 months out of the year can become a Montanan-owned home used for 12 months out of the year, that's a win for Montana.

        But these are state-level solutions. I also propose a federal vacancy tax for commercial real estate that sits empty for 6 months or more, and which would compound aggressively every 6 months the real estate continues to sit vacant. We currently have a system where it's more beneficial for landlords to let storefronts sit empty than to sign a lease for a small business to begin operating. More small businesses in operation means more people working and more local economic development. I'm also in support of closing the gap between income tax and capital gains tax (and more tax brackets overall), so hourly paycheck earners aren't stuck footing an unequal amount of the bill every April 15.

    - question: Briefly describe any traits and actions that would distinguish your service from that of the elected official who currently occupies the office you’re running for.
      response: |+
        I do solemnly swear not to break a protestor's hand in a door. I suppose you could call that trait "basic humanity."

- candidateName: Sam Forstag
  nameSlug: sam-forstag
  bioMaterial:
    - question: Please describe any professional and/or life experiences that will help voters assess your qualifications for the office you’re seeking.
      response: |+
        The unique experience I offer in this race is threefold:

        First - I’ve spent the last 15 years working long hours and multiple jobs while my wages fail to keep up with costs. Whether that’s working 1,000+ hours of overtime as a smokejumper or working 2 - 3 jobs at a time while attending classes at UM, I know what it’s been like to be stuck on the wrong side of a broken economy and a failing political system. I was raised by a mom who picked up extra nursing shifts to provide for us and a dad who relied on food stamps while he earned his teaching certificate. At a moment when most members of Congress are multi-millionaires, that’s a type of experience we’re severely lacking.

        Second - I’m the only candidate in this race who knows what it takes to pass a bill into law.  I spent years working between fire seasons as an organizer and advocate across Montana fighting for public education, libraries, housing, and civil liberties, working with people in both parties to deliver on hard issues.

        Third - I was a leader in my union who fought back against harmful cuts from DOGE. Neither party in Montana has nominated a union member for Congress in over a decade. I intend to change that.

    - question: Where do you live currently? Where (city and state) were you born? How long have you lived in Montana?
      response: |+
        I live in Missoula, and I was born in Columbus, Ohio. I moved to Montana in 2012, and over the past 15 years I’ve lived and worked in Missoula, Lincoln, Condon, and Helena.

    - question: Age as of Nov. 3, 2026, date of birth, and place of birth. We will not publish your birth date.
      response: |+
        Age 32 on Nov. 3, 2026. Born May 23, 1994. Place of birth Columbus, Ohio

    - question: What other biographical information do you want voters to know about you?
      response: |+


    - question: Your constituents ask you for help with the failure of a major infrastructure project, the cost of which is more than state and local governments can raise. You can direct federal money to the project through an earmark, or you can leave the funding decision up to a federal agency, in which case the decided outcome won't be yours. Which strategy are you most likely to pursue, and why?
      response: |+
        We have infrastructure projects across western Montana that are past due for federal investment - replacing bridges in Noxon or Libby, improvements to the Highway 93 corridor, or upgrades to sewer and water that our cities and counties can’t afford. Those are the sorts of problems our federal government used to fix, and that’s the sort of problem solving I’ll fight to get us back to in Congress.

        We drive on roads, rely on the infrastructure, and benefit from programs that past generations of Montanans marshalled the will to fund and build. Whether it was Burton Wheeler securing funding for Fort Peck Dam, Lee Metcalf passing the Wilderness Act, or Mike Mansfield helping create Medicare and Medicaid, past Montana political leaders created programs and brought home funding that made our state and country more prosperous. We’ve done it before, and we can do it again.

        Those achievements took dedication, humility, and the ability to work across the aisle. As our next Congressperson I’ll draw on my experience as a smokejumper, a union leader, organizer, and policy advocate to bring home the funding we need to rebuild our infrastructure and to start fixing housing, healthcare and childcare.

    - question: Describe your approach to management of federal lands when conflicts arise between conservation, energy development, recreation, and tribal sovereignty.
      response: |+
        I’ve spent the last 8 years protecting our public lands as a wildland firefighter, a smokejumper, and fighting against deep cuts to our public lands agencies as a leader in my union’s local. Public lands aren’t just lines on a map, they’re places that public servants work their tails off to maintain, and that all of us benefit from as places where we can recreate, hunt, work, and provide. 

        In Congress, I’ll fight to reinvest in our public lands - expanding our investments in trails, recreation, and active forest management to create good jobs here in Montana and finally start tackling our wildfire crisis.

        I’ll also fight to protect our public lands from sell-offs of any kind - be that attempts at land transfer or attempts to cut and privatize the agencies that serve as stewards.

        We can and must find ways to balance competing needs on our public lands. I’ll work to build consensus so that any new projects empower workers, adhere to the environmental protections enshrined in law, honor government-to-government relationships with tribes, and collaborate with locals to earn community support.

    - question: Identify two national priorities that are not addressed in this questionnaire that are important to your platform. Briefly explain your position on each and tell voters how you intend to address them. If there’s an existing bill you support to advance your position, please identify it.
      response: |+
        1. Childcare is too scarce and too expensive for working Montanans. We have one childcare slot for every two to three children who need one, and parents who do find childcare can barely afford it anyway. Solving this problem is fundamental to making sure Montana remains a place where working families can stick around to raise the next generation. We must invest in making sure every Montanan who wants to start and raise a family can find free, quality childcare, regardless of where they live or how much they make.

        2. The enormous scale of money in politics is at the core of so many of our broken systems. It’s also at the core of why we see so few working people in Congress today. The limitless spending we see in elections today leaves us more polarized and less equal, and it threatens the very foundations of our democracy. Overturning Citizens United, getting corporate spending out of our elections, and putting a stop to corruption in Congress by banning congressional stock trading and closing the revolving door of members of Congress becoming lobbyists is the bare minimum we should demand, as a start.

