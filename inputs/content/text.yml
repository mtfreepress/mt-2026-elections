# Text for overview page and other non-data-driven content
---
overviewLedeIn: |
  In the 2026 election, Montana voters will select candidates to fill six federal and state offices, plus 100 House seats and 25 Senate seats in the state Legislature.

  Elections can be baffling to track even for voters who diligently follow political news. This digital election guide, a project of the nonprofit and nonpartisan  **[Montana Free Press](https://montanafreepress.org/)** newsroom, is an effort to ensure that basic information is available so voters have the opportunity to cast informed votes.

  The 2026 primary election, where voters will pick political party nominees to advance to the general election, will be held Tuesday, June 2. The 2026 general election will be held Tuesday, Nov. 3.
overviewBallotInitiatives: |
  Issue votes can be placed on the November General Election ballot either by referral from the Legislature or by citizen initiative when backers clear voter signature-gathering thresholds.

  To qualify their citizen initiatives for the 2026 ballot, backers needed to submit enough signatures to county election administrators by June 21. The Montana Secretary of State has qualified three citizen initiatives for the ballot this year:

overviewLegislatureLedeIn: |
 Montanans elect 100 state representatives to two-year terms and 25 of 50 state senators to four-year terms in each even-year election. This year's election is the second to be conducted using a new legislative district map drawn to account for population shifts recorded by the 2020 census. Each Senate district is composed of two House districts.

questionnaireStateOfficeLedein: |
  The responses reproduced here were solicited from candidates via a written questionnaire conducted by Montana Free Press in March 2026. Responses were limited to 1,000 characters and have not been edited or fact-checked. 

questionnaireLegislatureLedein: |
  Answers here were solicited from legislative candidates via a written questionnaire in April 2026, conducted in collaboration between MTFP and the Montana League of Women Voters. Responses here are presented exactly as submitted, without fact-checking or editing for minor punctuation or spelling errors. Readers can access the league's [Vote411 resource here](https://www.vote411.org/). 

  Legislative candidates who haven't submitted answers to these questions can do so at any time by contacting montanalwv@gmail.com or calling 406-233-9015.

overviewAlsoOnYourBallot: |
  November general election ballots may also include other items such as county commission races, depending on where in the state you live. 

